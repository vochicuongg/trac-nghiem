            { q: "Tài khoản 'Xác định kết quả kinh doanh' (Income Summary) dùng để làm gì?", options: ["A. Theo dõi dòng tiền mặt", "B. Là tài khoản trung gian để kết chuyển Doanh thu và Chi phí trong quá trình khóa sổ", "C. Để ghi nhận nợ khó đòi", "D. Thay thế cho Bảng Cân đối kế toán"], answer: 1, explain: "Income Summary là tài khoản tạm thời chỉ dùng vào cuối kỳ để tổng hợp Doanh thu và Chi phí. Số dư của nó (Lợi nhuận) sau đó được chuyển vào Lợi nhuận giữ lại." },
            { q: "Sau khi hoàn tất bút toán khóa sổ, số dư của tài khoản Doanh thu và Chi phí sẽ là bao nhiêu?", options: ["A. Bằng số dư cuối kỳ", "B. Bằng Lợi nhuận thuần", "C. Bằng 0", "D. Chuyển thành số âm"], answer: 2, explain: "Bút toán khóa sổ 'quét sạch' số dư của các tài khoản tạm thời (Doanh thu, Chi phí, Cổ tức) về 0 để sẵn sàng cho kỳ kế toán mới." },
            { q: "Chu trình kế toán (Accounting Cycle) kết thúc bằng bước nào?", options: ["A. Lập Báo cáo tài chính", "B. Ghi bút toán khóa sổ", "C. Lập Bảng cân đối thử sau khóa sổ (Post-closing Trial Balance)", "D. Bút toán điều chỉnh"], answer: 2, explain: "Bước cuối cùng là lập Bảng cân đối thử sau khóa sổ để chứng minh rằng số dư của các tài khoản thường xuyên (Tài sản, Nợ, Vốn) vẫn cân bằng sau khi kết thúc chu trình." },
            { q: "Việc quên ghi bút toán điều chỉnh cho 'Doanh thu chưa thực hiện' (đã hoàn thành dịch vụ một phần) sẽ dẫn đến:", options: ["A. Nợ phải trả bị phản ánh cao (thừa), Doanh thu bị phản ánh thấp (thiếu)", "B. Tài sản bị phản ánh thấp, Doanh thu bị phản ánh cao", "C. Nợ phải trả bị thiếu, Doanh thu bị thiếu", "D. Không ảnh hưởng gì"], answer: 0, explain: "Nếu không điều chỉnh: Nợ (Doanh thu chưa thực hiện) không bị giảm đi -> bị dư thừa. Doanh thu không được ghi nhận -> bị thiếu. Lợi nhuận cũng bị thiếu." },
            { q: "Giá trị sổ sách (Book Value) của một tài sản cố định được tính như thế nào?", options: ["A. Nguyên giá - Giá trị thanh lý", "B. Nguyên giá + Khấu hao lũy kế", "C. Nguyên giá - Khấu hao lũy kế", "D. Giá thị trường hiện tại của tài sản"], answer: 2, explain: "Giá trị sổ sách là giá trị còn lại của tài sản trên sổ kế toán, được tính bằng Nguyên giá ban đầu trừ đi Khấu hao lũy kế đã trích." },
            { q: "Công ty trả $12,000 cho hợp đồng bảo hiểm 1 năm vào ngày 1/9. Kỳ kế toán kết thúc ngày 31/12. Bút toán điều chỉnh ngày 31/12 sẽ ghi nhận Chi phí bảo hiểm là bao nhiêu?", options: ["A. $12,000", "B. $4,000", "C. $3,000", "D. $1,000"], answer: 1, explain: "Chi phí mỗi tháng = 12,000 / 12 = $1,000/tháng. Từ 1/9 đến 31/12 là 4 tháng đã tiêu hao. Vậy chi phí bảo hiểm = 4 * 1,000 = $4,000." },
            { q: "Nếu Công ty có Doanh thu là $50,000 và Chi phí là $60,000, khi kết chuyển qua tài khoản Xác định kết quả kinh doanh (Income Summary), số dư của tài khoản này sẽ là:", options: ["A. Dư Có $10,000", "B. Dư Nợ $10,000", "C. Bằng 0", "D. Dư Có $110,000"], answer: 1, explain: "Kết chuyển Doanh thu (Ghi Có Income Summary 50k) và Chi phí (Ghi Nợ Income Summary 60k). Kết quả: Nợ 60k > Có 50k => Số dư bên Nợ $10,000 (thể hiện lỗ thuần)." },
            { q: "Khái niệm 'Kế toán cơ sở tiền mặt' (Cash basis accounting) khác với 'Cơ sở dồn tích' ở điểm nào?", options: ["A. Nó tuân thủ nghiêm ngặt IFRS", "B. Nó chỉ ghi nhận doanh thu khi thu tiền và chi phí khi chi tiền", "C. Nó phức tạp hơn cơ sở dồn tích", "D. Nó sử dụng bút toán điều chỉnh nhiều hơn"], answer: 1, explain: "Cơ sở tiền mặt ghi nhận giao dịch hoàn toàn dựa trên dòng tiền thực tế, bỏ qua nguyên tắc ghi nhận doanh thu và phù hợp. Nó không được IFRS chấp nhận." },
            { q: "Khi một doanh nghiệp chia cổ tức bằng tiền mặt $5,000, bút toán khóa sổ tài khoản Cổ tức sẽ là:", options: ["A. Nợ Cổ tức / Có Tiền mặt", "B. Nợ Lợi nhuận giữ lại / Có Cổ tức", "C. Nợ Cổ tức / Có Lợi nhuận giữ lại", "D. Nợ Xác định KQKD / Có Cổ tức"], answer: 1, explain: "Để khóa sổ tài khoản Cổ tức (có số dư bên Nợ), ta ghi Có Cổ tức và ghi Nợ Lợi nhuận giữ lại để làm giảm lợi nhuận của doanh nghiệp." },
            { q: "Một công ty vay ngân hàng $100,000 với lãi suất 6%/năm vào ngày 1/11. Lãi được trả vào năm sau. Cuối năm (31/12), công ty phải lập bút toán điều chỉnh ghi nhận Chi phí lãi vay là:", options: ["A. $6,000", "B. $1,000", "C. $500", "D. $0 (vì chưa trả tiền)"], answer: 1, explain: "Lãi 1 năm = 100,000 * 6% = $6,000. Lãi 1 tháng = $500. Từ 1/11 đến 31/12 là 2 tháng. Chi phí lãi vay dồn tích = 2 * 500 = $1,000." },
            { q: "Tài khoản 'Lương và tiền công phải trả' (Salaries and Wages Payable) thuộc bảng báo cáo nào?", options: ["A. Báo cáo kết quả hoạt động", "B. Báo cáo lưu chuyển tiền tệ", "C. Báo cáo lợi nhuận giữ lại", "D. Bảng cân đối kế toán (Báo cáo tình hình tài chính)"], answer: 3, explain: "Đây là một khoản Nợ phải trả, nên nó được trình bày ở phần Nợ ngắn hạn trên Bảng cân đối kế toán." },
            { q: "Khi ghi nhận bút toán khóa sổ cho Lỗ thuần (Net Loss), Lợi nhuận giữ lại sẽ bị ghi ở bên nào?", options: ["A. Bên Có", "B. Bên Nợ", "C. Cả Nợ và Có", "D. Không ghi sổ"], answer: 1, explain: "Lỗ thuần làm giảm Vốn chủ sở hữu. Tài khoản Lợi nhuận giữ lại có số dư bình thường bên Có, nên khi giảm nó sẽ được ghi bên Nợ." },
            { q: "Bảng cân đối thử sau khóa sổ (Post-closing trial balance) CHỈ chứa các tài khoản nào?", options: ["A. Doanh thu và Chi phí", "B. Các tài khoản tạm thời", "C. Các tài khoản thường xuyên (Tài sản, Nợ, Vốn CSH)", "D. Tất cả các tài khoản trên sổ cái"], answer: 2, explain: "Bởi vì các tài khoản tạm thời (Doanh thu, Chi phí, Cổ tức) đã bị khóa về 0, nên bảng này chỉ còn lại các tài khoản vĩnh viễn (Real accounts) mang sang kỳ sau." },
            { q: "Chu trình kế toán có bao nhiêu bước cơ bản?", options: ["A. 5 bước", "B. 7 bước", "C. 9 bước", "D. 3 bước"], answer: 2, explain: "9 bước: Phân tích -> Ghi Nhật ký -> Chuyển sổ -> Bảng CĐT chưa ĐC -> Bút toán ĐC -> Bảng CĐT sau ĐC -> Lập BCTC -> Bút toán Khóa sổ -> Bảng CĐT sau khóa sổ." },
            { q: "Nguyên tắc nào sau đây biện minh cho việc trích Khấu hao TSCĐ?", options: ["A. Nguyên tắc giá gốc", "B. Giả định đơn vị tiền tệ", "C. Nguyên tắc phù hợp (Matching principle)", "D. Nguyên tắc trọng yếu"], answer: 2, explain: "TSCĐ giúp tạo ra doanh thu trong nhiều kỳ. Nguyên tắc phù hợp yêu cầu phân bổ chi phí của tài sản này vào các kỳ mà nó mang lại doanh thu." },
            { q: "Bút toán điều chỉnh KHÔNG được thực hiện đối với giao dịch nào?", options: ["A. Trả tiền điện ngay khi nhận hóa đơn trong kỳ", "B. Chi phí bảo hiểm trả trước", "C. Tiền lãi vay phát sinh chưa trả", "D. Doanh thu đã thực hiện nhưng chưa thu tiền"], answer: 0, explain: "Nếu giao dịch đã hoàn tất thu/chi và ghi nhận đúng chi phí/doanh thu ngay trong kỳ (ví dụ trả ngay tiền điện) thì không cần bút toán điều chỉnh vào cuối kỳ." },
            { q: "Lợi nhuận thuần (Net Income) sẽ xuất hiện trên các báo cáo nào?", options: ["A. Chỉ báo cáo KQHĐ", "B. Báo cáo KQHĐ và Báo cáo lợi nhuận giữ lại", "C. Báo cáo tình hình tài chính và Báo cáo lưu chuyển tiền tệ", "D. Chỉ Báo cáo tình hình tài chính"], answer: 1, explain: "Lợi nhuận thuần là kết quả của Báo cáo KQHĐ, sau đó được chuyển xuống Báo cáo lợi nhuận giữ lại để tính ra Lợi nhuận giữ lại cuối kỳ." },
            { q: "Theo IFRS, báo cáo tình hình tài chính (Bảng CĐKT) thường sắp xếp tài sản theo tiêu chí nào?", options: ["A. Theo thứ tự chữ cái", "B. Theo mức độ thanh khoản giảm dần (hoặc tăng dần tùy thông lệ từng vùng)", "C. Theo giá trị từ lớn đến nhỏ", "D. Theo ngày mua tài sản"], answer: 1, explain: "Thông lệ phổ biến là sắp xếp tài sản dựa trên tính thanh khoản (khả năng chuyển đổi thành tiền mặt nhanh nhất xếp trước hoặc sau cùng)." },
            { q: "Nếu một công ty ghi Nợ Chi phí quảng cáo và ghi Có Tiền mặt, đây là loại bút toán gì?", options: ["A. Bút toán điều chỉnh", "B. Bút toán khóa sổ", "C. Bút toán nhật ký thông thường (phát sinh trong kỳ)", "D. Bút toán sửa sai"], answer: 2, explain: "Đây là nghiệp vụ thanh toán chi phí phát sinh hàng ngày, liên quan đến Tiền mặt nên nó là bút toán thông thường, không phải bút toán điều chỉnh (vì ĐC không dùng TK Tiền)." },
            { q: "Phát biểu nào sau đây ĐÚNG về Bảng tính nháp (Worksheet)?", options: ["A. Bảng tính nháp là một Báo cáo tài chính bắt buộc", "B. Bảng tính nháp được dùng để phân phát cho các cổ đông", "C. Bảng tính nháp là một công cụ làm việc tự chọn giúp kế toán viên lập BCTC dễ dàng hơn", "D. Bảng tính nháp thay thế cho Sổ Nhật ký"], answer: 2, explain: "Worksheet chỉ là một công cụ giấy nháp (bảng tính Excel) hỗ trợ nội bộ cho kế toán viên, không phải là một BCTC chính thức hay sổ cái bắt buộc." },
            { q: "Phân loại nào đúng cho tài khoản 'Thương phiếu phải thu' (Notes Receivable)?", options: ["A. Tài sản", "B. Nợ phải trả", "C. Doanh thu", "D. Chi phí"], answer: 0, explain: "Thương phiếu phải thu là quyền đòi tiền có kèm văn bản cam kết của người nợ, mang lại lợi ích thu tiền trong tương lai nên nó là Tài sản." }
        ];

        // ================= DỮ LIỆU ĐỀ SỐ 6 =================
        const de6_questions = [
            { q: "Nguyên tắc nào đòi hỏi doanh nghiệp phải áp dụng các chính sách và phương pháp kế toán giống nhau từ kỳ này sang kỳ khác?", options: ["A. Nguyên tắc thận trọng", "B. Nguyên tắc nhất quán (Consistency)", "C. Nguyên tắc trọng yếu", "D. Nguyên tắc phù hợp"], answer: 1, explain: "Nguyên tắc nhất quán giúp người sử dụng BCTC có thể so sánh thông tin tài chính của doanh nghiệp qua các năm." },
            { q: "Nếu hàng hóa được bán theo điều kiện FOB Điểm đến (FOB Destination), ai là người chịu chi phí vận chuyển?", options: ["A. Người mua", "B. Người bán", "C. Chia đều cho cả hai", "D. Công ty vận chuyển"], answer: 1, explain: "FOB Destination nghĩa là quyền sở hữu chuyển giao tại đích đến. Người bán phải chịu trách nhiệm và chi phí vận chuyển đến tận nơi cho người mua." },
            { q: "Khi người bán chịu chi phí vận chuyển (FOB Destination), chi phí này được người bán hạch toán vào đâu?", options: ["A. Giá vốn hàng bán", "B. Hàng tồn kho", "C. Chi phí hoạt động (Chi phí bán hàng)", "D. Giảm trừ doanh thu"], answer: 2, explain: "Chi phí vận chuyển đi (Freight-out) được người bán ghi nhận là Chi phí hoạt động (Chi phí giao hàng/Chi phí bán hàng) trong kỳ." },
            { q: "Trong hệ thống kê khai thường xuyên (Perpetual), khi mua hàng hóa, chi phí vận chuyển người mua trả (FOB Shipping Point) được ghi nhận vào đâu?", options: ["A. Chi phí vận chuyển (Freight-in)", "B. Hàng tồn kho (Inventory)", "C. Giá vốn hàng bán", "D. Chi phí hoạt động"], answer: 1, explain: "Theo hệ thống KKTX, mọi chi phí phát sinh để đưa hàng hóa về kho (bao gồm cước vận chuyển) đều được cộng trực tiếp vào nguyên giá Hàng tồn kho." },
            { q: "Chiết khấu thương mại (Trade Discount) được kế toán xử lý như thế nào?", options: ["A. Ghi vào tài khoản Chiết khấu thương mại", "B. Ghi vào Chi phí hoạt động", "C. Không ghi vào tài khoản riêng, chỉ ghi nhận doanh thu/chi phí theo giá đã trừ chiết khấu", "D. Ghi vào Hàng bán bị trả lại"], answer: 2, explain: "Chiết khấu thương mại (giảm giá khi mua số lượng lớn) được trừ thẳng vào giá trên hóa đơn. Kế toán chỉ hạch toán theo giá thực tế cuối cùng." },
            { q: "Tài khoản 'Hàng bán bị trả lại và Giảm giá hàng bán' (Sales Returns and Allowances) thuộc loại tài khoản nào?", options: ["A. Tài khoản Doanh thu", "B. Tài khoản Điều chỉnh giảm doanh thu (Contra-revenue)", "C. Tài khoản Chi phí", "D. Tài khoản Nợ phải trả"], answer: 1, explain: "Đây là tài khoản ngược chiều với Doanh thu (Contra-revenue), có số dư bên Nợ và dùng để trừ khỏi Tổng doanh thu khi tính Doanh thu thuần." },
            { q: "Điều khoản thanh toán '2/10, n/30' có nghĩa là gì?", options: ["A. Giảm 2% nếu thanh toán trong 30 ngày", "B. Giảm 2% nếu thanh toán trong vòng 10 ngày, thời hạn thanh toán tối đa là 30 ngày", "C. Trả trước 20% trong 10 ngày đầu", "D. Phạt 2% nếu trả sau 10 ngày"], answer: 1, explain: "Đây là điều khoản chiết khấu thanh toán: Khách hàng được giảm 2% tổng tiền nếu trả trong vòng 10 ngày; nếu không, phải trả đủ trong vòng 30 ngày." },
            { q: "Công ty bán hàng với giá $1,000, điều khoản 2/10, n/30. Nếu khách hàng trả tiền trong thời gian được chiết khấu, bút toán nhận tiền sẽ là:", options: ["A. Nợ Tiền $1,000 / Có Phải thu $1,000", "B. Nợ Tiền $980, Nợ Chiết khấu bán hàng $20 / Có Phải thu $1,000", "C. Nợ Tiền $980 / Có Doanh thu $980", "D. Nợ Tiền $1,000 / Có Doanh thu $980, Có Chiết khấu $20"], answer: 1, explain: "Thu tiền $980 (98%). Chiết khấu bán hàng $20 được ghi Nợ (tài khoản điều chỉnh giảm DT). Khoản phải thu giảm đi toàn bộ $1,000." },
            { q: "Công ty A mua hàng hóa $5,000, điều khoản 1/10, n/30. Công ty A thanh toán trong thời gian chiết khấu (hệ thống KKTX). Bút toán thanh toán ghi:", options: ["A. Nợ Phải trả $5,000 / Có Tiền $4,950, Có Hàng tồn kho $50", "B. Nợ Phải trả $5,000 / Có Tiền $4,950, Có Chiết khấu mua hàng $50", "C. Nợ Phải trả $4,950 / Có Tiền $4,950", "D. Nợ Hàng tồn kho $5,000 / Có Tiền $5,000"], answer: 0, explain: "Khi người mua được hưởng chiết khấu thanh toán, khoản chiết khấu ($50) sẽ làm giảm trực tiếp giá trị Hàng tồn kho." },
            { q: "Lợi nhuận gộp (Gross Profit) được tính bằng công thức nào?", options: ["A. Doanh thu thuần - Chi phí hoạt động", "B. Doanh thu thuần - Giá vốn hàng bán", "C. Tổng doanh thu - Hàng bán bị trả lại", "D. Lợi nhuận thuần + Chi phí thuế"], answer: 1, explain: "Lợi nhuận gộp phản ánh phần chênh lệch giữa giá bán thuần và giá vốn của hàng hóa đã bán." },
            { q: "Lợi nhuận thuần (Net Income) của công ty thương mại được tính bằng:", options: ["A. Lợi nhuận gộp - Giá vốn hàng bán", "B. Lợi nhuận gộp - Chi phí hoạt động", "C. Doanh thu thuần - Chi phí hoạt động", "D. Tổng doanh thu - Giá vốn hàng bán"], answer: 1, explain: "Sau khi tính được Lợi nhuận gộp (DT thuần - GVHB), ta trừ tiếp các Chi phí hoạt động để ra Lợi nhuận thuần." },
            { q: "Trong phương pháp Kiểm kê định kỳ (Periodic), khi mua hàng hóa, giá trị hàng mua được hạch toán vào tài khoản nào?", options: ["A. Hàng tồn kho", "B. Mua hàng (Purchases)", "C. Giá vốn hàng bán", "D. Chi phí hoạt động"], answer: 1, explain: "Hệ thống KKĐK sử dụng tài khoản 'Mua hàng' để tập hợp chi phí mua trong kỳ, không ghi trực tiếp vào Hàng tồn kho như hệ thống KKTX." },
            { q: "Công thức tính Giá vốn hàng bán trong hệ thống Kiểm kê định kỳ là:", options: ["A. Tồn kho đầu kỳ + Mua hàng thuần - Tồn kho cuối kỳ", "B. Tồn kho đầu kỳ - Mua hàng thuần + Tồn kho cuối kỳ", "C. Tồn kho cuối kỳ + Mua hàng thuần - Tồn kho đầu kỳ", "D. Doanh thu thuần - Lợi nhuận gộp"], answer: 0, explain: "Hàng hóa sẵn sàng để bán = Tồn đầu + Mua thuần. Trừ đi phần Hàng còn lại (Tồn cuối) sẽ ra phần Hàng đã bán (Giá vốn hàng bán)." },
            { q: "Phương pháp tính giá xuất kho nào giả định những hàng hóa mua muộn nhất sẽ được bán trước tiên?", options: ["A. FIFO", "B. LIFO", "C. Bình quân gia quyền", "D. Đích danh"], answer: 1, explain: "LIFO (Last-In, First-Out) giả định hàng nhập sau cùng được xuất bán trước. (Lưu ý: IFRS hiện không cho phép sử dụng LIFO)." },
            { q: "Theo IFRS, phương pháp tính giá Hàng tồn kho nào KHÔNG ĐƯỢC phép sử dụng?", options: ["A. FIFO", "B. Bình quân gia quyền", "C. LIFO", "D. Thực tế đích danh"], answer: 2, explain: "IFRS nghiêm cấm sử dụng phương pháp LIFO vì nó làm biến dạng Lợi nhuận và giá trị Hàng tồn kho trên BCTC trong thời kỳ lạm phát." },
            { q: "Trong thời kỳ giá cả hàng hóa ĐANG TĂNG, phương pháp nào cho ra Lợi nhuận thuần THẤP NHẤT?", options: ["A. FIFO", "B. LIFO", "C. Bình quân", "D. Đích danh"], answer: 1, explain: "Giá tăng -> LIFO xuất hàng mua sau (giá cao) vào Giá vốn -> Giá vốn cao -> Lợi nhuận thấp nhất." },
            { q: "Trong thời kỳ giá cả hàng hóa ĐANG TĂNG, phương pháp nào cho ra giá trị Hàng tồn kho cuối kỳ sát với giá thị trường nhất?", options: ["A. LIFO", "B. FIFO", "C. Bình quân", "D. Không có phương pháp nào"], answer: 1, explain: "FIFO xuất hàng cũ trước, giữ lại hàng mới mua (giá cập nhật nhất) làm tồn kho cuối kỳ, nên tồn kho sẽ sát với giá thị trường." },
            { q: "Giá trị thuần có thể thực hiện được (NRV - Net Realizable Value) là gì?", options: ["A. Giá bán hiện tại trên thị trường", "B. Nguyên giá ban đầu trừ đi khấu hao", "C. Giá bán ước tính trừ đi chi phí ước tính để hoàn thành và chi phí bán hàng", "D. Chi phí để mua lại một tài sản tương tự"], answer: 2, explain: "NRV là số tiền thuần mà doanh nghiệp kỳ vọng thu được từ việc bán hàng tồn kho trong điều kiện kinh doanh bình thường." },
            { q: "Nguyên tắc 'Thấp hơn giữa Giá gốc và Giá trị thuần có thể thực hiện' (LCNRV) thể hiện nguyên tắc kế toán nào?", options: ["A. Nguyên tắc thận trọng (Conservatism)", "B. Nguyên tắc nhất quán", "C. Nguyên tắc phù hợp", "D. Nguyên tắc hoạt động liên tục"], answer: 0, explain: "LCNRV buộc doanh nghiệp phải ghi giảm giá trị hàng tồn kho nếu giá trị thực tế của nó (NRV) thấp hơn giá gốc, thể hiện sự thận trọng không đánh giá cao tài sản." },
            { q: "Lỗi ghi nhận hàng tồn kho cuối kỳ CAO HƠN thực tế sẽ làm cho Giá vốn hàng bán và Lợi nhuận thuần trong KỲ ĐÓ thay đổi ra sao?", options: ["A. Giá vốn cao hơn, Lợi nhuận cao hơn", "B. Giá vốn thấp hơn, Lợi nhuận thấp hơn", "C. Giá vốn thấp hơn, Lợi nhuận cao hơn", "D. Giá vốn cao hơn, Lợi nhuận thấp hơn"], answer: 2, explain: "GVHB = (Đầu kỳ + Mua) - Cuối kỳ. Tồn cuối kỳ CAO -> GVHB bị THẤP -> Lợi nhuận thuần bị CAO." },
            { q: "Số dư tài khoản 'Rút vốn' (Drawings) vào cuối kỳ được xử lý thế nào?", options: ["A. Cộng vào Doanh thu", "B. Trừ thẳng vào Vốn chủ sở hữu / Lợi nhuận giữ lại", "C. Khóa sổ sang tài khoản Chi phí", "D. Để nguyên số dư sang kỳ sau"], answer: 1, explain: "Rút vốn của chủ sở hữu không phải là chi phí kinh doanh, nó được khóa sổ và làm giảm trực tiếp Vốn chủ sở hữu." },
            { q: "Tài sản cố định hữu hình nào sau đây KHÔNG bị trích khấu hao?", options: ["A. Tòa nhà", "B. Máy móc thiết bị", "C. Đất đai (Land)", "D. Phương tiện vận tải"], answer: 2, explain: "Đất đai có thời gian sử dụng vô hạn nên theo quy định kế toán sẽ không bị trích khấu hao." },
            { q: "Bút toán ghi Nợ TK Chi phí Khấu hao / Có TK Khấu hao lũy kế thuộc loại bút toán nào?", options: ["A. Bút toán thông thường hàng ngày", "B. Bút toán điều chỉnh phân bổ chi phí", "C. Bút toán khóa sổ", "D. Bút toán sửa sai"], answer: 1, explain: "Đây là bút toán điều chỉnh cuối kỳ để phân bổ một phần nguyên giá của TSCĐ vào chi phí kinh doanh trong kỳ." },
            { q: "Công ty phát hành cổ phiếu phổ thông để thu tiền mặt. Giao dịch này làm:", options: ["A. Tăng Tài sản và Tăng Nợ phải trả", "B. Tăng Tài sản và Tăng Vốn CSH", "C. Tăng Vốn CSH và Giảm Nợ phải trả", "D. Không làm thay đổi Tổng tài sản"], answer: 1, explain: "Thu tiền làm tăng Tiền mặt (Tài sản). Cổ phiếu phát hành làm tăng Vốn cổ phần (Vốn CSH)." },
            { q: "Tài khoản 'Tiền lương phải trả' (Salaries Payable) có số dư bình thường bên nào?", options: ["A. Bên Nợ", "B. Bên Có", "C. Không có số dư", "D. Thay đổi tùy kỳ"], answer: 1, explain: "Tiền lương phải trả là một khoản Nợ phải trả (Liability), do đó nó có số dư bình thường bên Có." },
            { q: "Nếu bút toán điều chỉnh cho 'Chi phí chưa thanh toán' (ví dụ: lãi vay) không được ghi nhận:", options: ["A. Chi phí bị thiếu, Nợ phải trả bị thiếu", "B. Chi phí bị thừa, Nợ phải trả bị thừa", "C. Lợi nhuận bị thiếu, Tài sản bị thiếu", "D. Lợi nhuận bị thiếu, Nợ phải trả bị thiếu"], answer: 0, explain: "Bỏ quên bút toán (Nợ Chi phí / Có Phải trả) sẽ dẫn đến việc cả Chi phí và Nợ phải trả đều bị phản ánh thấp hơn thực tế." },
            { q: "Trình tự nào sau đây là ĐÚNG trong quá trình khóa sổ (Closing Process)?", options: ["A. Doanh thu -> Chi phí -> Income Summary -> Cổ tức", "B. Chi phí -> Doanh thu -> Cổ tức -> Income Summary", "C. Doanh thu -> Cổ tức -> Chi phí -> Income Summary", "D. Income Summary -> Doanh thu -> Chi phí -> Cổ tức"], answer: 0, explain: "Trình tự chuẩn: (1) Khóa Doanh thu sang Income Summary, (2) Khóa Chi phí sang Income Summary, (3) Khóa Income Summary sang LN giữ lại, (4) Khóa Cổ tức/Rút vốn sang LN giữ lại." },
            { q: "Phân loại nào ĐÚNG cho tài khoản 'Thương hiệu' (Trademarks)?", options: ["A. Hàng tồn kho", "B. Tài sản vô hình", "C. TSCĐ hữu hình", "D. Nợ dài hạn"], answer: 1, explain: "Thương hiệu, bản quyền, bằng sáng chế là các tài sản không có hình thái vật chất, được phân loại là Tài sản vô hình (Intangible Assets)." },
            { q: "Khoản thu trước của khách hàng (Unearned Revenue) được phân loại vào đâu trên Bảng CĐKT?", options: ["A. Tài sản ngắn hạn", "B. Vốn chủ sở hữu", "C. Nợ ngắn hạn (hoặc dài hạn tùy thời điểm thực hiện)", "D. Doanh thu"], answer: 2, explain: "Đã thu tiền nhưng chưa thực hiện dịch vụ là một nghĩa vụ Nợ phải trả (thường là Nợ ngắn hạn)." },
            { q: "Khi một khách hàng nộp đơn phá sản và khoản nợ của họ chắc chắn không thể thu hồi, kế toán sẽ làm gì (theo Phương pháp dự phòng)?", options: ["A. Xóa sổ khoản nợ bằng cách Nợ Chi phí nợ khó đòi / Có Phải thu KH", "B. Xóa sổ bằng cách Nợ Dự phòng nợ khó đòi / Có Phải thu KH", "C. Giữ nguyên trên sổ sách", "D. Ghi Nợ Phải thu KH / Có Tiền mặt"], answer: 1, explain: "Theo phương pháp dự phòng (Allowance Method), khi xóa sổ một khoản nợ chắc chắn không thu được, ta giảm Quỹ dự phòng và giảm trực tiếp Khoản phải thu." },
            { q: "Khi lập Báo cáo lưu chuyển tiền tệ, trả lương cho nhân viên thuộc dòng tiền từ hoạt động nào?", options: ["A. Hoạt động kinh doanh (Operating)", "B. Hoạt động đầu tư (Investing)", "C. Hoạt động tài chính (Financing)", "D. Hoạt động phi tiền tệ"], answer: 0, explain: "Trả lương là hoạt động cốt lõi hàng ngày để duy trì hoạt động của doanh nghiệp, thuộc Dòng tiền từ hoạt động kinh doanh." },
            { q: "Khoản mục nào sau đây là dòng tiền từ Hoạt động Tài chính (Financing Activities)?", options: ["A. Thu tiền từ bán hàng hóa", "B. Mua máy móc thiết bị bằng tiền mặt", "C. Chi trả cổ tức cho cổ đông", "D. Nộp thuế thu nhập doanh nghiệp"], answer: 2, explain: "Hoạt động tài chính liên quan đến việc thay đổi quy mô vốn của DN, bao gồm huy động vốn (vay, phát hành cổ phiếu) và trả lại cho nhà cung cấp vốn (trả gốc vay, trả cổ tức)." },
            { q: "Khoản mục nào sau đây là dòng tiền từ Hoạt động Đầu tư (Investing Activities)?", options: ["A. Mua một tòa nhà để làm văn phòng", "B. Bán cổ phiếu của chính công ty phát hành", "C. Thu tiền từ khách hàng", "D. Trả lãi vay ngân hàng"], answer: 0, explain: "Hoạt động đầu tư liên quan đến việc mua sắm, thanh lý Tài sản dài hạn (như TSCĐ) hoặc các khoản đầu tư vào đơn vị khác." },
            { q: "Theo IFRS, 'Tiền và các khoản tương đương tiền' (Cash Equivalents) bao gồm những gì?", options: ["A. Tiền mặt và các khoản đầu tư ngắn hạn có tính thanh khoản cao (thường đáo hạn ≤ 3 tháng)", "B. Tiền mặt và Hàng tồn kho", "C. Tiền mặt và Khoản phải thu", "D. Tiền mặt và Cổ phiếu của các công ty khác"], answer: 0, explain: "Tương đương tiền là các khoản đầu tư cực kỳ ngắn hạn, thanh khoản cao, dễ dàng chuyển đổi thành một lượng tiền xác định và rủi ro biến động giá rất thấp." },
            { q: "Mục đích của việc kiểm soát nội bộ (Internal Control) là gì?", options: ["A. Tăng doanh thu bán hàng", "B. Bảo vệ tài sản, đảm bảo ghi chép kế toán chính xác, tăng cường hiệu quả hoạt động", "C. Trốn thuế hợp pháp", "D. Loại bỏ hoàn toàn mọi sai sót của con người"], answer: 1, explain: "Kiểm soát nội bộ là hệ thống quy trình nhằm bảo vệ tài sản, đảm bảo tính đáng tin cậy của thông tin kế toán và tuân thủ pháp luật." },
            { q: "Việc 'Tách biệt trách nhiệm' (Segregation of Duties) trong kiểm soát nội bộ có nghĩa là gì?", options: ["A. Một người làm tất cả các khâu để dễ kiểm soát", "B. Nhân viên kế toán không được can thiệp vào công việc của nhân viên marketing", "C. Trách nhiệm giữ tài sản và trách nhiệm ghi chép kế toán cho tài sản đó phải được giao cho 2 người khác nhau", "D. Tách biệt công ty thành nhiều chi nhánh nhỏ"], answer: 2, explain: "Tách biệt trách nhiệm (đặc biệt là người cầm tiền/tài sản và người ghi sổ) là nguyên tắc cốt lõi để ngăn ngừa gian lận và sai sót." },
            { q: "Chứng từ kế toán KHÔNG có đặc điểm nào sau đây?", options: ["A. Là bằng chứng chứng minh giao dịch kinh tế đã xảy ra", "B. Là cơ sở để ghi sổ kế toán", "C. Phải được lập bằng bản giấy, không chấp nhận bản điện tử", "D. Chứa thông tin về số tiền, ngày tháng và nội dung giao dịch"], answer: 2, explain: "Trong thời đại số, chứng từ điện tử (hóa đơn điện tử) hoàn toàn có giá trị pháp lý và được sử dụng rộng rãi." },
            { q: "Khi khách hàng thanh toán nợ trong thời hạn được chiết khấu 2%, bút toán ở công ty bạn (người bán) sẽ ảnh hưởng thế nào đến Doanh thu?", options: ["A. Doanh thu tăng lên 2%", "B. Doanh thu giảm đi 2% (thông qua tài khoản Chiết khấu bán hàng)", "C. Không ảnh hưởng đến Doanh thu, chỉ ảnh hưởng Tiền mặt", "D. Chi phí bán hàng tăng lên 2%"], answer: 1, explain: "Chiết khấu bán hàng (Sales Discounts) được ghi Nợ, đây là tài khoản điều chỉnh giảm doanh thu, làm Doanh thu thuần giảm đi." },
            { q: "Trong kỳ lạm phát (giá tăng), phương pháp tính giá hàng tồn kho nào báo cáo Giá trị Hàng Tồn Kho Cuối Kỳ cao nhất?", options: ["A. FIFO", "B. LIFO", "C. Bình quân gia quyền", "D. Đích danh"], answer: 0, explain: "Vì FIFO xuất hàng cũ (giá rẻ) đi trước, giữ lại hàng mới (giá đắt) ở lại trong kho, nên giá trị tồn kho cuối kỳ sẽ cao nhất." },
            { q: "Trong kế toán, 'Kỳ kế toán' (Accounting Period) phổ biến nhất để lập Báo cáo tài chính đầy đủ là:", options: ["A. 1 ngày", "B. 1 tuần", "C. 1 năm (Niên độ kế toán)", "D. 10 năm"], answer: 2, explain: "Mặc dù báo cáo có thể lập theo tháng/quý để quản trị, nhưng kỳ kế toán chính thức lập BCTC đầy đủ cho người bên ngoài thường là 1 năm." }
        ];

        // ================= DỮ LIỆU ĐỀ SỐ 7 (Đã fix các câu phụ thuộc) =================
        const de7_questions = [
            { q: "Đặc tính chất lượng cơ bản nào của thông tin kế toán đòi hỏi thông tin phải làm thay đổi quyết định của người sử dụng?", options: ["A. Trình bày trung thực (Faithful Representation)", "B. Sự thích hợp (Relevance)", "C. Tính có thể so sánh (Comparability)", "D. Tính kịp thời (Timeliness)"], answer: 1, explain: "Sự thích hợp (Relevance) nghĩa là thông tin có khả năng tạo ra sự khác biệt trong các quyết định kinh tế của người dùng." },
            { q: "Đặc tính 'Trình bày trung thực' (Faithful Representation) yêu cầu thông tin phải có 3 yếu tố nào?", options: ["A. Đầy đủ, Trung lập và Không có sai sót trọng yếu", "B. Nhanh chóng, Rõ ràng và Ngắn gọn", "C. Đầy đủ, Kịp thời và Có thể xác minh", "D. Có thể dự đoán, Có giá trị xác nhận và Kịp thời"], answer: 0, explain: "Theo khuôn mẫu lý thuyết IFRS, trình bày trung thực đòi hỏi thông tin phải Complete (Đầy đủ), Neutral (Trung lập) và Free from error (Không sai sót)." },
            { q: "Việc sử dụng cùng một phương pháp tính giá hàng tồn kho từ năm này sang năm khác tuân thủ đặc tính chất lượng gia tăng nào?", options: ["A. Tính có thể xác minh", "B. Tính kịp thời", "C. Tính có thể hiểu được", "D. Tính có thể so sánh (Nhất quán)"], answer: 3, explain: "Nhất quán (áp dụng cùng phương pháp qua các năm) giúp tăng cường tính Có thể so sánh của thông tin tài chính." },
            { q: "Mua một mảnh đất với giá 1 tỷ VND. Sau 2 năm, giá thị trường của mảnh đất là 1.5 tỷ VND. Trên Bảng CĐKT, mảnh đất vẫn được ghi nhận 1 tỷ VND. Điều này tuân thủ nguyên tắc nào?", options: ["A. Nguyên tắc phù hợp", "B. Nguyên tắc giá gốc (Historical Cost)", "C. Nguyên tắc giá trị hợp lý (Fair Value)", "D. Nguyên tắc thận trọng"], answer: 1, explain: "Nguyên tắc giá gốc yêu cầu tài sản được ghi nhận và giữ nguyên theo số tiền thực tế đã chi ra ban đầu." },
            { q: "Tài sản thuần (Net Assets) của một doanh nghiệp tương đương với khoản mục nào?", options: ["A. Tổng Tài sản", "B. Tổng Nợ phải trả", "C. Vốn chủ sở hữu", "D. Lợi nhuận thuần"], answer: 2, explain: "Từ phương trình: Tài sản = Nợ + VCSH, suy ra: Tài sản thuần = Tổng Tài sản - Tổng Nợ phải trả = Vốn chủ sở hữu." },
            { q: "Khoản mục nào sau đây KHÔNG làm thay đổi Vốn chủ sở hữu?", options: ["A. Thanh toán nợ cho nhà cung cấp bằng tiền mặt", "B. Cung cấp dịch vụ thu tiền mặt", "C. Trả tiền thuê nhà tháng này", "D. Chia cổ tức cho cổ đông"], answer: 0, explain: "Thanh toán nợ chỉ làm giảm Tiền (Tài sản) và giảm Phải trả người bán (Nợ phải trả), hoàn toàn không chạm đến Vốn CSH." },
            { q: "Ngày 1/5, mua chịu thiết bị $5,000. Ngày 10/5, trả nợ $2,000. Sau 2 sự kiện này, Tổng tài sản và Tổng Nợ phải trả thay đổi thế nào so với trước 1/5?", options: ["A. Tài sản tăng $5,000, Nợ tăng $5,000", "B. Tài sản tăng $3,000, Nợ tăng $3,000", "C. Tài sản tăng $3,000, Nợ giảm $2,000", "D. Tài sản không đổi, Nợ không đổi"], answer: 1, explain: "Ngày 1/5: TS(Thiết bị) tăng 5k, Nợ tăng 5k. Ngày 10/5: TS(Tiền) giảm 2k, Nợ giảm 2k. Tổng cộng sau 2 sự kiện: TS tăng 3k, Nợ tăng 3k." },
            { q: "Mua bảo hiểm hỏa hoạn 1 năm với giá $1,200 bằng tiền mặt. Bút toán ghi nhận ban đầu là gì?", options: ["A. Nợ Chi phí bảo hiểm 1,200 / Có Tiền 1,200", "B. Nợ Chi phí trả trước 1,200 / Có Tiền 1,200", "C. Nợ Tiền 1,200 / Có Chi phí trả trước 1,200", "D. Nợ Chi phí bảo hiểm 1,200 / Có Chi phí trả trước 1,200"], answer: 1, explain: "Trả tiền bảo hiểm cho tương lai được coi là mua một Tài sản (Chi phí trả trước), chưa được tính ngay vào chi phí." },
            { q: "Một công ty mua bảo hiểm hỏa hoạn 1 năm với giá $1,200 bằng tiền mặt và đã ghi nhận vào Chi phí trả trước. Vào cuối tháng đầu tiên, bút toán điều chỉnh cho hợp đồng bảo hiểm này sẽ là:", options: ["A. Nợ Chi phí bảo hiểm 100 / Có Tiền 100", "B. Nợ Chi phí trả trước 100 / Có Chi phí bảo hiểm 100", "C. Nợ Chi phí bảo hiểm 100 / Có Chi phí trả trước 100", "D. Nợ Chi phí bảo hiểm 1,200 / Có Chi phí trả trước 1,200"], answer: 2, explain: "Mỗi tháng tiêu hao $1,200 / 12 = $100. Kế toán sẽ ghi giảm Tài sản (Chi phí trả trước) và tăng Chi phí bảo hiểm $100." },
            { q: "Lỗi ghi 'Sót' (không ghi sổ nguyên một giao dịch mua hàng) sẽ bị phát hiện bởi Bảng cân đối thử không?", options: ["A. Chắc chắn có", "B. Có, nếu số tiền lớn", "C. Không bao giờ", "D. Chỉ phát hiện được nếu giao dịch đó trả bằng tiền mặt"], answer: 2, explain: "Nếu bỏ sót hoàn toàn 1 nghiệp vụ (thiếu cả Nợ và Có), thì Tổng Nợ vẫn bằng Tổng Có, Bảng CĐT không thể phát hiện ra." },
            { q: "Doanh nghiệp có Tồn kho đầu kỳ 0, Mua hàng 100 cái (giá $10/cái), cước vận chuyển (FOB Shipping point) là $200 cho cả lô. Giá gốc 1 cái hàng tồn kho là bao nhiêu?", options: ["A. $10", "B. $12", "C. $10.2", "D. $20"], answer: 1, explain: "Tổng giá gốc = Giá mua (100 * 10) + Cước vận chuyển (200) = 1,200. Giá 1 cái = 1,200 / 100 = $12." },
            { q: "Bán hàng giá $500, điều khoản FOB Destination. Cước vận chuyển $50. Bút toán ghi nhận Cước vận chuyển ở công ty Bán:", options: ["A. Nợ Hàng tồn kho 50 / Có Tiền 50", "B. Nợ Chi phí vận chuyển (Chi phí bán hàng) 50 / Có Tiền 50", "C. Nợ Giá vốn hàng bán 50 / Có Tiền 50", "D. Không ghi nhận vì người mua chịu"], answer: 1, explain: "FOB Destination: Người bán chịu phí. Phí vận chuyển đi được ghi nhận là Chi phí bán hàng (Chi phí hoạt động)." },
            { q: "Trong kế toán, 'Vòng quay hàng tồn kho' (Inventory Turnover) dùng để đo lường điều gì?", options: ["A. Lợi nhuận của mỗi mặt hàng", "B. Số lần trung bình hàng tồn kho được bán và thay thế trong kỳ", "C. Tỷ lệ hàng hỏng hóc", "D. Số lượng hàng tồn kho còn lại cuối kỳ"], answer: 1, explain: "Inventory Turnover = Giá vốn hàng bán / Hàng tồn kho bình quân. Hệ số càng cao chứng tỏ công ty bán hàng càng nhanh." },
            { q: "Hao mòn vô hình (Obsolescence) của tài sản cố định là do:", options: ["A. Tài sản bị sử dụng quá nhiều gây hỏng hóc", "B. Sự tiến bộ của công nghệ làm cho tài sản trở nên lỗi thời", "C. Hỏa hoạn hoặc thiên tai", "D. Không bảo dưỡng định kỳ"], answer: 1, explain: "Hao mòn vô hình xảy ra khi tài sản mất giá trị do công nghệ mới ra đời hoặc thay đổi thị hiếu, dù tài sản vẫn hoạt động tốt." },
            { q: "Bút toán Nợ TK Tiền mặt / Có TK Doanh thu chưa thực hiện, phản ánh nghiệp vụ gì?", options: ["A. Khách hàng thanh toán nợ cũ", "B. Cung cấp dịch vụ và thu tiền ngay", "C. Nhận trước tiền của khách hàng nhưng chưa cung cấp hàng hóa/dịch vụ", "D. Vay tiền ngân hàng"], answer: 2, explain: "Tiền tăng (Nợ Tiền), đồng thời phát sinh một khoản nợ phải trả (Có DT chưa thực hiện) do chưa làm dịch vụ." },
            { q: "Trường hợp nào sau đây bắt buộc phải lập bút toán điều chỉnh 'Chi phí dồn tích'?", options: ["A. Đã trả tiền thuê nhà cho 6 tháng tới", "B. Nhân viên đã làm việc trong tuần cuối cùng của tháng nhưng đến mùng 5 tháng sau mới được nhận lương", "C. Mua máy móc thiết bị bằng tiền mặt", "D. Khách hàng ứng trước tiền hàng"], answer: 1, explain: "Nhân viên đã làm việc -> Chi phí lương đã phát sinh, nhưng chưa trả tiền -> Phải lập bút toán dồn tích (Accrued Expense)." },
            { q: "Khi kết chuyển Lợi nhuận thuần (Net Income) $5,000 vào Lợi nhuận giữ lại (Retained Earnings), bút toán là:", options: ["A. Nợ Xác định KQKD (Income Summary) 5,000 / Có Lợi nhuận giữ lại 5,000", "B. Nợ Lợi nhuận giữ lại 5,000 / Có Xác định KQKD 5,000", "C. Nợ Doanh thu 5,000 / Có Lợi nhuận giữ lại 5,000", "D. Nợ Lợi nhuận giữ lại 5,000 / Có Tiền mặt 5,000"], answer: 0, explain: "Lợi nhuận thuần làm tăng Lợi nhuận giữ lại (ghi Có). Số dư bên Có của Income Summary (do DT > CP) sẽ được ghi Nợ để khóa sổ." },
            { q: "Một công ty có Tồn kho đầu kỳ $10,000; Mua thuần $40,000; Giá vốn hàng bán $35,000. Hàng tồn kho cuối kỳ là bao nhiêu?", options: ["A. $85,000", "B. $15,000", "C. $5,000", "D. $25,000"], answer: 1, explain: "Hàng sẵn sàng bán = 10k + 40k = 50k. Tồn cuối kỳ = Hàng sẵn sàng bán - Giá vốn = 50k - 35k = $15,000." },
            { q: "Trên Báo cáo tình hình tài chính (Bảng CĐKT), 'Khoản phải thu khách hàng' được trình bày ở phần nào?", options: ["A. Tài sản dài hạn", "B. Nợ ngắn hạn", "C. Vốn chủ sở hữu", "D. Tài sản ngắn hạn (Current Assets)"], answer: 3, explain: "Phải thu khách hàng là tài sản dự kiến sẽ thu hồi thành tiền mặt trong vòng 1 năm, nên nó thuộc Tài sản ngắn hạn." },
            { q: "Việc đánh giá lại Hàng tồn kho theo quy tắc Thấp hơn giữa Giá gốc và NRV (LCNRV) được thực hiện để tránh điều gì?", options: ["A. Tránh đóng thuế thu nhập doanh nghiệp", "B. Tránh việc trình bày Tài sản cao hơn giá trị thực tế có thể thu hồi", "C. Tránh việc tính sai khấu hao", "D. Tránh việc phát sinh chi phí lưu kho"], answer: 1, explain: "Đây là biểu hiện của nguyên tắc thận trọng, đảm bảo tài sản không bị 'thổi phồng' trên báo cáo tài chính." },
            { q: "Nếu Công ty M trả lại một lô hàng trị giá $500 đã mua chịu (hệ thống KKTX), bút toán của Công ty M là:", options: ["A. Nợ Phải trả người bán 500 / Có Hàng tồn kho 500", "B. Nợ Tiền 500 / Có Hàng tồn kho 500", "C. Nợ Phải trả người bán 500 / Có Hàng mua trả lại 500", "D. Nợ Hàng tồn kho 500 / Có Phải trả người bán 500"], answer: 0, explain: "Trả lại hàng mua chịu: Giảm nợ phải trả (Nợ Phải trả) và giảm trực tiếp giá trị Hàng tồn kho (Có Hàng tồn kho)." },
            { q: "Phương pháp tính giá xuất kho 'Bình quân gia quyền' (Weighted Average) tính đơn giá như thế nào?", options: ["A. Trung bình cộng của đơn giá đầu kỳ và đơn giá cuối kỳ", "B. Tổng giá trị hàng sẵn sàng bán chia cho Tổng số lượng hàng sẵn sàng bán", "C. Lấy đơn giá của lô hàng mua cuối cùng", "D. Lấy đơn giá của lô hàng mua đầu tiên"], answer: 1, explain: "Đơn giá bình quân = Tổng Giá trị (Tồn đầu + Nhập) / Tổng Số lượng (Tồn đầu + Nhập)." },
            { q: "Kế toán phát hiện một khoản mua thiết bị $2,000 bị ghi nhầm thành Chi phí sửa chữa. Lỗi này làm ảnh hưởng thế nào đến BCTC năm nay?", options: ["A. Tài sản bị thiếu (thấp), Chi phí bị cao, Lợi nhuận bị thấp", "B. Tài sản bị cao, Lợi nhuận bị cao", "C. Nợ phải trả bị cao, Lợi nhuận bị thấp", "D. Không ảnh hưởng gì"], answer: 0, explain: "Ghi vào Chi phí thay vì Tài sản (Thiết bị) -> Chi phí tăng ảo -> Lợi nhuận giảm. Đồng thời Tài sản không được ghi nhận -> Tài sản bị thiếu." },
            { q: "Tài khoản 'Dự phòng nợ khó đòi' (Allowance for Doubtful Accounts) là loại tài khoản gì?", options: ["A. Tài khoản Nợ phải trả", "B. Tài khoản Chi phí", "C. Tài khoản Điều chỉnh giảm Tài sản (Contra-asset) cho Khoản phải thu", "D. Tài khoản Doanh thu"], answer: 2, explain: "Nó đi kèm và làm giảm giá trị của 'Phải thu khách hàng' trên Bảng CĐKT để thể hiện giá trị thuần có thể thu hồi." },
            { q: "Chi phí nợ khó đòi (Bad Debt Expense) được ghi nhận khi nào (theo Phương pháp dự phòng)?", options: ["A. Khi chắc chắn một khách hàng cụ thể bỏ trốn", "B. Vào cuối kỳ kế toán, dựa trên ước tính các khoản không thể thu hồi", "C. Bất cứ khi nào bán chịu", "D. Khi đòi nợ thuê thất bại"], answer: 1, explain: "Nguyên tắc phù hợp yêu cầu phải ước tính chi phí nợ khó đòi và ghi nhận ngay trong cùng kỳ với kỳ phát sinh doanh thu bán chịu." },
            { q: "Trong phương pháp Dự phòng, khi quyết định xóa sổ (write-off) một khoản nợ $100 chắc chắn không thu được, bút toán là:", options: ["A. Nợ Chi phí nợ khó đòi 100 / Có Phải thu KH 100", "B. Nợ Dự phòng nợ khó đòi 100 / Có Phải thu KH 100", "C. Nợ Phải thu KH 100 / Có Dự phòng nợ khó đòi 100", "D. Không cần ghi sổ"], answer: 1, explain: "Khi xóa sổ, ta dùng Quỹ dự phòng đã trích (Nợ TK Dự phòng) để cấn trừ vào Khoản phải thu (Có TK Phải thu). Chi phí đã được tính từ đợt trích lập cuối kỳ trước nên không ghi vào Chi phí nữa." },
            { q: "Mua một hệ thống máy tính giá $10,000, chi phí cài đặt $500, chi phí bảo trì sau 1 năm là $200. Nguyên giá (Historical Cost) của máy tính là:", options: ["A. $10,000", "B. $10,500", "C. $10,700", "D. $10,200"], answer: 1, explain: "Nguyên giá bao gồm tất cả chi phí hợp lý để đưa tài sản vào trạng thái sẵn sàng sử dụng (Giá mua + Cài đặt). Chi phí bảo trì sau 1 năm là chi phí hoạt động kỳ đó." },
            { q: "Phương pháp khấu hao đường thẳng (Straight-line method) có đặc điểm gì?", options: ["A. Mức khấu hao năm đầu tiên rất cao, sau đó giảm dần", "B. Mức khấu hao phụ thuộc vào số giờ máy chạy", "C. Mức khấu hao hàng năm là một con số cố định bằng nhau trong suốt thời gian sử dụng", "D. Không cần trừ đi giá trị thanh lý ước tính"], answer: 2, explain: "Khấu hao đường thẳng phân bổ đều đặn nguyên giá (sau khi trừ giá trị thanh lý) qua các năm." },
            { q: "Một máy móc có Nguyên giá $20,000, Giá trị thanh lý ước tính $2,000, Thời gian sử dụng hữu ích 5 năm. Khấu hao hàng năm theo PP đường thẳng là:", options: ["A. $4,000", "B. $4,400", "C. $3,600", "D. $20,000"], answer: 2, explain: "Mức khấu hao năm = (Nguyên giá - Giá trị thanh lý) / Số năm = (20,000 - 2,000) / 5 = $3,600." },
            { q: "Tài sản cố định nào sau đây có thể bị cạn kiệt (Depletion) thay vì khấu hao?", options: ["A. Máy móc nhà xưởng", "B. Mỏ than đá (Tài nguyên thiên nhiên)", "C. Phần mềm kế toán", "D. Thương hiệu"], answer: 1, explain: "Sự giảm giá trị của Tài nguyên thiên nhiên (mỏ quặng, dầu mỏ, rừng) khi khai thác được gọi là Cạn kiệt (Depletion)." },
            { q: "Tài sản vô hình (như Bằng sáng chế) có thời hạn sử dụng hữu ích hữu hạn sẽ bị làm giảm giá trị qua quá trình gọi là:", options: ["A. Khấu hao (Depreciation)", "B. Cạn kiệt (Depletion)", "C. Phân bổ (Amortization)", "D. Bỏ ghi nhận"], answer: 2, explain: "Tài sản vô hình được phân bổ (Amortized) dần vào chi phí trong suốt thời gian sử dụng hữu ích của chúng." },
            { q: "Trên Báo cáo KQHĐ, khoản mục 'Chi phí lãi vay' (Interest Expense) thường được phân loại ở đâu?", options: ["A. Nằm trong Giá vốn hàng bán", "B. Nằm trong Chi phí hoạt động kinh doanh (Operating Expenses)", "C. Nằm ở phần Thu nhập/Chi phí khác (Other Income and Expense)", "D. Trừ trực tiếp vào Lợi nhuận giữ lại"], answer: 2, explain: "Chi phí lãi vay thường được tách riêng ra khỏi chi phí hoạt động cốt lõi, nằm ở mục Chi phí tài chính/Thu nhập & Chi phí khác để phản ánh hoạt động huy động vốn." },
            { q: "Tỷ số khả năng thanh toán hiện hành (Current Ratio) được tính bằng:", options: ["A. Tài sản ngắn hạn / Nợ ngắn hạn", "B. Tổng tài sản / Tổng nợ phải trả", "C. Lợi nhuận thuần / Tổng tài sản", "D. Tiền mặt / Nợ ngắn hạn"], answer: 0, explain: "Current Ratio = Tài sản ngắn hạn (Current Assets) chia cho Nợ ngắn hạn (Current Liabilities), đo lường khả năng trả nợ trong hạn 1 năm của DN." },
            { q: "Lợi ích của việc thiết lập Quỹ tiền mặt nhỏ (Petty Cash Fund) là gì?", options: ["A. Để cất giấu tiền khỏi kiểm toán", "B. Để thanh toán các khoản chi tiêu nhỏ lẻ hàng ngày một cách nhanh chóng mà không cần viết séc/chuyển khoản phức tạp", "C. Để trả lương cho ban giám đốc", "D. Để đầu tư chứng khoán ngắn hạn"], answer: 1, explain: "Petty Cash Fund dùng để trả các chi phí lặt vặt (tiền trà nước, văn phòng phẩm nhỏ, tiền taxi) tiện lợi hơn." },
            { q: "Khi bảng sao kê ngân hàng (Bank Statement) gửi về có khoản 'Phí dịch vụ ngân hàng' (Bank service charge) mà công ty chưa biết, kế toán phải làm gì khi lập Bảng chỉnh hợp tiền gửi ngân hàng (Bank Reconciliation)?", options: ["A. Trừ vào số dư theo Sổ kế toán của công ty", "B. Trừ vào số dư theo Sổ phụ ngân hàng", "C. Cộng vào số dư theo Sổ kế toán", "D. Không làm gì cả"], answer: 0, explain: "Phí dịch vụ ngân hàng đã bị ngân hàng tự động trừ đi, nhưng kế toán chưa ghi sổ. Do đó phải Trừ vào số dư trên Sổ kế toán của công ty để chỉnh hợp." },
            { q: "Séc đang đi đường (Outstanding Checks) là gì?", options: ["A. Séc do khách hàng trả bị từ chối vì không đủ tiền", "B. Séc công ty đã viết và ghi giảm tiền trên sổ, nhưng người nhận chưa đem đến ngân hàng để rút tiền", "C. Séc công ty viết nhưng quên ghi sổ", "D. Tiền đang gửi chưa báo có"], answer: 1, explain: "Séc đang đi đường là những tấm séc doanh nghiệp đã phát hành (đã ghi trừ sổ), nhưng chưa được ngân hàng thanh toán." },
            { q: "Một tờ séc NSf (Not Sufficient Funds - Séc không đủ tiền) từ khách hàng bị ngân hàng trả lại. Công ty sẽ xử lý khoản này thế nào trên Bảng chỉnh hợp?", options: ["A. Cộng vào số dư sổ kế toán", "B. Trừ vào số dư sổ kế toán", "C. Cộng vào số dư sổ phụ ngân hàng", "D. Trừ vào số dư sổ phụ ngân hàng"], answer: 1, explain: "Lúc nhận séc, kế toán đã ghi Tăng tiền. Nay séc bị nảy (NSF), tiền không vào được tài khoản, kế toán phải ghi Trừ số tiền đó ra khỏi sổ kế toán và đòi nợ lại khách hàng." },
            { q: "Hoạt động nào sau đây thuộc nguyên tắc 'Kiểm soát nội bộ' nhằm bảo vệ tiền mặt?", options: ["A. Chỉ cho phép 1 người vừa giữ tiền vừa ghi sổ kế toán", "B. Yêu cầu mọi khoản thu bằng tiền mặt phải được nộp vào ngân hàng hàng ngày", "C. Không bao giờ đối chiếu sổ phụ ngân hàng", "D. Để két sắt mở tự do cho nhân viên"], answer: 1, explain: "Nộp tiền mặt vào ngân hàng hàng ngày giảm thiểu rủi ro mất mát, trộm cắp và là một thủ tục kiểm soát nội bộ quan trọng." },
            { q: "Trong kế toán, 'Kỳ hạn chiết khấu' (Discount Period) là:", options: ["A. Thời gian tối đa để khách hàng trả nợ mà không bị phạt", "B. Khoảng thời gian khách hàng được phép thanh toán để hưởng chiết khấu giảm giá", "C. Số ngày tính lãi chậm trả", "D. Thời gian bảo hành sản phẩm"], answer: 1, explain: "Kỳ hạn chiết khấu (ví dụ 10 ngày trong điều khoản 2/10, n/30) là khoảng thời gian vàng để khách hàng trả tiền và được giảm giá." },
            { q: "Điều nào sau đây là đặc điểm của Doanh nghiệp tư nhân (Sole Proprietorship)?", options: ["A. Trách nhiệm hữu hạn đối với chủ sở hữu", "B. Chịu thuế thu nhập doanh nghiệp ở mức cao nhất", "C. Chủ sở hữu chịu trách nhiệm vô hạn đối với các khoản nợ của doanh nghiệp", "D. Phát hành được cổ phiếu ra công chúng"], answer: 2, explain: "Doanh nghiệp tư nhân do 1 người làm chủ, người này phải lấy cả tài sản cá nhân ra để đền bù nếu doanh nghiệp phá sản (Trách nhiệm vô hạn)." }
        ];

        // ================= DỮ LIỆU ĐỀ SỐ 8 (Đã fix các câu phụ thuộc) =================
        const de8_questions = [
            { q: "Quản lý rủi ro đối với các khoản phải thu bao gồm bước nào sau đây?", options: ["A. Cho bất kỳ ai nợ để tăng doanh thu", "B. Thiết lập chính sách tín dụng và thu tiền chặt chẽ", "C. Không bao giờ bán chịu", "D. Ghi nhận doanh thu ngay khi khách hàng hứa trả tiền"], answer: 1, explain: "Thiết lập chính sách tín dụng rõ ràng (ai được nợ, nợ bao lâu) là bước cơ bản để quản lý rủi ro nợ khó đòi." },
            { q: "Khi một khoản phải thu khách hàng bị xóa sổ theo phương pháp lập dự phòng, Bảng cân đối kế toán sẽ thay đổi thế nào?", options: ["A. Tổng tài sản giảm", "B. Lợi nhuận giảm", "C. Tổng tài sản không thay đổi", "D. Nợ phải trả tăng"], answer: 2, explain: "Bút toán xóa sổ: Nợ Dự phòng / Có Phải thu. Cả hai tài khoản đều thuộc phần Tài sản và cấn trừ nhau nên Giá trị thuần của khoản phải thu (và Tổng tài sản) không đổi." },
            { q: "Tài khoản 'Dự phòng nợ khó đòi' có số dư thông thường ở bên nào?", options: ["A. Bên Nợ", "B. Bên Có", "C. Không có số dư", "D. Có thể Nợ hoặc Có"], answer: 1, explain: "Đây là tài khoản điều chỉnh giảm tài sản (Contra-asset) đối với Khoản phải thu, nên nó có số dư bên Có." },
            { q: "Phương pháp ước tính nợ khó đòi dựa trên tỷ lệ phần trăm của Khoản phải thu (Phân tích tuổi nợ) tập trung vào việc ước tính tính chính xác của báo cáo nào?", options: ["A. Báo cáo kết quả hoạt động", "B. Báo cáo lưu chuyển tiền tệ", "C. Báo cáo tình hình tài chính (Bảng CĐKT)", "D. Báo cáo lợi nhuận giữ lại"], answer: 2, explain: "Phương pháp tuổi nợ tập trung vào việc định giá đúng Giá trị thuần có thể thực hiện được của Khoản phải thu trên Bảng CĐKT." },
            { q: "Công ty có số dư TK Phải thu khách hàng là $100,000; số dư TK Dự phòng nợ khó đòi (trước điều chỉnh) là Dư Có $2,000. Nếu công ty ước tính nợ khó đòi là 5% tổng khoản phải thu, bút toán điều chỉnh sẽ ghi nhận Chi phí nợ khó đòi là bao nhiêu?", options: ["A. $5,000", "B. $3,000", "C. $7,000", "D. $2,000"], answer: 1, explain: "Mức dự phòng cần có = 100,000 * 5% = $5,000 (Dư Có). Đã có sẵn Dư Có $2,000. Cần trích thêm = 5,000 - 2,000 = $3,000." },
            { q: "Công ty có số dư TK Phải thu khách hàng là $100,000. Nếu công ty ước tính nợ khó đòi là 5% tổng khoản phải thu, và TK Dự phòng nợ khó đòi (trước điều chỉnh) đang có Dư NỢ $1,000, thì bút toán điều chỉnh sẽ ghi nhận Chi phí nợ khó đòi là bao nhiêu?", options: ["A. $4,000", "B. $5,000", "C. $6,000", "D. $1,000"], answer: 2, explain: "Mục tiêu là Dư Có $5,000. Đang Dư Nợ $1,000 -> Cần trích thêm = 5,000 + 1,000 = $6,000." },
            { q: "Thương phiếu phải thu (Notes Receivable) khác với Phải thu khách hàng (Accounts Receivable) ở điểm nào?", options: ["A. Nó không phải là tài sản", "B. Nó là một cam kết bằng văn bản chính thức có tính lãi suất", "C. Nó luôn là tài sản vô hình", "D. Nó không bao giờ bị nợ khó đòi"], answer: 1, explain: "Thương phiếu là một công cụ nợ chính thức, có văn bản cam kết ngày trả và thường kèm theo lãi suất." },
            { q: "Công ty nhận một thương phiếu kỳ hạn 90 ngày, mệnh giá $10,000, lãi suất 12%/năm. Tổng số tiền lãi thu được khi đáo hạn là:", options: ["A. $1,200", "B. $300", "C. $10,300", "D. $120"], answer: 1, explain: "Tiền lãi = Mệnh giá * Lãi suất * (Số ngày/360) = 10,000 * 12% * (90/360) = $300." },
            { q: "Chi phí để mua một chiếc xe tải giao hàng là $30,000, sơn lại logo công ty $1,000, phí bảo hiểm xe hàng năm $500, phí đăng ký biển số $300. Nguyên giá của xe tải là:", options: ["A. $31,800", "B. $31,300", "C. $30,000", "D. $30,300"], answer: 1, explain: "Nguyên giá gồm giá mua và các chi phí trực tiếp đưa tài sản vào sử dụng (30,000 + 1,000 + 300 = 31,300). Phí bảo hiểm hàng năm là chi phí hoạt động trong kỳ." },
            { q: "Khấu hao theo phương pháp Số dư giảm dần kép (Double-declining-balance) là phương pháp:", options: ["A. Khấu hao đều qua các năm", "B. Khấu hao nhanh, trích chi phí cao ở những năm đầu", "C. Dựa trên số lượng sản phẩm sản xuất ra", "D. Không tính khấu hao năm đầu"], answer: 1, explain: "Phương pháp này nhân một tỷ lệ cố định (gấp đôi tỷ lệ đường thẳng) với giá trị sổ sách giảm dần, giúp thu hồi vốn nhanh ở các năm đầu." },
            { q: "TSCĐ có nguyên giá $10,000, giá trị thanh lý $1,000, tuổi thọ 4 năm. Mức khấu hao năm đầu theo phương pháp đường thẳng là:", options: ["A. $2,250", "B. $2,500", "C. $2,000", "D. $1,000"], answer: 0, explain: "Mức khấu hao = (Nguyên giá - Giá trị thanh lý) / Tuổi thọ = (10,000 - 1,000) / 4 = $2,250." },
            { q: "Một TSCĐ có nguyên giá $10,000, giá trị thanh lý $1,000, tuổi thọ 4 năm. Mức khấu hao năm đầu tiên theo phương pháp Số dư giảm dần kép là bao nhiêu?", options: ["A. $5,000", "B. $4,500", "C. $2,500", "D. $2,250"], answer: 0, explain: "Tỷ lệ đường thẳng = 1/4 = 25%. Tỷ lệ giảm dần kép = 25% * 2 = 50%. Khấu hao năm 1 = Nguyên giá (không trừ GT thanh lý) * 50% = 10,000 * 50% = $5,000." },
            { q: "Chi tiêu nào sau đây được vốn hóa (Cộng vào nguyên giá tài sản)?", options: ["A. Chi phí đổ xăng cho xe tải", "B. Thay dầu nhớt định kỳ", "C. Thay thế động cơ mới giúp tăng tuổi thọ xe thêm 3 năm", "D. Sửa chữa một chỗ lõm nhỏ trên xe"], answer: 2, explain: "Chi tiêu vốn (Capital expenditure) là các khoản làm tăng năng lực, công suất hoặc tuổi thọ tài sản. Các khoản khác là chi phí hoạt động (Revenue expenditure)." },
            { q: "Lợi thế thương mại (Goodwill) được ghi nhận khi nào?", options: ["A. Công ty tự xây dựng được uy tín tốt", "B. Khi một công ty mua lại một công ty khác với giá cao hơn giá trị hợp lý của tài sản thuần", "C. Khi thuê một CEO xuất sắc", "D. Bất cứ khi nào cuối năm tài chính"], answer: 1, explain: "Lợi thế thương mại chỉ được ghi nhận vào BCTC thông qua giao dịch mua bán, sáp nhập doanh nghiệp (M&A)." },
            { q: "Tài khoản 'Lợi thế thương mại' có bị phân bổ (Amortization) hàng năm không?", options: ["A. Có, phân bổ tối đa 20 năm", "B. Có, phân bổ tối đa 40 năm", "C. Không, chỉ đánh giá tổn thất (Impairment) hàng năm", "D. Có, phân bổ đường thẳng"], answer: 2, explain: "Theo IFRS, Lợi thế thương mại có tuổi thọ vô hạn, không bị phân bổ định kỳ mà chỉ phải kiểm tra sự suy giảm giá trị (Impairment) mỗi năm." },
            { q: "Nợ ngắn hạn (Current Liabilities) là những khoản nợ:", options: ["A. Phải thanh toán trong vòng 1 năm hoặc 1 chu kỳ kinh doanh (tùy thời gian nào dài hơn)", "B. Chỉ thanh toán bằng tiền mặt", "C. Dài hơn 1 năm", "D. Không có lãi suất"], answer: 0, explain: "Đây là định nghĩa chuẩn của Nợ ngắn hạn." },
            { q: "Một công ty bán 1,000 sản phẩm với giá $100/sp, thuế GTGT (VAT) 10%. Bút toán ghi nhận giao dịch bán hàng tiền mặt là:", options: ["A. Nợ Tiền $110,000 / Có Doanh thu $110,000", "B. Nợ Tiền $100,000 / Có Doanh thu $100,000", "C. Nợ Tiền $110,000 / Có Doanh thu $100,000, Có Thuế GTGT phải nộp $10,000", "D. Nợ Doanh thu $100,000 / Có Tiền $100,000"], answer: 2, explain: "Tiền thu về gồm cả thuế. Doanh thu chỉ ghi nhận phần giá bán chưa thuế. Thuế VAT thu hộ Nhà nước là một khoản Nợ phải trả." },
            { q: "Doanh thu nhận trước (Unearned Revenue) là gì?", options: ["A. Tài sản", "B. Nợ ngắn hạn", "C. Doanh thu", "D. Vốn chủ sở hữu"], answer: 1, explain: "Nhận tiền trước nhưng chưa giao hàng/dịch vụ thì phát sinh nghĩa vụ phải thực hiện, thuộc nhóm Nợ ngắn hạn." },
            { q: "Chi phí bảo hành sản phẩm (Warranty Expense) được ghi nhận khi nào?", options: ["A. Khi sản phẩm thực sự bị hỏng và khách mang đến sửa", "B. Trong cùng kỳ bán sản phẩm đó (ước tính)", "C. Khi kết thúc thời hạn bảo hành", "D. Không được ghi nhận là chi phí"], answer: 1, explain: "Theo nguyên tắc phù hợp (Matching principle), chi phí bảo hành phải được ước tính và ghi nhận ngay trong kỳ bán hàng tạo ra doanh thu đó." },
            { q: "Khoản nợ dài hạn đến hạn trả trong năm nay (Current portion of long-term debt) được phân loại ở đâu trên Bảng CĐKT?", options: ["A. Vẫn để ở Nợ dài hạn", "B. Tài sản ngắn hạn", "C. Nợ ngắn hạn", "D. Vốn chủ sở hữu"], answer: 2, explain: "Phần nợ dài hạn sắp đến hạn phải trả trong vòng 1 năm tới sẽ được chuyển lên mục Nợ ngắn hạn." },
            { q: "Trái phiếu (Bonds) là hình thức huy động vốn gì?", options: ["A. Vốn chủ sở hữu", "B. Nợ phải trả", "C. Tài sản vô hình", "D. Cổ tức"], answer: 1, explain: "Trái phiếu là chứng chỉ nợ do doanh nghiệp phát hành để vay vốn, người nắm giữ trái phiếu là chủ nợ của công ty." },
            { q: "Nếu lãi suất thị trường (Market rate) LỚN HƠN lãi suất danh nghĩa ghi trên trái phiếu (Stated rate), trái phiếu sẽ được phát hành với giá:", options: ["A. Bằng mệnh giá (Par)", "B. Có chiết khấu (Discount - thấp hơn mệnh giá)", "C. Có phụ trội (Premium - cao hơn mệnh giá)", "D. Bằng 0"], answer: 1, explain: "Vì trái phiếu của công ty trả lãi thấp hơn mức hấp dẫn của thị trường, công ty phải bán rẻ (chiết khấu) để thu hút người mua." },
            { q: "Chiết khấu trái phiếu (Discount on Bonds Payable) là loại tài khoản gì?", options: ["A. Tài khoản Chi phí", "B. Tài khoản Điều chỉnh giảm Nợ phải trả (Contra-liability)", "C. Tài khoản Tài sản", "D. Tài khoản Vốn CSH"], answer: 1, explain: "Chiết khấu trái phiếu có số dư bên Nợ, đi kèm để làm giảm giá trị ghi sổ của Trái phiếu phải trả (có số dư bên Có)." },
            { q: "Phân bổ chiết khấu trái phiếu qua các năm làm cho Chi phí lãi vay (Interest Expense) được ghi nhận:", options: ["A. Cao hơn số tiền lãi thực tế trả bằng tiền mặt", "B. Thấp hơn số tiền lãi thực tế trả bằng tiền mặt", "C. Bằng đúng số tiền mặt chi ra", "D. Bằng 0"], answer: 0, explain: "Chi phí lãi vay = Lãi trả bằng tiền mặt + Phân bổ chiết khấu. Việc phát hành chiết khấu thực chất là tăng chi phí đi vay của doanh nghiệp." },
            { q: "Đặc điểm chính của Công ty cổ phần (Corporation) là gì?", options: ["A. Cổ đông chịu trách nhiệm vô hạn", "B. Không bị đánh thuế", "C. Tư cách pháp nhân độc lập và trách nhiệm hữu hạn của cổ đông", "D. Không được phát hành cổ phiếu"], answer: 2, explain: "Công ty cổ phần là một thực thể pháp lý tách biệt với các cổ đông. Cổ đông chỉ chịu trách nhiệm trên số vốn đã góp." },
            { q: "Vốn cổ phần phổ thông (Common Stock) phản ánh điều gì?", options: ["A. Nợ công ty phải trả cho cổ đông", "B. Khoản vốn góp của các chủ sở hữu", "C. Lợi nhuận của công ty", "D. Quỹ dự phòng"], answer: 1, explain: "Vốn cổ phần phổ thông thể hiện số vốn điều lệ do các cổ đông đóng góp vào doanh nghiệp." },
            { q: "Cổ phiếu quỹ (Treasury Stock) là gì?", options: ["A. Cổ phiếu do công ty khác phát hành mà công ty đang nắm giữ", "B. Cổ phiếu do chính công ty phát hành và mua lại, đang nắm giữ", "C. Cổ phiếu ưu đãi", "D. Trái phiếu chính phủ"], answer: 1, explain: "Cổ phiếu quỹ là cổ phiếu của chính công ty đã phát hành ra công chúng, nay được công ty dùng tiền mua lại và chưa hủy bỏ." },
            { q: "Tài khoản Cổ phiếu quỹ (Treasury Stock) được trình bày trên Bảng CĐKT ở đâu?", options: ["A. Là một Tài sản", "B. Là Khoản đầu tư dài hạn", "C. Là khoản điều chỉnh giảm (trừ đi) trong phần Vốn chủ sở hữu", "D. Là Nợ phải trả"], answer: 2, explain: "Mua lại cổ phiếu quỹ thực chất là rút vốn ra khỏi thị trường, làm giảm Tổng vốn chủ sở hữu." },
            { q: "Khi công ty tuyên bố chia cổ tức bằng tiền mặt (Declaration date), kế toán ghi nhận:", options: ["A. Không ghi nhận gì", "B. Nợ Cổ tức (hoặc Lợi nhuận giữ lại) / Có Cổ tức phải trả", "C. Nợ Cổ tức / Có Tiền mặt", "D. Nợ Tiền mặt / Có Cổ tức"], answer: 1, explain: "Khi HĐQT tuyên bố chia, nghĩa vụ nợ hình thành. Ghi nhận giảm lợi nhuận và tăng một khoản nợ phải trả." },
            { q: "Vào ngày chốt danh sách cổ đông nhận cổ tức (Record date), bút toán kế toán là gì?", options: ["A. Nợ Cổ tức / Có Tiền", "B. Nợ Cổ tức phải trả / Có Tiền", "C. Nợ Lợi nhuận giữ lại / Có Cổ tức", "D. Không cần ghi bút toán"], answer: 3, explain: "Ngày chốt danh sách chỉ là hành động hành chính để xác định ai được nhận tiền, không phát sinh giao dịch kinh tế nên không ghi sổ." },
            { q: "Cổ tức bằng cổ phiếu (Stock Dividends) làm thay đổi Vốn chủ sở hữu như thế nào?", options: ["A. Làm giảm Tổng Vốn CSH", "B. Làm tăng Tổng Vốn CSH", "C. Tổng Vốn CSH không đổi, chỉ chuyển từ Lợi nhuận giữ lại sang Vốn cổ phần", "D. Làm giảm Tài sản"], answer: 2, explain: "Chia cổ tức bằng cổ phiếu không làm dòng tiền chảy ra ngoài, nó chỉ 'tái đầu tư' lợi nhuận thành vốn điều lệ." },
            { q: "Chia tách cổ phiếu (Stock Split) ví dụ 2 đổi 1, có tác động gì?", options: ["A. Làm tăng Tổng vốn chủ sở hữu", "B. Làm giảm Lợi nhuận giữ lại", "C. Làm tăng số lượng cổ phiếu lưu hành và giảm mệnh giá tương ứng, không cần ghi bút toán", "D. Tăng Nợ phải trả"], answer: 2, explain: "Chia tách cổ phiếu chỉ làm thay đổi số lượng và mệnh giá, Tổng Vốn CSH và tỷ lệ sở hữu không đổi, không yêu cầu bút toán tài chính." },
            { q: "Thặng dư vốn cổ phần (Share Premium / Additional Paid-in Capital) phát sinh khi nào?", options: ["A. Công ty có lợi nhuận cao", "B. Cổ phiếu được phát hành với giá cao hơn mệnh giá (Par value)", "C. Bán hàng hóa có lãi", "D. Mua lại cổ phiếu quỹ"], answer: 1, explain: "Khi nhà đầu tư mua cổ phiếu giá cao hơn mệnh giá quy định, phần chênh lệch được ghi vào Thặng dư vốn cổ phần." },
            { q: "Công ty phát hành 1,000 cổ phiếu mệnh giá $10 với giá $15/cổ phiếu. Bút toán ghi nhận:", options: ["A. Nợ Tiền $15,000 / Có Vốn cổ phần $15,000", "B. Nợ Tiền $15,000 / Có Vốn cổ phần $10,000, Có Thặng dư vốn $5,000", "C. Nợ Tiền $10,000, Nợ Chi phí $5,000 / Có Vốn cổ phần $15,000", "D. Nợ Tiền $15,000 / Có Doanh thu $15,000"], answer: 1, explain: "Vốn cổ phần luôn ghi theo Mệnh giá (10k). Phần tiền thu trội hơn (5k) ghi vào Thặng dư vốn cổ phần." },
            { q: "Lợi nhuận giữ lại bị hạn chế (Restricted Retained Earnings) nghĩa là gì?", options: ["A. Không có đủ tiền mặt", "B. Lợi nhuận bị giữ lại không được dùng để chia cổ tức do các ràng buộc pháp lý hoặc hợp đồng", "C. Công ty đang bị lỗ", "D. Cổ đông không muốn nhận tiền"], answer: 1, explain: "Việc hạn chế này (ví dụ để lập quỹ dự phòng theo khế ước vay) nhằm bảo vệ quyền lợi cho các chủ nợ." },
            { q: "Khi bán một tài sản cố định với giá CAO HƠN giá trị sổ sách (Book value), công ty sẽ ghi nhận:", options: ["A. Lỗ do thanh lý TSCĐ", "B. Chi phí hoạt động", "C. Lãi do thanh lý TSCĐ (Gain on disposal)", "D. Doanh thu bán hàng"], answer: 2, explain: "Phần chênh lệch thu được cao hơn giá trị còn lại được ghi nhận là Thu nhập khác (Lãi do thanh lý)." },
            { q: "Bảng cân đối thử chưa điều chỉnh (Unadjusted Trial Balance) không thể hiện chính xác điều gì?", options: ["A. Tiền mặt", "B. Vốn góp", "C. Sự phân bổ chi phí và doanh thu cho đúng kỳ (Các khoản dồn tích, trả trước)", "D. Phải trả người bán"], answer: 2, explain: "Vì chưa có bút toán điều chỉnh, các tài khoản trả trước, dồn tích, và khấu hao chưa phản ánh đúng giá trị tiêu hao trong kỳ." },
            { q: "Tài khoản 'Lợi nhuận chưa phân phối' (Retained Earnings) trên Bảng cân đối thử (Trial Balance) đầu kỳ phản ánh điều gì?", options: ["A. Lợi nhuận của kỳ hiện tại", "B. Lợi nhuận tích lũy từ khi thành lập đến đầu kỳ hiện tại", "C. Số cổ tức sẽ trả", "D. Tiền mặt có sẵn"], answer: 1, explain: "Lợi nhuận thuần của kỳ hiện tại chưa được khóa sổ vào đây, nên số dư trên bảng CĐT (trước khóa sổ) vẫn là số dư đầu kỳ." },
            { q: "Phương pháp khấu hao nào thường được sử dụng nhiều nhất trong thực tế vì tính đơn giản của nó?", options: ["A. Phương pháp sản lượng", "B. Phương pháp số dư giảm dần kép", "C. Phương pháp đường thẳng (Straight-line)", "D. Phương pháp tổng số năm"], answer: 2, explain: "Khấu hao đường thẳng dễ tính toán, phân bổ đều đặn và được IFRS cho phép, là phương pháp phổ biến nhất." },
            { q: "Theo IFRS, Chi phí nghiên cứu (Research costs) được xử lý như thế nào?", options: ["A. Vốn hóa thành Tài sản vô hình", "B. Ghi nhận là Chi phí trong kỳ phát sinh", "C. Trừ thẳng vào Vốn chủ sở hữu", "D. Treo lại để ghi nhận vào năm sau"], answer: 1, explain: "Mọi chi phí trong giai đoạn Nghiên cứu (chưa chắc chắn thành công) phải ghi nhận là Chi phí. (Chỉ chi phí giai đoạn Phát triển đủ điều kiện mới được vốn hóa)." }
        ];

        // ================= DỮ LIỆU ĐỀ SỐ 9 (Đã rà soát độc lập) =================
        const de9_questions = [
            { q: "Báo cáo lưu chuyển tiền tệ (Statement of Cash Flows) cung cấp thông tin chủ yếu về vấn đề gì?", options: ["A. Lợi nhuận gộp của doanh nghiệp trong kỳ", "B. Tổng tài sản hiện có của doanh nghiệp", "C. Các dòng tiền thu vào và chi ra trong kỳ", "D. Các khoản nợ xấu chưa thu hồi được"], answer: 2, explain: "Báo cáo này giải thích sự thay đổi của Tiền và tương đương tiền từ đầu kỳ đến cuối kỳ thông qua 3 hoạt động: Kinh doanh, Đầu tư, Tài chính." },
            { q: "Theo chuẩn mực IFRS, dòng tiền trên Báo cáo Lưu chuyển tiền tệ được chia thành 3 hoạt động chính nào?", options: ["A. Mua hàng, Bán hàng, Quản lý", "B. Kinh doanh, Đầu tư, Tài chính", "C. Ngắn hạn, Dài hạn, Vốn chủ sở hữu", "D. Lợi nhuận, Khấu hao, Vay nợ"], answer: 1, explain: "IFRS quy định Báo cáo LCTT phân loại dòng tiền thành: Operating (Kinh doanh), Investing (Đầu tư), Financing (Tài chính)." },
            { q: "Giao dịch chi trả cổ tức bằng tiền mặt cho cổ đông được phân loại vào dòng tiền từ hoạt động nào?", options: ["A. Hoạt động kinh doanh", "B. Hoạt động đầu tư", "C. Hoạt động tài chính", "D. Hoạt động phi tiền tệ"], answer: 2, explain: "Cổ tức là khoản chi trả cho chủ sở hữu vốn, liên quan đến sự thay đổi cấu trúc vốn của doanh nghiệp, nên thuộc Hoạt động Tài chính (Financing)." },
            { q: "Tiền thu từ việc bán thanh lý một thiết bị (Tài sản cố định) cũ của công ty thuộc dòng tiền từ:", options: ["A. Hoạt động kinh doanh", "B. Hoạt động đầu tư", "C. Hoạt động tài chính", "D. Hoạt động thương mại"], answer: 1, explain: "Hoạt động mua sắm, xây dựng hoặc thanh lý bán Tài sản dài hạn (như máy móc, thiết bị, nhà xưởng) thuộc dòng tiền từ Hoạt động Đầu tư (Investing)." },
            { q: "Thu tiền mặt từ việc bán hàng hóa, cung cấp dịch vụ cho khách hàng thuộc dòng tiền từ:", options: ["A. Hoạt động kinh doanh", "B. Hoạt động đầu tư", "C. Hoạt động tài chính", "D. Giao dịch phi tiền tệ"], answer: 0, explain: "Đây là dòng tiền chính tạo ra doanh thu cốt lõi của doanh nghiệp, do đó nó thuộc Hoạt động Kinh doanh (Operating)." },
            { q: "Khi lập dòng tiền từ Hoạt động kinh doanh theo phương pháp gián tiếp, kế toán viên bắt đầu từ chỉ tiêu nào?", options: ["A. Doanh thu bán hàng", "B. Tiền thu từ khách hàng", "C. Lợi nhuận thuần (Net Income)", "D. Tổng tài sản"], answer: 2, explain: "Phương pháp gián tiếp điều chỉnh Lợi nhuận thuần (được lập theo cơ sở dồn tích) bằng cách cộng/trừ các khoản không bằng tiền để ra Dòng tiền thuần từ HĐKD." },
            { q: "Trong phương pháp gián tiếp lập Báo cáo LCTT, Chi phí khấu hao (Depreciation Expense) sẽ được xử lý như thế nào?", options: ["A. Trừ khỏi Lợi nhuận thuần", "B. Cộng vào Lợi nhuận thuần", "C. Ghi vào Hoạt động đầu tư", "D. Bỏ qua không tính"], answer: 1, explain: "Khấu hao là chi phí đã bị trừ vào lợi nhuận trên Báo cáo KQHĐ nhưng KHÔNG chi bằng tiền mặt, nên phải cộng ngược lại vào Lợi nhuận thuần để tìm ra dòng tiền thực." },
            { q: "Trong phương pháp gián tiếp, sự TĂNG lên của 'Khoản phải thu khách hàng' (Accounts Receivable) trong kỳ được xử lý thế nào?", options: ["A. Cộng vào Lợi nhuận thuần", "B. Trừ khỏi Lợi nhuận thuần", "C. Ghi vào Hoạt động tài chính", "D. Không cần điều chỉnh"], answer: 1, explain: "Phải thu tăng nghĩa là doanh thu đã được ghi nhận (làm tăng LN) nhưng doanh nghiệp chưa thu được tiền. Do đó phải trừ bớt số tiền này ra khỏi Lợi nhuận thuần để ra dòng tiền thực thu." },
            { q: "Sự TĂNG lên của 'Phải trả người bán' (Accounts Payable) trong kỳ ảnh hưởng thế nào đến dòng tiền Hoạt động kinh doanh (theo phương pháp gián tiếp)?", options: ["A. Cộng vào Lợi nhuận thuần", "B. Trừ khỏi Lợi nhuận thuần", "C. Trừ vào Hoạt động đầu tư", "D. Không điều chỉnh"], answer: 0, explain: "Nợ phải trả tăng nghĩa là doanh nghiệp giữ lại được tiền (đã nhận hàng/dịch vụ nhưng chưa trả tiền), do đó lượng tiền mặt thực tế dồi dào hơn lợi nhuận ghi sổ -> Cộng vào Lợi nhuận thuần." },
            { q: "Giao dịch 'Phát hành cổ phiếu phổ thông để đổi lấy một Tòa nhà' được trình bày ở đâu trên Báo cáo LCTT?", options: ["A. Dòng tiền từ Hoạt động đầu tư", "B. Dòng tiền từ Hoạt động tài chính", "C. Trình bày ở phần thuyết minh 'Các giao dịch Đầu tư và Tài chính phi tiền tệ'", "D. Dòng tiền từ Hoạt động kinh doanh"], answer: 2, explain: "Giao dịch này không có sự dịch chuyển của tiền mặt (đổi cổ phiếu lấy tài sản), nên không đưa vào 3 dòng tiền chính mà phải thuyết minh riêng biệt ở cuối báo cáo." },
            { q: "Mua trái phiếu của công ty khác (với mục đích nắm giữ đầu tư dài hạn) là dòng tiền từ:", options: ["A. Hoạt động kinh doanh", "B. Hoạt động đầu tư", "C. Hoạt động tài chính", "D. Hoạt động thương mại"], answer: 1, explain: "Đầu tư vào công cụ nợ (trái phiếu) hoặc công cụ vốn (cổ phiếu) của công ty khác với mục đích sinh lời dài hạn thuộc dòng tiền Hoạt động Đầu tư." },
            { q: "Theo IFRS, Tiền trả lãi vay (Interest paid) thường được cho phép xếp vào dòng tiền từ những hoạt động nào?", options: ["A. Hoạt động kinh doanh hoặc Hoạt động tài chính", "B. Chỉ Hoạt động đầu tư", "C. Giao dịch phi tiền tệ", "D. Không được ghi nhận"], answer: 0, explain: "IFRS linh hoạt cho phép xếp lãi vay đã trả vào Hoạt động Kinh doanh (vì nó quyết định lợi nhuận thuần) hoặc Hoạt động Tài chính (vì nó là chi phí của việc huy động vốn)." },
            { q: "Giai đoạn sống của một doanh nghiệp vừa mới khởi nghiệp (Introductory phase) thường có đặc điểm dòng tiền như thế nào?", options: ["A. Dòng tiền Kinh doanh dương, Đầu tư dương, Tài chính âm", "B. Dòng tiền Kinh doanh âm, Đầu tư âm, Tài chính dương", "C. Cả 3 dòng tiền đều dương", "D. Cả 3 dòng tiền đều âm"], answer: 1, explain: "Doanh nghiệp mới khởi nghiệp thường: Chưa có lãi nhiều/chi tiêu nhiều (Kinh doanh âm), Mua sắm máy móc (Đầu tư âm), Phải gọi vốn cổ đông hoặc vay nợ (Tài chính dương)." },
            { q: "Phân tích Báo cáo tài chính theo chiều ngang (Horizontal Analysis) là phương pháp dùng để làm gì?", options: ["A. So sánh các chỉ tiêu của một năm với tổng tài sản năm đó", "B. Đánh giá sự biến động (tăng/giảm) của một khoản mục qua nhiều kỳ kế toán (nhiều năm)", "C. So sánh công ty với đối thủ cạnh tranh trong cùng một năm", "D. Tính toán các tỷ số tài chính sinh lời"], answer: 1, explain: "Phân tích ngang (Trend analysis) xem xét một chuỗi thời gian để thấy xu hướng phát triển (tăng/giảm theo % hoặc số tuyệt đối) của công ty qua các năm." },
            { q: "Phân tích Báo cáo tài chính theo chiều dọc (Vertical Analysis) là phương pháp dùng để làm gì?", options: ["A. So sánh lợi nhuận năm nay với năm trước", "B. Tính toán tỷ lệ phần trăm của các khoản mục so với một khoản mục cơ sở (vd: Tổng tài sản) trong cùng một năm", "C. Đánh giá dòng lưu chuyển tiền tệ", "D. Dự báo doanh thu tương lai"], answer: 1, explain: "Phân tích dọc (Common-size analysis) dùng để đánh giá cơ cấu tỷ trọng. Ví dụ: Hàng tồn kho chiếm bao nhiêu % trong Tổng tài sản." },
            { q: "Khi dùng phương pháp Phân tích dọc cho Báo cáo Kết quả hoạt động, chỉ tiêu nào luôn được dùng làm cơ sở (đặt bằng 100%)?", options: ["A. Lợi nhuận thuần", "B. Giá vốn hàng bán", "C. Tổng doanh thu", "D. Doanh thu thuần (Net Sales)"], answer: 3, explain: "Trên Báo cáo KQHĐ, Doanh thu thuần được đặt là 100%, các khoản chi phí và lợi nhuận còn lại được tính bằng tỷ lệ % so với Doanh thu thuần." },
            { q: "Tỷ số thanh toán hiện hành (Current Ratio) đo lường điều gì?", options: ["A. Khả năng sinh lời của doanh nghiệp", "B. Khả năng thanh toán các khoản nợ ngắn hạn bằng các tài sản ngắn hạn", "C. Tốc độ thu hồi nợ của khách hàng", "D. Cơ cấu nợ dài hạn trên vốn chủ sở hữu"], answer: 1, explain: "Tỷ số này (Tài sản ngắn hạn chia cho Nợ ngắn hạn) chỉ ra năng lực thanh khoản (Liquidity) của doanh nghiệp trong vòng 1 năm tới." },
            { q: "Tỷ số thanh toán nhanh (Acid-Test / Quick Ratio) KHÔNG bao gồm khoản mục tài sản nào ở tử số?", options: ["A. Tiền mặt", "B. Các khoản phải thu ngắn hạn", "C. Hàng tồn kho", "D. Đầu tư tài chính ngắn hạn"], answer: 2, explain: "Hàng tồn kho có tính thanh khoản thấp (chưa chắc bán được ngay và dễ bị ứ đọng) nên bị loại ra khỏi nhóm 'Tài sản có tính thanh khoản cao' khi tính tỷ số thanh toán nhanh." },
            { q: "Tỷ số Vòng quay khoản phải thu (Accounts Receivable Turnover) cao cho thấy điều gì về tình hình quản trị của công ty?", options: ["A. Công ty đang bị nợ xấu quá nhiều", "B. Khách hàng chậm trả tiền cho công ty", "C. Công ty thu hồi nợ từ khách hàng rất nhanh và hiệu quả", "D. Công ty bán chịu quá ít"], answer: 2, explain: "Vòng quay khoản phải thu lớn đồng nghĩa với Số ngày thu tiền bình quân (Days in receivable) nhỏ, chứng tỏ công ty thu hồi vốn nhanh, chính sách tín dụng tốt." },
            { q: "Biên lợi nhuận gộp (Gross Profit Margin) được tính bằng công thức nào?", options: ["A. Lợi nhuận thuần / Doanh thu thuần", "B. Lợi nhuận gộp / Doanh thu thuần", "C. Lợi nhuận gộp / Tổng tài sản", "D. Giá vốn hàng bán / Doanh thu thuần"], answer: 1, explain: "Biên lợi nhuận gộp cho biết mỗi 1 đồng doanh thu bán hàng tạo ra được bao nhiêu đồng lợi nhuận gộp (trước khi trừ đi chi phí hoạt động, lãi vay, thuế)." },
            { q: "Tỷ suất sinh lời trên Tổng tài sản (ROA - Return on Assets) đo lường điều gì?", options: ["A. Khả năng công ty sử dụng hiệu quả tài sản để tạo ra lợi nhuận thuần", "B. Khả năng trả nợ vay ngắn hạn", "C. Tỷ lệ chia cổ tức cho cổ đông", "D. Rủi ro phá sản"], answer: 0, explain: "ROA = Lợi nhuận thuần / Tổng tài sản bình quân. Tỷ số này đo lường hiệu quả quản lý và sử dụng toàn bộ nguồn lực tài sản của công ty để sinh lời." },
            { q: "Tỷ suất sinh lời trên Vốn chủ sở hữu (ROE - Return on Equity) là thước đo quan trọng nhất đối với đối tượng nào?", options: ["A. Nhà cung cấp hàng hóa", "B. Ngân hàng cho vay", "C. Cổ đông (Chủ sở hữu)", "D. Cơ quan thuế"], answer: 2, explain: "ROE cho biết cổ đông nhận được bao nhiêu phần trăm lợi nhuận trên mỗi đồng vốn thực sự mà họ đã đầu tư vào công ty." },
            { q: "Tỷ số Nợ trên Tổng tài sản (Debt to Assets Ratio) đo lường loại rủi ro gì?", options: ["A. Rủi ro thanh khoản ngắn hạn", "B. Rủi ro về khả năng thanh toán dài hạn (Solvency)", "C. Rủi ro ứ đọng hàng tồn kho", "D. Rủi ro không bán được hàng"], answer: 1, explain: "Tỷ số này cho biết bao nhiêu % tài sản của công ty được tài trợ bằng nợ vay. Tỷ lệ càng cao, công ty càng gánh nhiều nợ, rủi ro mất khả năng thanh toán dài hạn càng lớn." },
            { q: "Lợi nhuận trên mỗi cổ phiếu (EPS - Earnings Per Share) là một thước đo đánh giá:", options: ["A. Tính thanh khoản ngắn hạn", "B. Khả năng thanh toán nợ dài hạn", "C. Khả năng sinh lời từ góc độ cổ đông phổ thông", "D. Tốc độ thu hồi dòng tiền"], answer: 2, explain: "EPS đo lường phần lợi nhuận thuần được phân bổ cho mỗi một cổ phiếu phổ thông đang lưu hành trên thị trường." },
            { q: "Khoản mục nào sau đây được định nghĩa là 'Lợi ích kinh tế thu được trong kỳ làm tăng vốn chủ sở hữu nhưng không xuất phát từ sự đóng góp của cổ đông'?", options: ["A. Cổ tức", "B. Lợi nhuận giữ lại", "C. Thu nhập (Income / Revenue)", "D. Thặng dư vốn cổ phần"], answer: 2, explain: "Đó là định nghĩa gốc của Thu nhập (Income) theo chuẩn mực IFRS (bao gồm cả Doanh thu từ hoạt động kinh doanh và Thu nhập khác)." },
            { q: "Khi một doanh nghiệp dùng tiền mặt mua lại Cổ phiếu quỹ (Treasury Stock), tỷ suất sinh lời trên Vốn chủ sở hữu (ROE) thường sẽ thay đổi thế nào (giả định lợi nhuận thuần không đổi)?", options: ["A. ROE Giảm", "B. ROE Tăng", "C. Không đổi", "D. Bằng 0"], answer: 1, explain: "Mua cổ phiếu quỹ làm Giảm Tổng vốn CSH (mẫu số). Nếu Lợi nhuận (tử số) giữ nguyên, một mẫu số nhỏ hơn sẽ làm tỷ số ROE Tăng lên." },
            { q: "Tài khoản 'Chi phí thuế thu nhập doanh nghiệp' (Income Tax Expense) được ghi nhận và trình bày ở đâu?", options: ["A. Trên Báo cáo lưu chuyển tiền tệ", "B. Nằm ở Báo cáo kết quả hoạt động, được trừ ra ngay trước khi tính Lợi nhuận thuần", "C. Nằm ở Bảng CĐKT, phần Tài sản", "D. Nằm ở Bảng CĐKT, phần Vốn CSH"], answer: 1, explain: "Thuế TNDN là khoản mục cuối cùng trên Báo cáo KQHĐ: Lợi nhuận trước thuế - Chi phí thuế TNDN = Lợi nhuận thuần." },
            { q: "Theo nguyên tắc trọng yếu (Materiality), kế toán viên được phép làm gì?", options: ["A. Cố tình ghi sai số liệu để làm đẹp báo cáo", "B. Bỏ qua các quy định kế toán phức tạp đối với các giao dịch có giá trị quá nhỏ, không làm ảnh hưởng đến quyết định của người đọc BCTC", "C. Không cần lập Bảng Cân đối kế toán", "D. Tự ý thay đổi phương pháp khấu hao mỗi tháng"], answer: 1, explain: "Trọng yếu cho phép áp dụng các xử lý thực dụng hơn đối với những khoản mục giá trị không đáng kể (ví dụ: mua cái kẹp giấy dùng nhiều năm nhưng tính ngay vào chi phí thay vì khấu hao)." },
            { q: "Việc đánh giá lại tài sản (Revaluation) theo IFRS được áp dụng cho nhóm tài sản nào?", options: ["A. Chỉ hàng tồn kho", "B. Chỉ tiền mặt", "C. Tài sản cố định (Hữu hình, Vô hình) nếu công ty chọn áp dụng mô hình Đánh giá lại", "D. Không được phép đánh giá lại ở bất kỳ tài sản nào"], answer: 2, explain: "Khác với US GAAP (chỉ dùng Giá gốc), IFRS cho phép doanh nghiệp lựa chọn 'Mô hình giá gốc' hoặc 'Mô hình đánh giá lại' (Revaluation model) đối với Tài sản cố định." },
            { q: "Mức trích lập Dự phòng giảm giá hàng tồn kho cuối kỳ được tính như thế nào?", options: ["A. Bằng giá bán trừ đi giá mua", "B. Là phần chênh lệch giữa Giá gốc (Cost) và Giá trị thuần có thể thực hiện (NRV) khi NRV suy giảm thấp hơn Giá gốc", "C. Mặc định lấy 10% tổng giá trị hàng tồn kho", "D. Lấy nguyên giá trừ đi chi phí khấu hao"], answer: 1, explain: "Áp dụng quy tắc LCNRV (Thấp hơn giữa Giá gốc và NRV), nếu NRV tụt xuống thấp hơn Giá gốc, phần hao hụt đó phải được trích dự phòng giảm giá ngay." },
            { q: "Mô hình định giá hàng tồn kho bán lẻ (Retail Inventory Method) thường được ứng dụng rộng rãi ở đâu?", options: ["A. Các nhà máy sản xuất công nghiệp nặng", "B. Các siêu thị, cửa hàng bách hóa có khối lượng lớn các mặt hàng giá trị nhỏ", "C. Các công ty tư vấn dịch vụ", "D. Các ngân hàng thương mại"], answer: 1, explain: "Phương pháp này dùng tỷ lệ giữa Giá vốn / Giá bán lẻ để ước tính nhanh giá trị hàng tồn kho cuối kỳ, cực kỳ hữu dụng cho các siêu thị không thể kiểm đếm từng món nhỏ liên tục." },
            { q: "Làm thế nào để phân biệt giữa 'Bảo trì thường xuyên' và 'Đại tu nâng cấp' tài sản cố định trong hạch toán?", options: ["A. Cả hai đều được cộng vào nguyên giá tài sản (Vốn hóa)", "B. Cả hai đều phải đưa vào chi phí hoạt động trong kỳ", "C. Bảo trì đưa vào chi phí trong kỳ, Đại tu (làm tăng năng suất/tuổi thọ) thì được Vốn hóa vào nguyên giá", "D. Bảo trì vốn hóa, Đại tu đưa vào chi phí"], answer: 2, explain: "Bảo trì hàng ngày (thay dầu, vệ sinh) là Revenue expenditure (Chi phí). Đại tu nâng cấp tạo ra lợi ích kinh tế cao hơn mức ban đầu là Capital expenditure (Vốn hóa)." },
            { q: "Các chi phí dọn dẹp, san lấp mặt bằng đất đai trước khi khởi công xây dựng nhà xưởng được ghi nhận vào đâu?", options: ["A. Cộng vào Nguyên giá của Tòa nhà xưởng", "B. Ghi nhận là Chi phí hoạt động trong kỳ", "C. Cộng vào Nguyên giá của Đất đai (Land)", "D. Vốn hóa thành Tài sản vô hình"], answer: 2, explain: "Mọi chi phí chuẩn bị để Đất đai ở trạng thái sẵn sàng sử dụng (như phá dỡ nhà cũ, san lấp) đều được vốn hóa vào tài khoản Đất (Land) - tài khoản này sẽ không bị khấu hao." },
            { q: "Khoản mục 'Tiền' (Cash) trên Bảng cân đối kế toán thường bao gồm những gì?", options: ["A. Tiền xu, tiền giấy, và tiền gửi thanh toán không kỳ hạn tại ngân hàng", "B. Cổ phiếu đầu tư dài hạn", "C. Các khoản nợ của khách hàng", "D. Bất động sản thanh khoản cao"], answer: 0, explain: "Cash bao gồm tiền mặt tại quỹ và tiền gửi ngân hàng có thể rút ra sử dụng ngay lập tức mà không chịu bất kỳ hình phạt hay giới hạn nào." },
            { q: "Việc một công ty báo cáo Lợi nhuận rất cao trên Báo cáo KQHĐ nhưng dòng tiền từ Hoạt động kinh doanh lại bị Âm nặng là dấu hiệu của điều gì?", options: ["A. Công ty đang trốn thuế rất giỏi", "B. Tính thanh khoản của công ty cực kỳ tốt", "C. Doanh thu chủ yếu đến từ bán chịu (nợ đọng lớn), công ty đang cạn kiệt tiền mặt thực tế", "D. Quản trị dòng tiền xuất sắc"], answer: 2, explain: "Ghi nhận doanh thu khi bán chịu làm tăng Lợi nhuận trên sổ sách (cơ sở dồn tích), nhưng tiền thực tế chưa thu về được. Tình trạng này kéo dài dễ dẫn đến nguy cơ phá sản do thiếu tiền trả nợ." },
            { q: "Công ty phát hành 1,000 trái phiếu, mệnh giá $1,000/trái phiếu, giá phát hành là 102 (tức 102% mệnh giá). Bút toán phát hành ghi nhận như thế nào?", options: ["A. Nợ Tiền $1,020,000 / Có Trái phiếu phải trả $1,000,000, Có Phụ trội trái phiếu $20,000", "B. Nợ Tiền $1,000,000 / Có Trái phiếu phải trả $1,000,000", "C. Nợ Tiền $1,020,000 / Có Trái phiếu phải trả $1,020,000", "D. Nợ Tiền $1,000,000, Nợ Chiết khấu $20,000 / Có Trái phiếu phải trả $1,020,000"], answer: 0, explain: "Bán với giá > 100% là phát hành có Phụ trội (Premium). Trái phiếu phải trả luôn được ghi sổ theo Mệnh giá gốc (1 triệu), phần dôi ra (20k) được ghi nhận là Phụ trội." },
            { q: "Chi phí khấu hao là một nguồn tạo ra tiền mặt thực tế cho doanh nghiệp. Nhận định này Đúng hay Sai?", options: ["A. Đúng, vì nó tạo ra tiền mặt", "B. Sai, khấu hao là chi phí không bằng tiền, bản thân nó không hề tạo ra một đồng tiền mặt nào", "C. Đúng, vì nó được cộng vào dòng tiền trên Báo cáo LCTT", "D. Sai, vì nó là một khoản doanh thu"], answer: 1, explain: "Khấu hao chỉ là sự phân bổ chi phí trên giấy. Việc nó được cộng ngược lại vào Lợi nhuận thuần trong phương pháp gián tiếp chỉ là bước toán học để loại trừ tác động làm giảm lợi nhuận, chứ bản thân khấu hao không sinh ra tiền." },
            { q: "Cấu trúc của Bảng Cân đối kế toán (Statement of Financial Position) theo chuẩn IFRS thường được trình bày dưới dạng nào?", options: ["A. Chỉ liệt kê tài sản và chi phí", "B. Tài sản dài hạn xếp trước, rồi đến Tài sản ngắn hạn (Tính thanh khoản tăng dần)", "C. Nợ ngắn hạn xếp trước Vốn CSH", "D. Sắp xếp ngẫu nhiên theo bảng chữ cái"], answer: 1, explain: "IFRS có thông lệ trình bày tài sản ít thanh khoản nhất (Non-current assets) lên đầu báo cáo, khác với US GAAP thường xếp Tài sản ngắn hạn (dễ thành tiền nhất) lên đầu." },
            { q: "Kế toán Quản trị (Managerial Accounting) khác Kế toán Tài chính ở điểm mấu chốt nào?", options: ["A. Kế toán quản trị bắt buộc phải tuân thủ nghiêm ngặt IFRS", "B. Hướng tới người sử dụng nội bộ (Quản lý, Giám đốc) để ra quyết định điều hành, không bắt buộc tuân thủ chuẩn mực chung", "C. Phải được công bố công khai ra công chúng", "D. Chỉ được lập mỗi năm 1 lần"], answer: 1, explain: "Kế toán quản trị linh hoạt, tập trung vào tương lai và báo cáo nội bộ chi tiết, không bị gò bó bởi các chuẩn mực kế toán quốc tế khắt khe." },
            { q: "Mục đích tối thượng của Hệ thống Kế toán đối với một doanh nghiệp là gì?", options: ["A. Cung cấp thông tin tài chính hữu ích, minh bạch cho những người sử dụng để họ đưa ra các quyết định kinh tế hợp lý", "B. Xào xáo sổ sách để tránh đóng thuế", "C. Theo dõi giờ làm việc của công nhân viên", "D. Xây dựng chiến lược quảng cáo sản phẩm"], answer: 0, explain: "Kế toán cung cấp một hệ thống ngôn ngữ, báo cáo chuẩn hóa để mọi người (từ ngân hàng, nhà đầu tư đến thuế) đọc và đánh giá được 'sức khỏe' thực sự của công ty." }
        ];

        // ================= DỮ LIỆU ĐỀ SỐ 10 (Đã rà soát độc lập) =================
        const de10_questions = [
