<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Luyện Đề NLKT Pro</title>
    <style>
        /* CSS Variables cho Light Mode */
        :root {
            --primary: #4a69bd;
            --primary-hover: #3c559c;
            --success: #27ae60;
            --success-hover: #219a52;
            --danger: #e74c3c;
            --bg: #f5f6fa;
            --card-bg: #ffffff;
            --text-main: #2f3640;
            --text-muted: #7f8fa6;
            --border-color: #dcdde1;
            --option-bg: #f1f2f6;
            --option-hover: #eccc68;
            --option-hover-text: #2f3542;
            --selected-bg: #dff9fb;
            --correct-bg: #d1f2eb;
            --correct-text: #145a32;
            --wrong-bg: #fadbd8;
            --wrong-text: #78281f;
            --explain-bg: #ecf0f1;
            --explain-border: #f39c12;
        }

        /* CSS Variables cho Dark Mode */
        [data-theme="dark"] {
            --primary: #6a89cc;
            --primary-hover: #82ccdd;
            --success: #2ecc71;
            --success-hover: #58d68d;
            --danger: #ff7675;
            --bg: #1e272e;
            --card-bg: #2d3436;
            --text-main: #dcdde1;
            --text-muted: #a4b0be;
            --border-color: #4b6584;
            --option-bg: #353b48;
            --option-hover: #f6b93b;
            --option-hover-text: #2d3436;
            --selected-bg: #0a3d62;
            --correct-bg: #052c16;
            --correct-text: #58d68d;
            --wrong-bg: #4a1515;
            --wrong-text: #ff7675;
            --explain-bg: #353b48;
            --explain-border: #f39c12;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            transition: 0.3s;
        }

        .app-header {
            max-width: 850px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            flex-wrap: wrap;
            gap: 15px;
        }

        /* Chỉnh style cho Đồng hồ đếm ngược */
        .timer-display {
            font-size: 1.3em;
            font-weight: bold;
            color: var(--danger);
            background: var(--option-bg);
            padding: 8px 20px;
            border-radius: 8px;
            border: 2px solid var(--danger);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 1em;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        .btn-icon {
            background: var(--option-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-icon:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .quiz-container {
            max-width: 850px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .question-block {
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .question-block:last-child {
            border-bottom: none;
        }

        .question {
            font-size: 1.15em;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 12px 16px;
            background: var(--option-bg);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .option:hover {
            background: var(--option-hover);
            color: var(--option-hover-text);
        }

        .option.selected {
            background: var(--selected-bg);
            border-color: var(--primary);
            font-weight: 500;
        }

        .option.correct-ans {
            background: var(--correct-bg) !important;
            border-color: var(--success) !important;
            color: var(--correct-text) !important;
            font-weight: bold;
        }

        .option.wrong-ans {
            background: var(--wrong-bg) !important;
            border-color: var(--danger) !important;
            color: var(--wrong-text) !important;
            text-decoration: line-through;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-main {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }

        .btn-submit {
            background: var(--success);
        }

        .btn-submit:hover {
            background: var(--success-hover);
        }

        .btn-retry {
            background: var(--primary);
            display: none;
        }

        .btn-retry:hover {
            background: var(--primary-hover);
        }

        .result-board {
            display: none;
            margin-top: 25px;
            padding: 25px;
            background: var(--option-bg);
            border-radius: 8px;
            border-left: 6px solid var(--primary);
            text-align: center;
            font-size: 1.2em;
        }

        .score-text {
            font-size: 1.8em;
            font-weight: bold;
            color: var(--primary);
            margin: 10px 0;
        }

        .explanation {
            font-size: 0.95em;
            color: var(--text-main);
            margin-top: 12px;
            padding: 12px;
            background: var(--explain-bg);
            border-radius: 6px;
            border-left: 4px solid var(--explain-border);
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <div class="app-header">
        <div style="font-weight: bold; color: var(--primary); font-size: 1.2em;">📚 NLKT Quiz</div>

        <div class="timer-display" id="timer-display">⏳ 60:00</div>

        <div class="header-controls">
            <select id="test-selector" onchange="changeTest()">
                <option value="1">Đề số 1</option>
                <option value="2">Đề số 2</option>
                <option value="3">Đề số 3</option>
                <option value="4">Đề số 4</option>
                <option value="5">Đề số 5</option>
                <option value="6">Đề số 6 </option>
                <option value="7">Đề số 7 </option>
                <option value="8">Đề số 8 </option>
                <option value="9">Đề số 9</option>
                <option value="10">Đề số 10</option>
            </select>
            <button class="btn-icon" onclick="forceShuffle()">🔀 Đảo Đề</button>
            <button class="btn-icon" id="theme-toggle" onclick="toggleTheme()">🌙 Chế độ Tối</button>
        </div>
    </div>

    <div class="quiz-container">
        <h1 id="quiz-title">Đề Luyện Tập Số 1</h1>
        <div class="subtitle">Hệ thống sẽ tự động nộp bài khi hết 60 phút. Chúc cậu làm bài tốt!</div>
        <div id="quiz-body"></div>
        <div id="result-board" class="result-board"></div>
        <div class="controls">
            <button class="btn-main btn-submit" id="btn-submit" onclick="submitQuiz()">Nộp Bài & Xem Điểm</button>
            <button class="btn-main btn-retry" id="btn-retry" onclick="resetCurrentTest()">Làm Lại Đề Này</button>
        </div>
    </div>

    <script>
        // ================= DỮ LIỆU CÁC ĐỀ =================

        // ================= DỮ LIỆU ĐỀ SỐ 1 =================
        const de1_questions = [
            { q: "Mua vật tư nhập kho £1,510 đã được ghi nợ tài khoản Vật Tư £1,150 và ghi có tài khoản Phải Trả Người Bán £1,150. Bút toán sửa sai là:", options: ["a. Nợ Phải Trả Người Bán 1,510 / Có Tiền 1,510", "b. Nợ Vật Tư 1,510 / Có Phải Trả Người Bán 1,510", "c. Nợ Phải Trả Người Bán 360 / Có Vật Tư 360", "d. Nợ Vật Tư 360 / Có Phải Trả Người Bán 360"], answer: 3, explain: "Ghi thiếu (1.510 - 1.150 = 360), cần lập bút toán bổ sung phần thiếu." },
            { q: "Các bước sau là bắt buộc trong một chu trình kế toán, ngoại trừ:", options: ["a. Lập báo cáo tài chính", "b. Điều chỉnh", "c. Ghi bút toán nhật ký các giao dịch", "d. Sửa sai"], answer: 3, explain: "Sửa sai chỉ phát sinh khi có lỗi, không phải là bước bắt buộc định kỳ." },
            { q: "Câu nào sau đây là đúng?", options: ["a. Nợ ngắn hạn là các khoản nợ chưa đến hạn ít nhất 18 tháng.", "b. Nợ ngắn hạn là những khoản nợ quá một năm.", "c. Nợ dài hạn là các khoản nợ chưa đến hạn ít nhất 12 tháng.", "d. Nợ dài hạn là những khoản nợ quá một năm."], answer: 3, explain: "Nợ dài hạn có thời hạn thanh toán dài hơn một năm hoặc một chu kỳ kinh doanh." },
            { q: "Tài khoản nào sau đây không nằm trong bút toán khóa sổ?", options: ["a. Khấu Hao Luỹ Kế", "b. Doanh Thu Dịch Vụ", "c. Chi Phí Khấu Hao", "d. Cổ Tức"], answer: 0, explain: "Khấu hao lũy kế là tài khoản thường xuyên (thuộc Bảng CĐKT), không bị khóa sổ." },
            { q: "Tài khoản nào sau đây không còn số dư sau khóa sổ?", options: ["a. Chi phí trả trước", "b. Doanh thu chưa thực hiện", "c. Doanh thu", "d. Khấu hao lũy kế"], answer: 2, explain: "Doanh thu là tài khoản tạm thời, số dư kết chuyển hết về 0." },
            { q: "Khi lập báo cáo tài chính, lợi nhuận thuần từ BCKQHĐ được đem sang và có trong báo cáo nào?", options: ["a. Báo cáo tình hình tài chính", "b. Báo cáo tình hình tài chính và BC lưu chuyển tiền tệ", "c. Báo cáo lợi nhuận giữ lại", "d. Không có trong báo cáo nào ở trên"], answer: 2, explain: "Lợi nhuận thuần kết chuyển sang BC lợi nhuận giữ lại." },
            { q: "Khoản mục nào là một giả định trong báo cáo tài chính?", options: ["a. Hoạt động liên tục", "b. Có thể so sánh", "c. Kịp thời", "d. Dễ hiểu"], answer: 0, explain: "Hoạt động liên tục (Going concern) là giả định kế toán cơ bản." },
            { q: "Công thức nào sau đây không đúng?", options: ["a. Chi phí hoạt động - giá vốn hàng bán = lợi nhuận gộp", "b. Lợi nhuận gộp - Chi phí hoạt động = Lợi nhuận thuần", "c. Doanh thu bán hàng - giá vốn - CP HĐ = Lợi nhuận thuần", "d. Lợi nhuận thuần + chi phí hoạt động = lợi nhuận gộp"], answer: 0, explain: "Công thức A sai hoàn toàn. Công thức đúng: Lợi nhuận gộp = Doanh thu - Giá vốn hàng bán." },
            { q: "Loại tài khoản nào xuất hiện trên bảng cân đối thử sau điều chỉnh:", options: ["a. Tài khoản thường xuyên", "b. Tài khoản tạm thời", "c. Cả tài khoản thường xuyên và tài khoản tạm thời", "d. Chỉ các tài khoản trên BCTHTC"], answer: 2, explain: "Vì chưa khóa sổ nên bảng CĐT sau điều chỉnh chứa cả TK tạm thời và thường xuyên." },
            { q: "Báo cáo KQHĐ tháng 7 có Lợi nhuận thuần $4,000 (DT $8,700, CP lương $2,500, CP tiện ích $500). Nếu bỏ quên Chi phí bảo hiểm hết hạn $700, lợi nhuận thuần đúng là:", options: ["a. $5,400", "b. $4,700", "c. $4,000", "d. $3,300"], answer: 3, explain: "Lợi nhuận đúng = Lợi nhuận cũ (4,000) - Chi phí bỏ quên (700) = 3,300." },
            { q: "Tài khoản nào xuất hiện trong sổ cái của công ty thương mại sử dụng hệ thống kê khai thường xuyên?", options: ["a. Giá vốn hàng bán", "b. Mua hàng", "c. Chi phí vận chuyển hàng mua", "d. Chiết khấu mua hàng"], answer: 0, explain: "Hệ thống KKTX luôn cập nhật Giá vốn hàng bán sau mỗi giao dịch xuất kho." },
            { q: "Theo hệ thống kê khai thường xuyên, việc mua hàng hóa để bán lại được ghi nợ vào:", options: ["a. Tài khoản hàng hóa tồn kho", "b. Tài khoản mua hàng", "c. Tài khoản vật tư", "d. Tài khoản Giá vốn hàng bán"], answer: 0, explain: "Tài sản (Hàng tồn kho) tăng lên." },
            { q: "Nếu không thực hiện bút toán điều chỉnh cho doanh thu dồn tích:", options: ["a. Tài sản sẽ được xác định cao hơn", "b. Chi phí sẽ được xác định thấp hơn", "c. Vốn chủ sở hữu sẽ được đánh giá thấp", "d. Doanh thu sẽ được xác định cao hơn"], answer: 2, explain: "Quên ghi nhận doanh thu dồn tích (Nợ Phải thu / Có Doanh thu) làm Tài sản thiếu và Doanh thu thiếu -> Vốn CSH bị đánh giá thấp." },
            { q: "Thực hiện dịch vụ CPA trị giá $500 nhưng chưa lập hóa đơn vào cuối kỳ. Bút toán điều chỉnh là:", options: ["a. Nợ Phải thu/ Có Doanh thu chưa thực hiện", "b. Nợ Phải thu/ Có Doanh thu dịch vụ", "c. Nợ Tiền/ Có Doanh thu chưa thực hiện", "d. Nợ Doanh thu chưa thực hiện/ Có Doanh thu dịch vụ"], answer: 1, explain: "Dịch vụ đã hoàn thành nhưng chưa thu tiền -> Tăng Khoản phải thu và Tăng Doanh thu." },
            { q: "Điều chỉnh đối với doanh thu chưa thực hiện:", options: ["a. Làm giảm tài sản và giảm doanh thu.", "b. Làm tăng doanh thu và tăng chi phí.", "c. Làm tăng tài sản và tăng doanh thu.", "d. Làm giảm nợ phải trả và tăng doanh thu."], answer: 3, explain: "Khi hoàn thành một phần dịch vụ, Nợ phải trả (DT chưa thực hiện) giảm đi và Doanh thu tăng lên." },
            { q: "Nhận tiền từ KH $300.000, Doanh thu thực hiện $350.000, CP phát sinh $200.000, Khấu hao $16.000. Theo cơ sở dồn tích, lợi nhuận thuần là:", options: ["a. $82.000", "b. $114.000", "c. $150.000", "d. $134.000"], answer: 3, explain: "Lợi nhuận = DT thực hiện (350.000) - CP phát sinh (200.000) - Khấu hao (16.000) = 134.000." },
            { q: "Trong hệ thống kê khai thường xuyên, tài khoản Giá vốn hàng bán được sử dụng:", options: ["a. Chỉ khi bán hàng hóa xảy ra", "b. Chỉ khi bán hàng hóa chưa thu tiền", "c. Chỉ khi giao dịch bán thu tiền xảy ra", "d. Bất cứ khi nào có bán hàng hóa hoặc hàng bán bị trả lại"], answer: 3, explain: "Giá vốn được ghi nhận với mọi biến động xuất hàng bán hoặc nhập hàng bị trả." },
            { q: "Doanh thu bán hàng thường được ghi nhận khi:", options: ["a. Tiền được nhận từ việc bán chịu", "b. Các bút toán điều chỉnh được thực hiện", "c. Hàng hóa đã được chuyển giao từ người bán sang người mua", "d. Nhận được một đơn đặt hàng"], answer: 2, explain: "Nguyên tắc ghi nhận doanh thu: khi rủi ro và lợi ích đã được chuyển giao." },
            { q: "Làm thêm giờ 28/2. Đầu tháng 3 gửi thông báo nợ. Giữa tháng 3 nhận lương. Tiền lương ghi nhận vào chi phí trong:", options: ["a. Tháng 3", "b. Thời kỳ nhận séc", "c. Tháng 2", "d. Tùy thuộc vào thanh toán"], answer: 2, explain: "Nguyên tắc phù hợp (Matching principle): Chi phí phát sinh tạo ra doanh thu kỳ nào thì ghi nhận kỳ đó." },
            { q: "Khi hàng hóa được trả lại liên quan đến việc bán hàng thu tiền trước đó:", options: ["a. Không nên sử dụng tài khoản hàng bán bị trả lại", "b. Tài khoản tiền sẽ được ghi có", "c. Tài khoản hàng bán bị trả lại sẽ được ghi nợ", "d. Tài khoản phải thu sẽ được ghi có"], answer: 2, explain: "Hàng bán bị trả lại là TK điều chỉnh giảm doanh thu, phát sinh tăng ghi bên Nợ." },
            { q: "Trong hệ thống kê khai thường xuyên, người mua trả lại hàng hóa bị lỗi ghi bằng cách ghi có:", options: ["a. Giảm giá hàng mua", "b. Hàng mua trả lại", "c. Hàng hóa tồn kho", "d. Mua hàng"], answer: 2, explain: "Người mua xuất trả lại hàng sẽ làm giảm trực tiếp tài sản Hàng hóa tồn kho." },
            { q: "Bảng cân đối thử chưa điều chỉnh:", options: ["a. Chỉ có những TK thường xuyên", "b. Chỉ có những TK tạm thời", "c. Có thể có các TK thường xuyên và tạm thời", "d. Thể hiện cân bằng DT - CP = LN"], answer: 2, explain: "Trước khi điều chỉnh và khóa sổ, bảng CĐT chứa tất cả các TK hiện có." },
            { q: "Doanh thu $60.000. Giá vốn $30.000, CP hoạt động $12.000, lỗ bán thiết bị $2.000. Lợi nhuận gộp là:", options: ["a. $30.000", "b. $18.000", "c. $60.000", "d. $16.000"], answer: 0, explain: "Lợi nhuận gộp = Doanh thu - Giá vốn hàng bán = 60.000 - 30.000 = 30.000." },
            { q: "Phần chi phí hoạt động trong báo cáo kết quả hoạt động sẽ không bao gồm:", options: ["a. Giá vốn hàng bán", "b. Chi phí bảo hiểm", "c. Chi phí tiện ích", "d. Chi phí vận chuyển"], answer: 0, explain: "Giá vốn hàng bán là chỉ tiêu tách biệt, được trừ đi đầu tiên để tính LN gộp." },
            { q: "Bước cuối cùng trong quy trình ghi chép là:", options: ["a. Lập bảng cân đối thử", "b. Phân tích giao dịch", "c. Ghi nhật ký", "d. Chuyển sổ cái"], answer: 0, explain: "Sau khi phân tích, ghi nhật ký, chuyển sổ, ta lập bảng CĐT để kiểm tra cơ học." },
            { q: "Quy trình chuyển sổ diễn ra đúng thứ tự:", options: ["a. Sổ tài khoản -> Phân tích -> Nhật ký", "b. Nhật ký -> Phân tích -> Sổ tài khoản", "c. Nhật ký -> Sổ tài khoản -> Phân tích", "d. Phân tích -> Nhật ký -> Sổ tài khoản"], answer: 3, explain: "Bước 1: Phân tích; Bước 2: Ghi Nhật ký; Bước 3: Chuyển Sổ tài khoản (Sổ cái)." },
            { q: "Trả $300 tiền thuê nhà cho tháng 3 (trả trước), ghi bút toán:", options: ["a. Nợ Chi Phí Trả Trước 300 / Có Tiền 300", "b. Nợ Chi Phí Thuê 300/ Có Tiền 300", "c. Nợ Chi Phí Thuê / Có Phải Trả 300", "d. Nợ Tiền Thuê Phải Trả / Có Doanh Thu"], answer: 0, explain: "Trả trước tiền thuê cho tương lai được xem là Tài sản (Chi phí trả trước)." },
            { q: "Hàng mua đang đi đường (FOB điểm đi):", options: ["a. Chưa nhận nên không thuộc tồn kho", "b. Không thuộc tồn kho", "c. Thiếu chứng từ nên không thuộc", "d. Thuộc hàng tồn kho"], answer: 3, explain: "FOB shipping point: hàng đã giao cho đơn vị vận chuyển là đã thuộc sở hữu bên mua." },
            { q: "Tài khoản Nợ phải trả (Liability accounts) là:", options: ["a. Lời hứa miệng...", "b. Quyền lợi của DN...", "c. Nghĩa vụ phải thực hiện cho chủ nợ đối với tài sản...", "d. Tiền đã ứng trước cho người bán."], answer: 2, explain: "Nợ phải trả là nghĩa vụ hiện tại của DN phải thanh toán bằng nguồn lực của mình." },
            { q: "Phương pháp nhập trước xuất trước – FIFO:", options: ["a. Giả định lô mua đầu thì tồn kho cuối kỳ", "b. Giả định lô mua đầu xuất bán sau cùng", "c. Giả định lô mua sau cùng xuất trước", "d. Giả định lô mua đầu tiên được xuất bán trước hết"], answer: 3, explain: "First-In, First-Out: Hàng vào kho trước sẽ được ưu tiên xuất kho trước." },
            { q: "Tồn 10 cái giá 100; Nhập 50 cái giá 110; Cuối kỳ còn 20 cái. Giá trị hàng xuất theo FIFO:", options: ["a. 3.000", "b. 4.500", "c. 6.280", "d. 4.300"], answer: 3, explain: "Tổng 60 cái, tồn 20 -> Xuất 40. Xuất 10 cái cũ (10x100) + 30 cái mới (30x110) = 4.300." },
            { q: "Báo cáo kết quả hoạt động (Income Statement):", options: ["a. Các TK trên báo cáo này là thường xuyên", "b. Thể hiện tính cân bằng phương trình KT", "c. Là báo cáo tại một thời điểm nhất định", "d. Báo cáo tình hình doanh thu, thu nhập, chi phí trong MỘT KỲ kế toán"], answer: 3, explain: "BCKQHĐ đo lường hiệu quả hoạt động trong một khoảng thời gian (kỳ)." },
            { q: "Tồn kho cuối kỳ bị ghi cao hơn 3,000 thì sẽ làm cho:", options: ["a. Giá vốn hàng bán bị ghi cao hơn 3,000", "b. Chi phí hoạt động bị thấp hơn 3,000", "c. Lợi nhuận thuần bị ghi thấp hơn 3,000", "d. Lợi nhuận thuần bị ghi cao hơn 3,000"], answer: 3, explain: "Tồn kho cuối kỳ CAO -> Giá vốn THẤP -> Lợi nhuận CAO." },
            { q: "Đặc điểm của Báo cáo kết quả hoạt động:", options: ["a. Là báo cáo về doanh thu, thu nhập và chi phí phát sinh TRONG MỘT KỲ kế toán.", "b. Là báo cáo tại một thời điểm nhất định.", "c. Gồm các TK thường xuyên.", "d. Thể hiện cân bằng PTKT."], answer: 0, explain: "Phản ánh luồng dữ liệu mang tính thời kỳ." },
            { q: "Phát sinh chi phí quảng cáo nhưng chưa trả tiền ảnh hưởng PTKT thế nào?", options: ["a. Nợ phải trả tăng, vốn chủ sở hữu giảm", "b. Tài sản tăng, vốn chủ sở hữu tăng", "c. Tài sản tăng, nợ phải trả tăng", "d. Tài sản giảm, vốn chủ sở hữu giảm"], answer: 0, explain: "Chưa trả tiền -> Tăng Nợ phải trả. Phát sinh chi phí -> Giảm Lợi nhuận (Giảm Vốn CSH)." },
            { q: "Lô hàng A giá gốc 100, giá bán dự kiến 80, chi phí vận chuyển & bán 5. Giá trị thuần có thể thực hiện (NRV) là:", options: ["a. 80", "b. 105", "c. 15", "d. 75"], answer: 3, explain: "NRV = Giá bán dự kiến (80) - Chi phí ước tính hoàn thành và bán (5) = 75." },
            { q: "Tổng nợ phải trả tăng $30.000 và Vốn CSH tăng $10.000, tổng tài sản sẽ:", options: ["a. Tăng $40.000", "b. Giảm $20.000", "c. Tăng $20.000", "d. Giảm $40.000"], answer: 0, explain: "Tài sản = Nợ phải trả + Vốn CSH = (+30k) + (+10k) = Tăng 40.000." },
            { q: "“Chỉ ghi chép các giao dịch có thể thể hiện bằng tiền” là nguyên tắc/giả định nào?", options: ["a. Nguyên tắc giá gốc", "b. Nguyên tắc ghi nhận doanh thu", "c. Giả định đơn vị kinh tế", "d. Giả định đơn vị tiền tệ"], answer: 3, explain: "Giả định đơn vị tiền tệ (Monetary Unit) quy định chỉ ghi nhận những gì lượng hóa được bằng tiền." },
            { q: "Tồn 10 cái (100); Nhập 50 cái (110); Xuất 40 cái, Tồn 20 cái. Tính tồn kho cuối kỳ theo FIFO:", options: ["a. (10*100)+(50*110)-[(10*100)+(30*110)]", "b. 20 * 110 = 2.200", "c. 50*110 - 30*110 = 2.200", "d. (10*100)+(40*110)-[(10*100)+(30*110)]"], answer: 1, explain: "Theo FIFO, xuất hàng cũ trước. 20 cái tồn lại cuối kỳ hoàn toàn là hàng nhập sau cùng giá 110." },
            { q: "Quy trình kế toán được sắp xếp thứ tự đúng như sau:", options: ["a. Ghi chép, Xác định, Cung cấp thông tin", "b. Cung cấp thông tin, Ghi chép, Xác định", "c. Xác định, Ghi chép, Cung cấp thông tin", "d. Xác định, Cung cấp thông tin, Ghi chép"], answer: 2, explain: "Xác định (Identify) -> Ghi chép (Record) -> Cung cấp thông tin báo cáo (Communicate)." }
        ];

        // ================= DỮ LIỆU ĐỀ SỐ 2 =================
        const de2_questions = [
            { q: "Sự “trình bày trung thực” có nghĩa là:", options: ["A. Có thể bỏ qua một vài thông tin trọng yếu", "B. Tuyệt đối không được có bất cứ sai sót nào dù là rất nhỏ đi chăng nữa", "C. Đầy đủ các thông tin trọng yếu và tuân thủ đầy đủ các chuẩn mực liên quan", "D. Mô tả không cần chính xác và có thể thiên vị"], answer: 2, explain: "Trình bày trung thực (Faithful representation) yêu cầu thông tin phải đầy đủ, khách quan và không có sai sót trọng yếu." },
            { q: "Đầu tháng 9, tồn kho $4,000. Mua hàng $7,800. Ngày 31 tháng 9, tồn kho $3,200. Giá vốn hàng bán là:", options: ["A. $8,600", "B. $7,800", "C. $600", "D. $11,800"], answer: 0, explain: "Giá vốn = Tồn đầu (4000) + Nhập trong kỳ (7800) - Tồn cuối (3200) = 8,600." },
            { q: "Bán thu tiền ngay 90,000, bán chịu 210,000. Giảm giá và hàng bán trả lại 7,500, chiết khấu thương mại 2,000. Doanh thu thuần là:", options: ["A. 330,700", "B. 290,500", "C. 292,500", "D. 300,000"], answer: 1, explain: "Doanh thu tổng = 90k + 210k = 300k. Các khoản giảm trừ = 7,500 + 2,000. DT Thuần = 300k - 7.5k - 2k = 290,500." },
            { q: "Các bút toán điều chỉnh cuối kỳ có thể được chia thành hai nhóm:", options: ["A. Hoãn lại và ứng trước", "B. Dồn tích và phân bổ (Accruals & Deferrals)", "C. Trả trước và hoãn lại", "D. Dồn tích và ứng trước"], answer: 1, explain: "Hai nhóm chính của bút toán điều chỉnh là Accruals (Dồn tích - Ghi nhận chưa thu/chi tiền) và Deferrals (Phân bổ/Hoãn lại - Đã thu/chi tiền nhưng chưa ghi nhận DT/CP)." },
            { q: "Nhân viên thiết kế làm thêm giờ 28/2. Đầu tháng 3 gửi thông báo nợ, giữa tháng 3 nhận tiền. Tiền lương ghi nhận vào chi phí trong:", options: ["A. Thời kỳ mà người lao động nhận được tiền", "B. Tháng 2", "C. Tháng 3", "D. Tùy thuộc vào thời điểm thanh toán"], answer: 1, explain: "Nguyên tắc phù hợp (Matching Principle): Chi phí phát sinh tạo ra doanh thu ở tháng 2 thì ghi nhận vào tháng 2." },
            { q: "Đã thực hiện dịch vụ 500$ nhưng chưa thu tiền, chưa xuất hoá đơn, chưa ghi sổ. Kế toán cần lập bút toán điều chỉnh:", options: ["A. Ghi nợ Phải thu khách hàng và ghi có Doanh thu chưa thực hiện", "B. Chưa xuất hóa đơn nên không ghi gì", "C. Ghi nợ Phải thu khách hàng và ghi có Doanh thu dịch vụ", "D. Ghi nợ Doanh thu chưa thực hiện và ghi có Doanh thu dịch vụ"], answer: 2, explain: "Dịch vụ đã hoàn thành thì được ghi nhận doanh thu dồn tích (Nợ Khoản phải thu / Có Doanh thu)." },
            { q: "Tài khoản chi phí trả trước là các nội dung sau, NGOẠI TRỪ:", options: ["A. Gồm bảo hiểm, thuê, dịch vụ trả trước", "B. Là tài sản đại diện cho chi phí trong tương lai", "C. Khi chi phí phát sinh nhưng tiền chưa chi, phải điều chỉnh tính vào chi phí", "D. Số tiền trên TK trả trước được chuyển sang chi phí bằng bút toán điều chỉnh"], answer: 2, explain: "Ý C là mô tả của 'Chi phí phải trả' (Accrued expenses), không phải 'Chi phí trả trước' (Prepaid expenses)." },
            { q: "Nếu bên mua sử dụng hệ thống KKTX đồng ý điều khoản vận chuyển FOB điểm đi (Shipping point), thì:", options: ["A. Hãng vận tải sẽ chịu chi phí vận chuyển", "B. Bên bán sẽ chịu chi phí vận chuyển", "C. Tài khoản hàng hóa tồn kho sẽ không bị ảnh hưởng", "D. Tài khoản hàng hóa tồn kho sẽ được tăng lên"], answer: 3, explain: "FOB Shipping point: Người mua chịu phí vận chuyển. Phí này được cộng thẳng vào giá gốc của Hàng hóa tồn kho." },
            { q: "Tài khoản nào sau đây không sử dụng trong công ty dịch vụ?", options: ["A. Doanh thu chưa thực hiện", "B. Chi phí hoạt động", "C. Giá vốn hàng bán", "D. Doanh thu dịch vụ"], answer: 2, explain: "Công ty dịch vụ bán chất xám/nhân công, không có sản phẩm vật lý nên không có tài khoản Giá vốn hàng bán (COGS)." },
            { q: "Tiền công phải trả 350 cuối T10 và 280 cuối T11. Chi phí tiền công T11 là 1,800. Tiền chi trả trong T11 là:", options: ["A. 2,430", "B. 1,870", "C. 1,730", "D. 1,170"], answer: 1, explain: "Dư đầu (350) + CP phát sinh (1800) - Tiền đã chi (X) = Dư cuối (280) => X = 350 + 1800 - 280 = 1,870." },
            { q: "Nhận 150 triệu KH ứng trước năm 2020 để làm dịch vụ năm 2021. Nguyên tắc nào yêu cầu ghi nhận DT vào năm 2021?", options: ["A. Giả định hoạt động liên tục", "B. Nguyên tắc giá gốc", "C. Giả định đơn vị kinh doanh", "D. Cơ sở dồn tích và nguyên tắc ghi nhận doanh thu"], answer: 3, explain: "Nguyên tắc ghi nhận doanh thu quy định DT chỉ được ghi nhận khi dịch vụ thực sự đã được thực hiện (năm 2021)." },
            { q: "Nếu Lợi nhuận sau thuế là 84, thuế suất 30%, tổng chi phí 252, thì tổng doanh thu là:", options: ["A. 372", "B. 400", "C. 120", "D. 156"], answer: 0, explain: "LN trước thuế = LN sau thuế / (1 - 0.3) = 84 / 0.7 = 120. Doanh thu = LNTT + Chi phí = 120 + 252 = 372." },
            { q: "Bảng CĐT cuối kỳ có tổng số dư Nợ lớn hơn tổng số dư Có là 700. Lỗi nào dẫn đến chênh lệch này?", options: ["A. Khoản làm tăng Doanh thu 350 lại ghi vào bên Nợ TK Doanh thu 350", "B. Số dư tài khoản Rút vốn lại ghi vào bên cột Có", "C. Ghi trùng 2 lần cho một bút toán", "D. Ghi nhầm 700 vào bên Nợ TK Tiền thay vì bên Nợ TK Phải thu"], answer: 0, explain: "Doanh thu đúng ra ghi Có 350, lại ghi Nợ 350 -> Cột Nợ bị dư 350, Cột Có bị thiếu 350 -> Chênh lệch Nợ và Có = 350 + 350 = 700." },
            { q: "Trước khi thực hiện bút toán điều chỉnh cho khoản mục chi phí trả trước:", options: ["A. Tài sản và lợi nhuận bị phản ánh cao", "B. Tài sản bị phản ánh thấp còn lợi nhuận bị phản ánh cao", "C. Tài sản và chi phí bị phản ánh thấp", "D. Tài sản và lợi nhuận bị phản ánh thấp"], answer: 0, explain: "Chưa phân bổ CP trả trước -> Tài sản không giảm (cao) và Chi phí không tăng -> Lợi nhuận cao." },
            { q: "Báo cáo KQHĐ Lợi nhuận thuần $4,000. Phát hiện bỏ qua Chi phí bảo hiểm hết hạn $700. LN thuần sau điều chỉnh là:", options: ["A. $4,700", "B. $3,300", "C. $4,000", "D. $5,400"], answer: 1, explain: "Lợi nhuận đúng = Lợi nhuận ban đầu (4,000) - Chi phí bổ sung (700) = 3,300." },
            { q: "Đi thuê một văn phòng, sẽ KHÔNG ghi vào tài khoản nào:", options: ["A. Chi phí thuê", "B. Tiền thuê trả trước", "C. Doanh thu tiền thuê chưa được hưởng", "D. Tiền thuê phải trả"], answer: 2, explain: "Mình là người đi thuê (trả tiền), không phải người cho thuê nên không có 'Doanh thu tiền thuê'." },
            { q: "Doanh thu dịch vụ chưa thực hiện phát sinh từ việc:", options: ["A. Đã thực hiện và đã ghi nhận như nợ phải trả trước khi nhận tiền", "B. Đã phát sinh và đã nhận tiền, đã ghi nhận", "C. Đã thực hiện nhưng vẫn chưa nhận được tiền, chưa ghi nhận", "D. Đã nhận tiền và ghi nhận như một khoản nợ phải trả trước khi hoàn tất dịch vụ"], answer: 3, explain: "Khách hàng ứng trước tiền nhưng DN chưa cung cấp dịch vụ -> Nợ phải trả (DT chưa thực hiện)." },
            { q: "Chi phí vận chuyển hàng tồn kho:", options: ["A. Khi bán hàng tồn kho, tính vào giá hàng tồn kho", "B. Chi phí vận chuyển hàng mua tính vào chi phí hoạt động", "C. Chi phí bán và mua hàng đều là khoản giảm trừ doanh thu", "D. Khi bán hàng tồn kho, chi phí vận chuyển là chi phí hoạt động"], answer: 3, explain: "Khi MUA: CPVC tính vào Giá gốc Hàng tồn kho. Khi BÁN: CPVC tính vào Chi phí bán hàng (Chi phí hoạt động)." },
            { q: "Vật tư tồn đầu kỳ $100, nhập trong kỳ $50, tồn cuối kỳ $30. Bút toán điều chỉnh vật tư sẽ là:", options: ["A. Nợ Chi phí vật tư 50 / Có Vật tư 50", "B. Nợ Chi phí vật tư 120 / Có Vật tư 120", "C. Nợ Vật tư 30 / Có Chi phí Vật tư 30", "D. Không cần điều chỉnh"], answer: 1, explain: "Chi phí vật tư tiêu hao = 100 + 50 - 30 = 120. Bút toán ghi nhận chi phí và giảm tài sản vật tư." },
            { q: "Tồn kho Đầu kỳ + Nhập trong kỳ - Tồn kho Cuối kỳ = Giá vốn. Do vậy, tồn kho đầu kỳ bị ghi thấp thì sẽ làm cho:", options: ["A. Số nhập trong kỳ bị ghi thấp hơn", "B. Lợi nhuận bị ghi thấp hơn", "C. Giá vốn hàng bán trong kỳ bị ghi thấp hơn", "D. Số nhập trong kỳ bị ghi cao hơn"], answer: 2, explain: "Tồn đầu kỳ THẤP -> Giá vốn hàng bán THẤP -> Lợi nhuận CAO. (Chọn C vì phản ánh đúng nhất logic công thức tính Giá vốn)." },
            { q: "Nhập kho lô hàng mua $200,000, trả 50%. CP vận chuyển người mua chịu $10,000. Chiết khấu thương mại 2%. Giá gốc là:", options: ["A. 98,000", "B. 206,000", "C. 196,000", "D. 205,800"], answer: 1, explain: "Giá sau CK = 200k * 98% = 196k. Cộng chi phí vận chuyển 10k = 206k." },
            { q: "Bước cuối cùng trong chu trình kế toán là:", options: ["A. Ghi bút toán khóa sổ", "B. Lập báo cáo tài chính", "C. Lập bảng cân đối thử sau khóa sổ", "D. Điều chỉnh"], answer: 2, explain: "Sau khi khóa sổ các TK tạm thời, bước chốt cuối cùng là lập Bảng cân đối thử sau khóa sổ để kiểm tra các TK thường xuyên." },
            { q: "Quá trình xác định lợi nhuận cần xem xét các nội dung sau, NGOẠI TRỪ:", options: ["A. Vấn đề hoạt động liên tục", "B. Nguyên tắc phù hợp", "C. Vấn đề ghi nhận", "D. Vấn đề kỳ kế toán"], answer: 0, explain: "Xác định LN dựa trên: Kỳ kế toán, Ghi nhận DT, Phù hợp CP. Hoạt động liên tục là giả định chung cho BCTC, không trực tiếp xác định LN." },
            { q: "Bảng cân đối thử sau khóa sổ liệt kê số dư của các tài khoản:", options: ["A. Doanh thu bảo hiểm chưa thực hiện", "B. Xác định kết quả kinh doanh", "C. Doanh thu bảo hiểm", "D. Chi phí bảo hiểm"], answer: 0, explain: "Bảng này chỉ chứa TK Thường xuyên (Tài sản, NPT, VCSH). A là Nợ phải trả. B, C, D là TK tạm thời đã bị khóa sổ về 0." },
            { q: "Tài khoản chi phí trả trước là các nội dung sau, NGOẠI TRỪ:", options: ["A. Khi chi phí phát sinh nhưng tiền chưa chi, phải điều chỉnh tính vào chi phí", "B. Gồm bảo hiểm trả trước, thuê, dịch vụ trả trước", "C. Là tài sản đại diện cho chi phí trong tương lai", "D. Số tiền chuyển sang CP bằng bút toán điều chỉnh cuối kỳ"], answer: 0, explain: "Ý A định nghĩa khoản Chi phí phải trả (Accrued expenses), không phải Chi phí trả trước." },
            { q: "Bước cuối cùng trong chu trình kế toán là:", options: ["A. Ghi bút toán khóa sổ", "B. Lập bảng cân đối thử sau khóa sổ", "C. Điều chỉnh", "D. Lập báo cáo tài chính"], answer: 1, explain: "Bước cuối cùng là Bảng cân đối thử sau khóa sổ (Post-closing trial balance)." },
            { q: "Nếu không thực hiện bút toán điều chỉnh cho doanh thu dồn tích:", options: ["A. Lợi nhuận thuần được xác định cao hơn", "B. Chi phí được xác định cao hơn", "C. Nợ phải trả xác định thấp hơn", "D. Lợi nhuận thuần được xác định thấp hơn"], answer: 3, explain: "Bỏ sót DT dồn tích -> Doanh thu bị ghi thiếu -> Lợi nhuận thuần bị tính thiếu (thấp hơn)." },
            { q: "Ghi nhận DT được hưởng nhưng chưa thu tiền, giao dịch này sẽ ảnh hưởng đến:", options: ["A. Chỉ có BC tình hình tài chính", "B. Chỉ có BC kết quả hoạt động", "C. BC kết quả hoạt động và BC tình hình tài chính", "D. BC KQHĐ, BC lợi nhuận giữ lại và BC tình hình tài chính"], answer: 3, explain: "Tăng Phải thu (BC THTC), Tăng DT (BC KQHĐ). LN tăng làm tăng LN giữ lại (BC LNGL và BC THTC)." },
            { q: "Bỏ sót bút toán điều chỉnh khoản chi phí dồn tích cuối kỳ sẽ làm cho:", options: ["A. Thu nhập thuần bị phản ánh thấp", "B. Cả chi phí và nợ phải trả bị phản ánh thấp", "C. Cả chi phí và nợ phải trả bị phản ánh cao", "D. Cả tài sản và nợ phải trả bị phản ánh cao"], answer: 1, explain: "Quên ghi Nợ Chi phí / Có Nợ phải trả -> Cả Chi phí và Nợ phải trả đều bị ghi thiếu (thấp)." },
            { q: "Bảng cân đối thử chưa điều chỉnh là một bảng kê:", options: ["A. Thể hiện cân bằng DT - CP = LN", "B. Chỉ có những TK thường xuyên", "C. Chỉ có những TK tạm thời", "D. Các tài khoản trong sổ tài khoản và số dư của chúng"], answer: 3, explain: "Trial balance đơn giản là bảng liệt kê tất cả các tài khoản sổ cái và số dư Nợ/Có của chúng tại một thời điểm." },
            { q: "Công việc nào dưới đây KHÔNG thuộc hoạt động trong chu trình kế toán?", options: ["A. Phân tích và giải thích thông tin", "B. Mua hàng hóa cho công ty", "C. Lập báo cáo kế toán", "D. Phân loại sự kiện kinh tế"], answer: 1, explain: "Mua hàng hóa là hoạt động kinh doanh (kinh tế) của doanh nghiệp, không phải một bước trong quy trình xử lý kế toán." },
            { q: "Mua hàng hoá nhập kho 2500 cái, giá đơn vị 8.5/cái, điều khoản n/30. HT KKTX. Bút toán:", options: ["A. Nợ Hàng Tồn Kho / Có Tiền 21,250", "B. Nợ Mua Hàng / Có Phải Trả 21,250", "C. Nợ Phải Trả Người Bán / Có Hàng Tồn Kho 21,250", "D. Nợ Hàng Tồn Kho / Có Phải Trả Người Bán 21,250"], answer: 3, explain: "Mua n/30 (mua chịu) -> Có Phải trả. HT KKTX -> Nợ Hàng tồn kho. Giá = 2500 * 8.5 = 21,250." },
            { q: "Theo hệ thống KKTX, việc mua thiết bị về để BÁN LẠI được ghi nợ vào:", options: ["A. Tài khoản Hàng Hóa", "B. Tài khoản Thiết Bị", "C. Tài khoản Vật Tư", "D. Tài khoản Mua Hàng"], answer: 0, explain: "Tài sản mua về với mục đích bán lại thì được phân loại là Hàng hóa (Inventory)." },
            { q: "Theo hệ thống KKTX, việc mua thiết bị về để bán lại được ghi nợ vào:", options: ["A. Tài khoản Vật Tư", "B. Tài khoản Mua Hàng", "C. Tài khoản Thiết Bị", "D. Tài khoản Hàng Hóa"], answer: 3, explain: "Trùng câu trên. Ghi nợ vào TK Hàng hóa." },
            { q: "Nhân viên làm thêm giờ cuối T2. Đầu T3 thông báo, giữa T3 thanh toán. Tiền lương ghi nhận vào chi phí trong:", options: ["A. Tháng 2", "B. Thời kỳ nhận tiền", "C. Tháng 3", "D. Tùy thuộc thời điểm thanh toán"], answer: 0, explain: "Theo nguyên tắc phù hợp, chi phí phát sinh T2 phải ghi nhận T2." },
            { q: "Trích khấu hao thiết bị KD trong kỳ (nguyên giá 1,000,000, thời gian 10 kỳ):", options: ["A. Nợ Khấu hao luỹ kế / Có CP khấu hao 1,000,000", "B. Nợ CP khấu hao / Có Khấu hao luỹ kế 100,000", "C. Nợ CP khấu hao / Có Khấu hao luỹ kế 1,000,000", "D. Nợ Thiết bị / Có Khấu hao luỹ kế 1,000,000"], answer: 1, explain: "Khấu hao 1 kỳ = 1.000.000 / 10 = 100.000. Ghi Nợ CP Khấu hao / Có KHLK." },
            { q: "Bút toán điều chỉnh cuối kỳ KHÔNG áp dụng cho trường hợp nào?", options: ["A. Có khoản chi phí dồn tích", "B. Có khoản chi phí trả trước cần phân bổ", "C. Có sai sót cần chỉnh sửa", "D. Có khoản doanh thu dồn tích"], answer: 2, explain: "Chỉnh sửa sai sót là bút toán sửa sai (correcting entry), không phải bút toán điều chỉnh định kỳ (adjusting entry)." },
            { q: "Nếu không thực hiện bút toán điều chỉnh cho doanh thu dồn tích:", options: ["A. Lợi nhuận thuần được xác định cao hơn", "B. Nợ phải trả xác định thấp hơn", "C. Lợi nhuận thuần được xác định thấp hơn", "D. Chi phí được xác định cao hơn"], answer: 2, explain: "Bỏ sót DT -> DT thấp -> Lợi nhuận thuần bị thấp." },
            { q: "Số dư thông thường TK Phải thu KH là $2,000 (bên Nợ), khi lên bảng CĐT lại ghi vào cột Có $2,000:", options: ["A. Tổng cộng hai bên đều bị thiếu $2,000", "B. Làm bảng cân đối thử bị chênh lệch $4,000", "C. Tổng cộng hai bên đều bị thừa $2,000", "D. Làm bảng cân đối thử bị chênh lệch $2,000"], answer: 1, explain: "Bên Nợ mất đi 2000, bên Có tự dưng tăng thêm 2000 => Khoảng cách (chênh lệch) giữa Nợ và Có bị doãng ra thành 4,000." },
            { q: "Ghi bút toán điều chỉnh là:", options: ["A. Từ nguyên tắc ghi nhận doanh thu và nguyên tắc phù hợp liên quan đến 2 hay nhiều kỳ", "B. Chuẩn bị tài khoản tập hợp doanh thu, CP cho kỳ sau", "C. Điều chỉnh tài khoản lãi lỗ trong kỳ", "D. Điều chỉnh hằng ngày số dư tài khoản tài sản..."], answer: 0, explain: "Mục đích cốt lõi của điều chỉnh là để đáp ứng nguyên tắc Cơ sở dồn tích (ghi nhận DT và nguyên tắc phù hợp CP) khi giao dịch vắt ngang qua nhiều kỳ." }

        // ================= DỮ LIỆU ĐỀ SỐ 3 =================
        const de3_questions = [
            { q: "Nguyên tắc kế toán nào yêu cầu tài sản phải được ghi nhận theo giá thực tế mua tài sản đó tại thời điểm hình thành?", options: ["A. Nguyên tắc phù hợp", "B. Nguyên tắc thận trọng", "C. Nguyên tắc giá gốc", "D. Nguyên tắc hoạt động liên tục"], answer: 2, explain: "Nguyên tắc giá gốc (Historical Cost Principle) quy định tài sản phải được ghi nhận theo giá đã trả để có được chúng, không phụ thuộc vào sự thay đổi giá trị thị trường." },
            { q: "Mục đích chính của kế toán tài chính là gì?", options: ["A. Cung cấp thông tin cho các nhà quản trị nội bộ doanh nghiệp", "B. Cung cấp thông tin cho các đối tượng bên ngoài doanh nghiệp (nhà đầu tư, cơ quan thuế...)", "C. Lập kế hoạch ngân sách cho năm tới", "D. Quyết định giá bán sản phẩm"], answer: 1, explain: "Kế toán tài chính tập trung vào việc lập BCTC để cung cấp cho người sử dụng bên ngoài, khác với kế toán quản trị phục vụ nội bộ." },
            { q: "Phương trình kế toán cơ bản được thể hiện như thế nào?", options: ["A. Tài sản = Nợ phải trả - Vốn chủ sở hữu", "B. Tài sản = Nợ phải trả + Vốn chủ sở hữu", "C. Tài sản + Nợ phải trả = Vốn chủ sở hữu", "D. Vốn chủ sở hữu = Tài sản + Nợ phải trả"], answer: 1, explain: "Tài sản của DN được hình thành từ 2 nguồn: Nguồn vốn vay (Nợ phải trả) và nguồn vốn tự có (Vốn CSH)." },
            { q: "Khi doanh nghiệp mua chịu hàng hóa (chưa thanh toán), giao dịch này ảnh hưởng đến phương trình kế toán như thế nào?", options: ["A. Tài sản tăng, Vốn CSH giảm", "B. Tài sản tăng, Nợ phải trả tăng", "C. Tài sản giảm, Nợ phải trả giảm", "D. Nợ phải trả tăng, Vốn CSH tăng"], answer: 1, explain: "Hàng hóa (Tài sản) tăng lên, đồng thời khoản Phải trả người bán (Nợ phải trả) cũng tăng lên một lượng tương ứng." },
            { q: "Tài khoản nào sau đây có số dư thông thường bên Có?", options: ["A. Tiền mặt", "B. Chi phí bán hàng", "C. Phải thu khách hàng", "D. Doanh thu bán hàng"], answer: 3, explain: "Các tài khoản Nợ phải trả, Vốn CSH và Doanh thu có số dư thông thường bên Có." },
            { q: "Ghi sổ kép (Double-entry accounting) là nguyên tắc:", options: ["A. Ghi chép vào 2 sổ kế toán khác nhau", "B. Mỗi giao dịch phải được ghi ít nhất vào 1 tài khoản", "C. Tổng số tiền ghi Nợ phải luôn bằng tổng số tiền ghi Có", "D. Ghi nhận gấp đôi doanh thu để tăng báo cáo lợi nhuận"], answer: 2, explain: "Mỗi nghiệp vụ kinh tế phát sinh đều phải ghi Nợ tài khoản này và ghi Có tài khoản khác với số tiền bằng nhau." },
            { q: "Định khoản kế toán là quá trình:", options: ["A. Chuyển số liệu từ Sổ nhật ký sang Sổ cái", "B. Xác định tài khoản nào ghi Nợ, tài khoản nào ghi Có và số tiền bao nhiêu", "C. Lập Bảng cân đối thử", "D. Khóa sổ các tài khoản tạm thời"], answer: 1, explain: "Định khoản là bước phân tích giao dịch để quyết định ghi Nợ/Có các tài khoản liên quan." },
            { q: "Doanh thu chưa thực hiện (Unearned Revenue) thuộc loại tài khoản nào?", options: ["A. Tài sản", "B. Nợ phải trả", "C. Vốn chủ sở hữu", "D. Doanh thu"], answer: 1, explain: "Nhận tiền trước nhưng chưa cung cấp dịch vụ/hàng hóa tạo ra một nghĩa vụ (Nợ phải trả) cho doanh nghiệp trong tương lai." },
            { q: "Bút toán điều chỉnh phân bổ chi phí trả trước (ví dụ: bảo hiểm trả trước) có tác động gì?", options: ["A. Làm tăng Chi phí, giảm Tài sản", "B. Làm giảm Chi phí, tăng Tài sản", "C. Làm tăng Chi phí, tăng Nợ phải trả", "D. Làm giảm Chi phí, giảm Nợ phải trả"], answer: 0, explain: "Ghi Nợ TK Chi phí (tăng CP) và ghi Có TK Chi phí trả trước (giảm Tài sản)." },
            { q: "Nếu quên lập bút toán điều chỉnh cho chi phí dồn tích (Chi phí đã phát sinh nhưng chưa trả tiền), BCTC sẽ bị sai lệch thế nào?", options: ["A. Lợi nhuận bị phản ánh thấp hơn thực tế", "B. Nợ phải trả bị phản ánh cao hơn thực tế", "C. Chi phí bị phản ánh thấp, Lợi nhuận bị phản ánh cao", "D. Tài sản bị phản ánh thấp"], answer: 2, explain: "Quên ghi Nợ Chi phí / Có Nợ phải trả => Chi phí thiếu => Lợi nhuận cao; đồng thời Nợ phải trả cũng bị thiếu." },
            { q: "Bút toán khóa sổ (Closing entries) KHÔNG áp dụng cho tài khoản nào sau đây?", options: ["A. Doanh thu", "B. Chi phí", "C. Lợi nhuận chưa phân phối", "D. Cổ tức / Rút vốn"], answer: 2, explain: "Lợi nhuận chưa phân phối (Retained Earnings) là tài khoản thường xuyên trên Bảng CĐKT, không bị khóa sổ." },
            { q: "Mục đích chính của việc lập Bảng cân đối thử (Trial Balance) là:", options: ["A. Tính ra lợi nhuận thuần của kỳ", "B. Kiểm tra sự cân bằng cơ học giữa Tổng Nợ và Tổng Có của các Sổ cái", "C. Báo cáo tình hình tài chính cho cơ quan thuế", "D. Đảm bảo mọi giao dịch đều được ghi chép không có sai sót nào"], answer: 1, explain: "Bảng cân đối thử chỉ chứng minh Tổng Nợ = Tổng Có, không phát hiện được lỗi bỏ sót giao dịch hoặc định khoản sai tài khoản." },
            { q: "Điều kiện giao hàng FOB Destination (Giao hàng tại đích đến) nghĩa là:", options: ["A. Người mua chịu chi phí vận chuyển", "B. Người bán chịu chi phí vận chuyển, rủi ro chuyển giao khi hàng đến tay người mua", "C. Hàng đi đường thuộc sở hữu của người mua", "D. Cước phí vận chuyển được ghi nhận vào Giá gốc hàng tồn kho của người mua"], answer: 1, explain: "FOB Destination: Người bán trả phí vận chuyển (Freight-out) và ghi nhận là Chi phí bán hàng. Hàng thuộc sở hữu người bán cho đến khi đến đích." },
            { q: "Chiết khấu thanh toán (Sales/Purchase Discount) được hưởng khi mua hàng được hạch toán như thế nào đối với người mua (theo hệ thống KKTX)?", options: ["A. Ghi nhận là Doanh thu hoạt động tài chính", "B. Làm giảm trực tiếp Giá trị Hàng tồn kho", "C. Ghi nhận vào Chi phí bán hàng", "D. Bỏ qua không ghi sổ"], answer: 1, explain: "Trong Kê khai thường xuyên, chiết khấu thanh toán mua hàng làm giảm giá gốc hàng tồn kho (Ghi Có TK Hàng tồn kho)." },
            { q: "Trong phương pháp tính giá Hàng tồn kho, phương pháp nào trong thời kỳ lạm phát (giá tăng) sẽ cho ra Lợi nhuận gộp cao nhất?", options: ["A. FIFO (Nhập trước, Xuất trước)", "B. LIFO (Nhập sau, Xuất trước)", "C. Bình quân gia quyền", "D. Đích danh"], answer: 0, explain: "FIFO xuất những mặt hàng cũ (giá rẻ hơn) vào Giá vốn hàng bán -> Giá vốn thấp -> Lợi nhuận cao nhất." },
            { q: "Công ty M có: Doanh thu bán hàng $100.000, Hàng bán bị trả lại $5.000, Chiết khấu thương mại $2.000. Doanh thu thuần là:", options: ["A. $100.000", "B. $95.000", "C. $93.000", "D. $98.000"], answer: 2, explain: "Doanh thu thuần = Doanh thu tổng - Hàng bán bị trả lại - Chiết khấu. = 100.000 - 5.000 - 2.000 = 93.000." },
            { q: "Đặc điểm cơ bản của Tài sản Cố định (TSCĐ) là gì?", options: ["A. Có giá trị lớn, thời gian sử dụng trên 1 năm, không nhằm mục đích bán lại trong kỳ", "B. Dùng để bán cho khách hàng", "C. Chỉ bao gồm máy móc, không bao gồm đất đai", "D. Được luân chuyển toàn bộ giá trị vào một chu kỳ sản xuất"], answer: 0, explain: "TSCĐ được sử dụng lâu dài (trên 1 năm) cho hoạt động kinh doanh và khấu hao dần." },
            { q: "Khấu hao tài sản cố định (Depreciation) là quá trình:", options: ["A. Xác định giá trị thị trường hiện tại của tài sản", "B. Phân bổ một cách có hệ thống nguyên giá của tài sản vào chi phí trong suốt thời gian sử dụng hữu ích", "C. Lập quỹ tiền mặt để mua tài sản mới trong tương lai", "D. Đánh giá sự giảm sút chất lượng vật lý của tài sản"], answer: 1, explain: "Khấu hao là quá trình phân bổ chi phí, không phải quá trình định giá hay lập quỹ." },
            { q: "Nguyên giá của một TSCĐ mua mới KHÔNG bao gồm khoản nào sau đây?", options: ["A. Giá mua ghi trên hóa đơn", "B. Thuế nhập khẩu (không được hoàn lại)", "C. Chi phí đào tạo nhân viên sử dụng máy ban đầu", "D. Chi phí bảo dưỡng máy định kỳ hàng năm sau khi đưa vào sử dụng"], answer: 3, explain: "Chi phí bảo dưỡng định kỳ sau khi tài sản đã hoạt động bình thường được ghi nhận là Chi phí hoạt động trong kỳ, không cộng vào Nguyên giá." },
            { q: "Giá trị sổ sách (Book Value) của một tài sản cố định được tính bằng:", options: ["A. Nguyên giá + Khấu hao lũy kế", "B. Nguyên giá - Giá trị thanh lý ước tính", "C. Giá trị thị trường hiện tại của tài sản", "D. Nguyên giá - Khấu hao lũy kế"], answer: 3, explain: "Giá trị sổ sách = Nguyên giá ban đầu trừ đi phần giá trị đã hao mòn (Khấu hao lũy kế)." },
            { q: "Báo cáo nào sau đây phản ánh dòng tiền thu vào và chi ra của doanh nghiệp trong một thời kỳ?", options: ["A. Bảng cân đối kế toán", "B. Báo cáo kết quả hoạt động", "C. Báo cáo lưu chuyển tiền tệ", "D. Thuyết minh báo cáo tài chính"], answer: 2, explain: "Báo cáo lưu chuyển tiền tệ (Cash Flow Statement) cho biết dòng tiền vào/ra từ hoạt động kinh doanh, đầu tư và tài chính." },
            { q: "Trên Bảng cân đối kế toán, tài sản được sắp xếp theo tiêu chí nào?", options: ["A. Từ thời gian sử dụng lâu nhất đến ngắn nhất", "B. Theo mức độ thanh khoản giảm dần (dễ chuyển thành tiền nhất xếp trên cùng)", "C. Sắp xếp theo thứ tự bảng chữ cái", "D. Tài sản vô hình xếp trước tài sản hữu hình"], answer: 1, explain: "Theo thông lệ, tài sản được sắp xếp theo tính thanh khoản giảm dần (Tiền -> Phải thu -> Tồn kho -> TSCĐ)." },
            { q: "Việc ghi nhận doanh thu khi khách hàng chưa thanh toán tiền nhưng dịch vụ đã hoàn thành tuân thủ nguyên tắc/cơ sở nào?", options: ["A. Cơ sở tiền mặt", "B. Cơ sở dồn tích", "C. Nguyên tắc trọng yếu", "D. Nguyên tắc nhất quán"], answer: 1, explain: "Cơ sở dồn tích (Accrual basis) yêu cầu ghi nhận giao dịch vào lúc nó phát sinh, không quan tâm dòng tiền đã thực thu/chi hay chưa." },
            { q: "Tài khoản 'Khấu hao lũy kế' là loại tài khoản gì?", options: ["A. Tài khoản Nợ phải trả", "B. Tài khoản Chi phí", "C. Tài khoản Điều chỉnh giảm Tài sản (Contra-asset)", "D. Tài khoản Vốn chủ sở hữu"], answer: 2, explain: "Khấu hao lũy kế có số dư bên Có, đi kèm và làm giảm giá trị của tài sản tương ứng trên Bảng CĐKT." },
            { q: "Lợi nhuận giữ lại (Retained Earnings) cuối kỳ bằng:", options: ["A. LN giữ lại đầu kỳ + Lợi nhuận thuần trong kỳ", "B. LN giữ lại đầu kỳ + Doanh thu - Cổ tức", "C. LN giữ lại đầu kỳ + Lợi nhuận thuần - Cổ tức (hoặc Rút vốn)", "D. Tổng tài sản - Tổng nợ phải trả"], answer: 2, explain: "Lợi nhuận giữ lại tăng do Lợi nhuận thuần sinh ra và giảm do chia cổ tức cho cổ đông." },
            { q: "Nếu Công ty thanh toán một khoản nợ phải trả bằng tiền mặt, điều kiện nào sau đây xảy ra đối với phương trình kế toán?", options: ["A. Tổng tài sản không đổi, Nợ phải trả giảm", "B. Tài sản giảm, Vốn chủ sở hữu giảm", "C. Tài sản giảm, Nợ phải trả giảm", "D. Nợ phải trả giảm, Vốn chủ sở hữu tăng"], answer: 2, explain: "Tiền mặt (Tài sản) giảm và khoản Phải trả (Nợ phải trả) giảm một lượng tương ứng." },
            { q: "Tài khoản nào sau đây KHÔNG xuất hiện trên Báo cáo kết quả hoạt động?", options: ["A. Doanh thu dịch vụ", "B. Chi phí giá vốn hàng bán", "C. Cổ tức đã trả", "D. Chi phí lãi vay"], answer: 2, explain: "Cổ tức không phải là chi phí của doanh nghiệp, nó được phản ánh trên Báo cáo Lợi nhuận giữ lại làm giảm Vốn CSH." },
            { q: "Chu kỳ kế toán (Accounting cycle) thường kết thúc bằng bước nào?", options: ["A. Ghi nhật ký các giao dịch", "B. Lập Bảng cân đối thử sau khóa sổ", "C. Lập Báo cáo tài chính", "D. Phân tích chứng từ"], answer: 1, explain: "Bước cuối cùng là lập Post-closing trial balance để chuẩn bị các Sổ cái cho chu kỳ tiếp theo." },
            { q: "Chi phí tiền lương phát sinh trong tháng 12 nhưng đến mùng 5 tháng 1 năm sau mới thanh toán. Tháng 12 kế toán phải ghi nhận:", options: ["A. Không ghi nhận gì cho đến khi trả tiền", "B. Ghi Nợ TK Chi phí lương / Có TK Phải trả người lao động", "C. Ghi Nợ TK Tiền mặt / Có TK Chi phí lương", "D. Ghi Nợ TK Chi phí trả trước / Có TK Tiền mặt"], answer: 1, explain: "Đó là bút toán điều chỉnh chi phí dồn tích (Accrued expenses) theo nguyên tắc phù hợp." },
            { q: "Công ty nhận hóa đơn điện nước tháng này nhưng chưa trả tiền. Giao dịch này làm:", options: ["A. Tăng Tài sản và Tăng Nợ phải trả", "B. Giảm Tài sản và Giảm Vốn CSH", "C. Tăng Chi phí (Giảm Vốn CSH) và Tăng Nợ phải trả", "D. Không có thay đổi gì"], answer: 2, explain: "Ghi nhận chi phí phát sinh làm giảm Lợi nhuận (giảm VCSH), đồng thời tăng khoản nợ phải trả người bán." },
            { q: "Khoản mục nào sau đây là 'Tài sản vô hình'?", options: ["A. Hàng tồn kho", "B. Bằng sáng chế, Thương hiệu", "C. Máy móc thiết bị", "D. Chứng khoán kinh doanh"], answer: 1, explain: "Tài sản vô hình là tài sản không có hình thái vật chất nhưng có giá trị và mang lại lợi ích kinh tế (bằng sáng chế, phần mềm, bản quyền...)." },
            { q: "Sổ nhật ký chung (General Journal) có chức năng gì?", options: ["A. Phân loại các giao dịch theo từng tài khoản riêng biệt", "B. Ghi chép các nghiệp vụ kinh tế phát sinh theo trình tự thời gian", "C. Tính toán lợi nhuận thuần", "D. Cung cấp số dư cuối kỳ của mọi tài khoản"], answer: 1, explain: "Sổ nhật ký là cuốn sổ ghi chép ban đầu theo trình tự thời gian (chronological order) của mọi giao dịch." },
            { q: "Số dư của tài khoản 'Rút vốn' (Drawing) vào cuối kỳ kế toán sẽ được kết chuyển (khóa sổ) sang tài khoản nào?", options: ["A. Chi phí hoạt động", "B. Xác định kết quả kinh doanh", "C. Vốn chủ sở hữu (hoặc Lợi nhuận giữ lại)", "D. Tiền mặt"], answer: 2, explain: "Tài khoản Rút vốn là TK tạm thời, cuối kỳ kết chuyển trừ thẳng vào Vốn chủ sở hữu." },
            { q: "Nếu một giao dịch bị ghi nhầm 2 lần vào cả Nhật ký và Sổ cái, Bảng cân đối thử sẽ:", options: ["A. Bị lệch, Tổng Nợ lớn hơn Tổng Có", "B. Bị lệch, Tổng Có lớn hơn Tổng Nợ", "C. Vẫn cân bằng", "D. Từ chối không cho lập báo cáo"], answer: 2, explain: "Ghi đúp 1 giao dịch đúng cả Nợ và Có thì Tổng Nợ vẫn bằng Tổng Có, Bảng CĐT không phát hiện được lỗi này." },
            { q: "Hệ thống kế toán Kiểm kê định kỳ (Periodic Inventory System) xác định Giá vốn hàng bán vào lúc nào?", options: ["A. Sau mỗi lần xuất bán hàng", "B. Bất cứ khi nào ban giám đốc yêu cầu", "C. Chỉ tính một lần vào cuối kỳ kế toán dựa trên kiểm kê thực tế", "D. Dựa trên ước tính doanh thu hàng ngày"], answer: 2, explain: "Đặc trưng của KKĐK là không theo dõi giá vốn liên tục, mà phải đợi đến cuối kỳ kiểm kê kho mới dùng công thức: GVHB = Đầu kỳ + Nhập - Cuối kỳ." },
            { q: "Kế toán mua một cái kẹp giấy dùng trong văn phòng với giá 10k, thay vì ghi nhận vào TSCĐ để khấu hao nhiều năm, kế toán ghi ngay vào Chi phí trong kỳ. Điều này áp dụng nguyên tắc/khái niệm nào?", options: ["A. Nguyên tắc thận trọng", "B. Nguyên tắc giá gốc", "C. Khái niệm trọng yếu (Materiality)", "D. Nguyên tắc nhất quán"], answer: 2, explain: "Trọng yếu cho phép các khoản có giá trị quá nhỏ không cần áp dụng cứng nhắc các quy định phức tạp (như khấu hao) mà có thể ghi nhận ngay vào chi phí để tiết kiệm thời gian." },
            { q: "Nợ tiềm tàng (Contingent Liability) ví dụ như bị kiện chưa có phán quyết, thường được trình bày ở đâu?", options: ["A. Ghi nhận là Nợ phải trả trên Bảng CĐKT", "B. Khai báo trong phần Thuyết minh BCTC nếu khả năng xảy ra là có thể", "C. Ghi nhận là Chi phí trên Báo cáo KQHĐ", "D. Không được nhắc đến ở bất kỳ đâu"], answer: 1, explain: "Nợ tiềm tàng chưa chắc chắn xảy ra thì không ghi sổ mà chỉ công bố trong Bản thuyết minh để cảnh báo." },
            { q: "Nếu doanh nghiệp thu tiền của khách hàng nợ từ kỳ trước, giao dịch này làm:", options: ["A. Tăng Doanh thu, Tăng Tiền", "B. Tăng Tiền, Giảm Phải thu khách hàng (Tổng tài sản không đổi)", "C. Giảm Tiền, Giảm Nợ phải trả", "D. Tăng Phải thu, Tăng Vốn CSH"], answer: 1, explain: "Thu nợ: Nợ TK Tiền mặt / Có TK Phải thu khách hàng. Một tài sản tăng đổi lấy một tài sản giảm." },
            { q: "Nguyên tắc thận trọng (Conservatism) yêu cầu kế toán viên làm gì?", options: ["A. Luôn đánh giá tài sản ở mức cao nhất có thể", "B. Không ghi nhận các khoản lỗ dự kiến", "C. Ghi nhận chi phí và nợ phải trả ngay khi có bằng chứng về khả năng phát sinh, nhưng không ghi nhận doanh thu cho đến khi chắc chắn", "D. Phải nộp thuế đầy đủ đúng hạn"], answer: 2, explain: "Thận trọng nghĩa là không đánh giá quá cao tài sản và thu nhập, không đánh giá quá thấp nợ và chi phí." },
            { q: "Tài khoản 'Chiết khấu bán hàng' (Sales Discounts) có số dư thông thường bên nào và bản chất là gì?", options: ["A. Số dư bên Có, là tài khoản Doanh thu", "B. Số dư bên Nợ, là tài khoản Điều chỉnh giảm Doanh thu (Contra-revenue)", "C. Số dư bên Nợ, là tài khoản Chi phí hoạt động", "D. Số dư bên Có, là tài khoản Nợ phải trả"], answer: 1, explain: "Chiết khấu bán hàng làm giảm tổng doanh thu, nên nó có tính chất ngược với tài khoản Doanh thu (tăng Nợ, dư Nợ)." }
        ];

        // ================= DỮ LIỆU ĐỀ SỐ 4 =================
        const de4_questions = [
            { q: "Kế toán được định nghĩa là một hệ thống thông tin thực hiện 3 hoạt động cơ bản nào?", options: ["A. Xác định, ghi chép và cung cấp thông tin", "B. Phân tích, tổng hợp và báo cáo", "C. Ghi nhật ký, chuyển sổ và lập báo cáo", "D. Mua hàng, bán hàng và thu tiền"], answer: 0, explain: "Kế toán bao gồm 3 hoạt động cơ bản: xác định (nhận diện giao dịch), ghi chép (lưu trữ lịch sử tài chính) và cung cấp thông tin (lập báo cáo tài chính) cho người sử dụng." },
            { q: "Đối tượng nào sau đây là người sử dụng thông tin kế toán BÊN NGOÀI doanh nghiệp?", options: ["A. Giám đốc marketing", "B. Giám sát sản xuất", "C. Nhà đầu tư (Cổ đông)", "D. Giám đốc tài chính (CFO)"], answer: 2, explain: "Người sử dụng bên ngoài là các cá nhân/tổ chức ngoài công ty muốn có thông tin tài chính, phổ biến nhất là Nhà đầu tư và Chủ nợ." },
            { q: "Chuẩn mực Báo cáo Tài chính Quốc tế (IFRS) được ban hành bởi tổ chức nào?", options: ["A. FASB", "B. IASB", "C. SEC", "D. GAAP"], answer: 1, explain: "IFRS được ban hành bởi Ủy ban Chuẩn mực Kế toán Quốc tế (IASB - International Accounting Standards Board)." },
            { q: "Nguyên tắc nào yêu cầu tài sản phải được ghi nhận theo số tiền thực tế đã bỏ ra để có được chúng, bất kể sự thay đổi giá trị trên thị trường sau này?", options: ["A. Nguyên tắc giá trị hợp lý", "B. Nguyên tắc thận trọng", "C. Nguyên tắc giá gốc (giá lịch sử)", "D. Nguyên tắc phù hợp"], answer: 2, explain: "Nguyên tắc giá lịch sử (giá gốc) quy định tài sản được ghi chép bằng chi phí bỏ ra ban đầu và giữ nguyên trong suốt thời gian nắm giữ." },
            { q: "Giả định nào yêu cầu các hoạt động của doanh nghiệp phải được ghi chép tách biệt hoàn toàn với các hoạt động cá nhân của chủ sở hữu?", options: ["A. Giả định hoạt động liên tục", "B. Giả định đơn vị tiền tệ", "C. Giả định kỳ kế toán", "D. Giả định đơn vị kinh tế"], answer: 3, explain: "Giả định đơn vị kinh tế (Economic Entity Assumption) đòi hỏi hoạt động của đơn vị phải tách bạch với chủ sở hữu và các đơn vị khác." },
            { q: "Phương trình kế toán cơ bản được thể hiện như thế nào?", options: ["A. Tài sản = Nợ phải trả - Vốn chủ sở hữu", "B. Tài sản + Nợ phải trả = Vốn chủ sở hữu", "C. Tài sản = Nợ phải trả + Vốn chủ sở hữu", "D. Nợ phải trả = Tài sản + Vốn chủ sở hữu"], answer: 2, explain: "Tài sản của doanh nghiệp luôn được hình thành từ hai nguồn: Nợ phải trả (nguồn vốn vay) và Vốn chủ sở hữu (nguồn vốn tự có)." },
            { q: "Khoản mục nào sau đây KHÔNG thuộc Vốn chủ sở hữu?", options: ["A. Vốn cổ phần phổ thông", "B. Lợi nhuận giữ lại", "C. Doanh thu", "D. Phải trả người bán"], answer: 3, explain: "Phải trả người bán là một nghĩa vụ nợ, thuộc nhóm Nợ phải trả (Liabilities), không thuộc Vốn chủ sở hữu." },
            { q: "Thành phần nào sau đây làm GIẢM Vốn chủ sở hữu?", options: ["A. Doanh thu", "B. Cổ tức và Chi phí", "C. Phát hành thêm cổ phiếu", "D. Các khoản đầu tư của cổ đông"], answer: 1, explain: "Vốn chủ sở hữu tăng nhờ Doanh thu và Vốn góp, nhưng sẽ bị giảm do Chi phí phát sinh và việc trả Cổ tức cho cổ đông." },
            { q: "Một công ty mua thiết bị bằng tiền mặt trị giá $5,000. Giao dịch này ảnh hưởng đến phương trình kế toán như thế nào?", options: ["A. Tăng Tài sản $5,000 và Tăng Nợ phải trả $5,000", "B. Giảm Tài sản $5,000 và Giảm Vốn CSH $5,000", "C. Một tài sản (Thiết bị) tăng $5,000 và một tài sản khác (Tiền) giảm $5,000", "D. Tăng Tài sản $5,000 và Tăng Vốn CSH $5,000"], answer: 2, explain: "Việc mua thiết bị bằng tiền mặt chỉ làm thay đổi cơ cấu tài sản: Tài sản Thiết bị tăng lên và Tài sản Tiền mặt giảm đi tương ứng, tổng tài sản không đổi." },
            { q: "Công ty thực hiện dịch vụ cho khách hàng và thu ngay bằng tiền mặt $2,000. Ảnh hưởng của giao dịch này là:", options: ["A. Tăng Tài sản và Tăng Nợ phải trả", "B. Tăng Tài sản và Tăng Vốn CSH", "C. Giảm Tài sản và Giảm Vốn CSH", "D. Tăng Nợ phải trả và Giảm Vốn CSH"], answer: 1, explain: "Thu tiền (Tăng Tài sản là Tiền mặt) từ việc cung cấp dịch vụ (Tăng Doanh thu, dẫn đến Tăng Vốn CSH)." },
            { q: "Thanh toán khoản nợ $1,000 cho nhà cung cấp (người bán) sẽ làm:", options: ["A. Giảm Tài sản và Giảm Nợ phải trả", "B. Tăng Tài sản và Tăng Nợ phải trả", "C. Giảm Tài sản và Giảm Vốn CSH", "D. Giảm Nợ phải trả và Tăng Vốn CSH"], answer: 0, explain: "Trả nợ bằng tiền làm giảm Tiền mặt (Tài sản giảm) và giảm Phải trả người bán (Nợ phải trả giảm)." },
            { q: "Báo cáo nào sau đây trình bày Doanh thu và Chi phí trong một khoảng thời gian cụ thể?", options: ["A. Báo cáo tình hình tài chính", "B. Báo cáo lợi nhuận giữ lại", "C. Báo cáo lưu chuyển tiền tệ", "D. Báo cáo kết quả hoạt động (Income Statement)"], answer: 3, explain: "Báo cáo kết quả hoạt động (Income Statement) trình bày doanh thu, chi phí và lợi nhuận thuần trong một kỳ kế toán." },
            { q: "Báo cáo tình hình tài chính (Bảng cân đối kế toán) báo cáo các yếu tố nào?", options: ["A. Doanh thu, Chi phí, Lợi nhuận", "B. Dòng tiền thu vào và chi ra", "C. Tài sản, Nợ phải trả, Vốn chủ sở hữu tại một thời điểm", "D. Sự thay đổi của lợi nhuận giữ lại"], answer: 2, explain: "Báo cáo tình hình tài chính giống như một bức ảnh chụp nhanh về Tài sản, Nợ phải trả và Vốn CSH tại một ngày cụ thể." },
            { q: "Tài khoản (Account) có hình thức cơ bản giống chữ cái nào?", options: ["A. Chữ I", "B. Chữ T", "C. Chữ V", "D. Chữ U"], answer: 1, explain: "Hình thức cơ bản của tài khoản gồm 3 phần: Tên, Bên Trái (Nợ) và Bên Phải (Có), tạo thành hình chữ T (T-account)." },
            { q: "Thuật ngữ 'Bên Nợ' (Debit) trong kế toán có nghĩa là gì?", options: ["A. Luôn luôn là sự gia tăng", "B. Luôn luôn là sự giảm sút", "C. Bên phải của tài khoản", "D. Bên trái của tài khoản"], answer: 3, explain: "Bên Nợ (Debit) chỉ đơn giản là thuật ngữ chỉ 'Bên Trái' của một tài khoản. Nó không đồng nghĩa với việc tăng hay giảm (tùy thuộc vào loại tài khoản)." },
            { q: "Nhóm tài khoản nào sau đây có 'Số dư bình thường' (Normal Balance) nằm ở bên NỢ?", options: ["A. Tài sản, Chi phí, Cổ tức", "B. Nợ phải trả, Vốn CSH, Doanh thu", "C. Tài sản, Nợ phải trả, Vốn CSH", "D. Doanh thu, Chi phí, Cổ tức"], answer: 0, explain: "Tài sản, Chi phí và Cổ tức được ghi Tăng bên Nợ, do đó số dư thông thường của chúng cũng nằm ở bên Nợ." },
            { q: "Quy tắc ghi chép đối với tài khoản Nợ phải trả (Liabilities) là gì?", options: ["A. Tăng ghi Nợ, Giảm ghi Có", "B. Tăng ghi Có, Giảm ghi Nợ", "C. Cả Tăng và Giảm đều ghi Nợ", "D. Cả Tăng và Giảm đều ghi Có"], answer: 1, explain: "Nợ phải trả (và Vốn CSH, Doanh thu) có quy tắc hạch toán: Phát sinh Tăng ghi bên Có, phát sinh Giảm ghi bên Nợ." },
            { q: "Bước đầu tiên trong quy trình ghi chép (Recording Process) của kế toán là gì?", options: ["A. Nhập giao dịch vào Sổ cái", "B. Lập Bảng cân đối thử", "C. Chuyển sổ (Posting)", "D. Phân tích từng giao dịch kinh tế"], answer: 3, explain: "Quy trình ghi chép bắt đầu bằng việc Phân tích giao dịch, sau đó Ghi Sổ Nhật ký, và cuối cùng là Chuyển Sổ (sang Sổ cái)." },
            { q: "Sổ Nhật ký chung (General Journal) ghi chép các giao dịch theo trình tự nào?", options: ["A. Theo thứ tự bảng chữ cái", "B. Theo mức độ quan trọng", "C. Theo trình tự thời gian phát sinh", "D. Theo số tiền từ cao xuống thấp"], answer: 2, explain: "Sổ Nhật ký là sổ ghi chép gốc (book of original entry), nơi các giao dịch được ghi lại theo đúng trình tự thời gian (chronological order)." },
            { q: "Quá trình chuyển số liệu từ Sổ Nhật ký sang các tài khoản tương ứng trong Sổ Cái được gọi là:", options: ["A. Ghi sổ kép (Double-entry)", "B. Định khoản (Journalizing)", "C. Chuyển sổ (Posting)", "D. Phân tích (Analyzing)"], answer: 2, explain: "Chuyển sổ (Posting) là công việc lấy dữ liệu Nợ/Có từ Sổ Nhật ký để điền vào các tài khoản riêng biệt trong Sổ Cái." },
            { q: "Bảng cân đối thử (Trial Balance) dùng để làm gì?", options: ["A. Tính toán lợi nhuận thuần của kỳ", "B. Kiểm tra sự cân bằng cơ học (Tổng Nợ = Tổng Có) của sổ cái", "C. Lập báo cáo lưu chuyển tiền tệ", "D. Thay thế cho Bảng Cân đối kế toán"], answer: 1, explain: "Bảng cân đối thử liệt kê số dư của mọi tài khoản để chứng minh rằng Tổng Nợ luôn bằng Tổng Có sau khi chuyển sổ." },
            { q: "Bảng cân đối thử có thể phát hiện được mọi sai sót không?", options: ["A. Có, nó tìm ra mọi lỗi sai", "B. Không, ví dụ như bỏ sót không ghi sổ nguyên một giao dịch thì bảng vẫn cân", "C. Không, bảng này chỉ tìm được lỗi sai tên công ty", "D. Có, nếu cân thì chắc chắn 100% không có lỗi"], answer: 1, explain: "Bảng cân đối thử không phát hiện được lỗi nếu: (1) Bỏ quên nguyên 1 nghiệp vụ; (2) Ghi đúp 1 nghiệp vụ; (3) Ghi sai tên tài khoản nhưng vẫn ghi đúng số tiền Nợ/Có." },
            { q: "Công ty vay ngân hàng $10,000. Kế toán sẽ ghi bút toán thế nào?", options: ["A. Nợ Tiền $10,000 / Có Thương phiếu phải trả (Nợ vay) $10,000", "B. Nợ Thương phiếu phải trả $10,000 / Có Tiền $10,000", "C. Nợ Doanh thu $10,000 / Có Tiền $10,000", "D. Nợ Tiền $10,000 / Có Vốn CSH $10,000"], answer: 0, explain: "Tiền mặt (Tài sản) tăng nên ghi Nợ. Thương phiếu phải trả (Nợ phải trả) tăng nên ghi Có." },
            { q: "Doanh thu làm TĂNG Vốn chủ sở hữu, vậy tài khoản Doanh thu có quy tắc ghi chép như thế nào?", options: ["A. Tăng ghi Nợ, số dư bên Nợ", "B. Giảm ghi Có, số dư bên Có", "C. Tăng ghi Có, số dư bên Có", "D. Tăng ghi Có, số dư bên Nợ"], answer: 2, explain: "Vì Doanh thu làm tăng Vốn CSH (có số dư bên Có), nên tài khoản Doanh thu cũng được ghi Tăng bên Có và có số dư bình thường bên Có." },
            { q: "Nếu Tổng Tài sản là $100,000 và Vốn chủ sở hữu là $60,000. Tổng Nợ phải trả là bao nhiêu?", options: ["A. $40,000", "B. $160,000", "C. $100,000", "D. $60,000"], answer: 0, explain: "Tài sản = Nợ phải trả + Vốn CSH => Nợ phải trả = 100,000 - 60,000 = $40,000." },
            { q: "Thanh toán bằng tiền mặt $500 cho hóa đơn tiền điện tháng này sẽ được ghi sổ như thế nào?", options: ["A. Nợ Tiền $500 / Có Chi phí tiện ích $500", "B. Nợ Chi phí tiện ích $500 / Có Tiền $500", "C. Nợ Phải trả người bán $500 / Có Tiền $500", "D. Nợ Tiền $500 / Có Doanh thu $500"], answer: 1, explain: "Chi phí tiền điện phát sinh làm tăng Chi phí (Ghi Nợ Chi phí tiện ích) và chi trả làm giảm Tiền mặt (Ghi Có Tiền)." },
            { q: "Hệ thống kế toán kép (Double-entry system) đòi hỏi điều gì?", options: ["A. Mỗi giao dịch phải được ghi vào 2 sổ khác nhau", "B. Giao dịch phải được kiểm tra 2 lần", "C. Mỗi giao dịch phải có Tổng số tiền ghi Nợ bằng Tổng số tiền ghi Có", "D. Tất cả các tài khoản đều có 2 số dư"], answer: 2, explain: "Ghi sổ kép nghĩa là mọi giao dịch đều ảnh hưởng ít nhất đến 2 tài khoản sao cho Tổng Nợ luôn luôn bằng Tổng Có." },
            { q: "Tài khoản 'Cổ tức' (Dividends) đại diện cho điều gì?", options: ["A. Khoản chi phí kinh doanh của công ty", "B. Sự phân phối lợi nhuận cho các cổ đông", "C. Một khoản Nợ phải trả cho nhà cung cấp", "D. Khoản doanh thu nhận từ khoản đầu tư"], answer: 1, explain: "Cổ tức là sự chia sẻ lợi nhuận cho cổ đông, làm giảm Lợi nhuận giữ lại (Vốn CSH), nhưng nó KHÔNG phải là một Chi phí của hoạt động kinh doanh." },
            { q: "Một công ty thu trước $3,000 của khách hàng cho dịch vụ sẽ thực hiện vào tháng sau. Khoản tiền này được phân loại là gì?", options: ["A. Doanh thu dịch vụ (Tăng Doanh thu)", "B. Chi phí trả trước (Tài sản)", "C. Doanh thu chưa thực hiện (Nợ phải trả)", "D. Khoản phải thu khách hàng (Tài sản)"], answer: 2, explain: "Nhận tiền trước nhưng chưa cung cấp dịch vụ tạo ra một nghĩa vụ phải thực hiện (Doanh thu chưa thực hiện - Unearned Revenue), thuộc nhóm Nợ phải trả." },
            { q: "Sự kiện nào sau đây KHÔNG ĐƯỢC ghi chép vào sổ kế toán?", options: ["A. Mua một chiếc ô tô tải để giao hàng", "B. Trả lương cho nhân viên tháng này", "C. Ký hợp đồng thuê giám đốc điều hành mới", "D. Phân chia cổ tức cho cổ đông"], answer: 2, explain: "Việc ký hợp đồng hay phỏng vấn nhân viên chưa làm thay đổi Tài sản, Nợ phải trả hay Vốn CSH nên không được ghi nhận là một giao dịch kế toán." },
            { q: "Bút toán phức tạp (Compound entry) là gì?", options: ["A. Bút toán khó định khoản", "B. Bút toán yêu cầu từ ba tài khoản trở lên", "C. Bút toán có số tiền rất lớn", "D. Bút toán điều chỉnh cuối kỳ"], answer: 1, explain: "Bút toán giản đơn ảnh hưởng tới 2 tài khoản. Bút toán phức tạp là bút toán ghi Nợ/Có liên quan đến từ 3 tài khoản trở lên." },
            { q: "Sổ cái (Ledger) chứa những thông tin gì?", options: ["A. Chỉ có thông tin về tiền mặt", "B. Chỉ liệt kê các hóa đơn chứng từ", "C. Toàn bộ các tài khoản của doanh nghiệp cùng với số dư của chúng", "D. Trình tự thời gian của các giao dịch chưa phân loại"], answer: 2, explain: "Sổ cái (General Ledger) là tập hợp tất cả các tài khoản (Tài sản, Nợ, Vốn CSH, Doanh thu, Chi phí) dùng để theo dõi sự biến động và số dư của từng khoản mục." },
            { q: "Tài khoản 'Chi phí trả trước' (Prepaid Expenses) thuộc nhóm nào?", options: ["A. Chi phí", "B. Nợ phải trả", "C. Tài sản", "D. Vốn chủ sở hữu"], answer: 2, explain: "Chi phí trả trước (ví dụ: Bảo hiểm trả trước, Tiền thuê trả trước) mang lại lợi ích trong tương lai nên được coi là một Tài sản cho đến khi nó được sử dụng hết." },
            { q: "Mua chịu (mua tín dụng) vật tư văn phòng trị giá $800. Bút toán nào sau đây là đúng?", options: ["A. Nợ Vật tư $800 / Có Tiền $800", "B. Nợ Chi phí vật tư $800 / Có Phải trả người bán $800", "C. Nợ Vật tư $800 / Có Phải thu khách hàng $800", "D. Nợ Vật tư $800 / Có Phải trả người bán $800"], answer: 3, explain: "Vật tư mua về nhập kho là Tài sản (Tăng ghi Nợ). Chưa trả tiền nên phát sinh Nợ phải trả người bán (Tăng ghi Có)." },
            { q: "Giả định nào cho phép kế toán viên chia vòng đời kinh tế của doanh nghiệp thành các khoảng thời gian nhân tạo (tháng, quý, năm)?", options: ["A. Giả định hoạt động liên tục", "B. Giả định kỳ kế toán (thời kỳ)", "C. Giả định đơn vị tiền tệ", "D. Giả định cơ sở dồn tích"], answer: 1, explain: "Giả định kỳ kế toán (Periodicity Assumption) cho phép chia cắt thời gian hoạt động để lập các báo cáo tài chính định kỳ." },
            { q: "Tài khoản 'Khấu hao lũy kế' (Accumulated Depreciation) có bản chất là gì?", options: ["A. Là tài khoản Chi phí", "B. Là tài khoản Nợ phải trả", "C. Là tài khoản điều chỉnh giảm Tài sản (Contra-asset)", "D. Là tài khoản Vốn chủ sở hữu"], answer: 2, explain: "Khấu hao lũy kế là tài khoản đi kèm với TSCĐ để ghi nhận hao mòn, có số dư bên Có (ngược chiều với Tài sản) nhằm điều chỉnh giảm giá trị TSCĐ trên BCTC." },
            { q: "Đâu là trình tự chính xác của các Báo cáo tài chính khi lập vào cuối kỳ?", options: ["A. Bảng Cân đối kế toán -> Báo cáo KQHĐ -> Báo cáo LN giữ lại", "B. Báo cáo KQHĐ -> Báo cáo LN giữ lại -> Báo cáo tình hình tài chính (Bảng CĐKT)", "C. Báo cáo lưu chuyển tiền tệ -> Báo cáo KQHĐ -> Bảng CĐKT", "D. Báo cáo LN giữ lại -> Bảng CĐKT -> Báo cáo KQHĐ"], answer: 1, explain: "Phải lập Báo cáo KQHĐ trước để lấy Lợi nhuận thuần. Lợi nhuận thuần đưa sang Báo cáo LN giữ lại. LN giữ lại cuối kỳ được đưa lên phần Vốn CSH trong Báo cáo tình hình tài chính." },
            { q: "Nguồn chính làm tăng Vốn chủ sở hữu của một doanh nghiệp là gì?", options: ["A. Khoản đi vay ngân hàng", "B. Trả cổ tức cho cổ đông", "C. Phát hành cổ phiếu và Doanh thu từ hoạt động kinh doanh", "D. Trả lương cho nhân viên"], answer: 2, explain: "Vốn CSH tăng nhờ vào Vốn góp của chủ sở hữu (phát hành cổ phiếu) và Lợi nhuận giữ lại được tạo ra từ Doanh thu." },
            { q: "Nếu Tổng Tài sản tăng $20,000 và Vốn chủ sở hữu tăng $15,000 trong kỳ, thì Tổng Nợ phải trả sẽ thay đổi thế nào?", options: ["A. Tăng $5,000", "B. Giảm $5,000", "C. Tăng $35,000", "D. Giảm $35,000"], answer: 0, explain: "Tài sản (+20,000) = Nợ phải trả (X) + Vốn CSH (+15,000) => Nợ phải trả X phải là +5,000 (Tăng $5,000)." },
            { q: "Kế toán dựa trên 'Cơ sở dồn tích' (Accrual basis) có nghĩa là gì?", options: ["A. Chỉ ghi nhận khi có tiền mặt ra/vào", "B. Ghi nhận giao dịch khi các sự kiện kinh tế xảy ra, không kể việc tiền đã được thu hay chi chưa", "C. Ghi nhận chi phí vào cuối năm", "D. Bỏ qua các khoản nợ"], answer: 1, explain: "Cơ sở dồn tích yêu cầu doanh thu được ghi nhận khi đã thực hiện xong nghĩa vụ và chi phí được ghi nhận khi phát sinh, độc lập với dòng tiền thực tế." }
        ];

        // ================= DỮ LIỆU ĐỀ SỐ 5 =================
        const de5_questions = [
            { q: "Nguyên tắc ghi nhận doanh thu (Revenue Recognition Principle) quy định doanh thu phải được ghi nhận khi nào?", options: ["A. Khi nhận được tiền từ khách hàng", "B. Vào cuối kỳ kế toán", "C. Khi nghĩa vụ thực hiện đã được thỏa mãn (hàng hóa/dịch vụ đã được chuyển giao)", "D. Khi ký hợp đồng với khách hàng"], answer: 2, explain: "Doanh thu phải được ghi nhận khi công ty đã thực hiện xong nghĩa vụ cung cấp sản phẩm/dịch vụ, bất kể đã thu được tiền hay chưa." },
            { q: "Nguyên tắc phù hợp (Matching Principle / Expense Recognition) yêu cầu điều gì?", options: ["A. Chi phí phải được trả bằng tiền mặt ngay", "B. Chi phí phải được ghi nhận trong cùng kỳ với doanh thu mà nó giúp tạo ra", "C. Tổng tài sản phải phù hợp với Tổng nguồn vốn", "D. Chi phí phải được ghi nhận trước khi có doanh thu"], answer: 1, explain: "Nguyên tắc phù hợp yêu cầu các chi phí dùng để tạo ra doanh thu phải được ghi nhận và báo cáo trong cùng một kỳ kế toán với doanh thu đó." },
            { q: "Bút toán điều chỉnh (Adjusting Entries) được thực hiện vào lúc nào?", options: ["A. Bất cứ khi nào một giao dịch kinh tế xảy ra", "B. Cuối mỗi ngày làm việc", "C. Vào đầu kỳ kế toán tiếp theo", "D. Vào cuối kỳ kế toán (trước khi lập BCTC)"], answer: 3, explain: "Bút toán điều chỉnh được thực hiện vào cuối kỳ kế toán nhằm đảm bảo các nguyên tắc ghi nhận doanh thu và chi phí được tuân thủ đúng đắn." },
            { q: "Bút toán điều chỉnh KHÔNG bao giờ liên quan đến tài khoản nào sau đây?", options: ["A. Tài khoản Tiền mặt (Cash)", "B. Tài khoản Doanh thu", "C. Tài khoản Chi phí", "D. Tài khoản Nợ phải trả"], answer: 0, explain: "Bút toán điều chỉnh luôn liên quan đến một tài khoản trên Bảng CĐKT (Tài sản/Nợ) và một tài khoản trên Báo cáo KQHĐ (Doanh thu/Chi phí). Nó KHÔNG bao giờ liên quan đến tài khoản Tiền mặt." },
            { q: "Chi phí trả trước (Prepaid Expenses) ban đầu được ghi nhận là gì?", options: ["A. Một khoản Chi phí", "B. Một khoản Nợ phải trả", "C. Một khoản Tài sản", "D. Một khoản Doanh thu"], answer: 2, explain: "Chi phí trả trước (ví dụ: trả trước 1 năm tiền thuê nhà) là những khoản đã chi trả bằng tiền nhưng chưa tiêu hao, do đó nó mang lại lợi ích tương lai và được ghi là Tài sản." },
            { q: "Vào cuối kỳ, bút toán điều chỉnh cho 'Chi phí trả trước' đã tiêu hao sẽ được ghi như thế nào?", options: ["A. Nợ Chi phí / Có Chi phí trả trước (Tài sản)", "B. Nợ Chi phí trả trước / Có Chi phí", "C. Nợ Tiền mặt / Có Chi phí", "D. Nợ Chi phí / Có Tiền mặt"], answer: 0, explain: "Khi tài sản (Chi phí trả trước) bị tiêu hao qua thời gian, ta ghi giảm Tài sản (Có Chi phí trả trước) và tăng Chi phí trong kỳ (Nợ Chi phí)." },
            { q: "Doanh thu chưa thực hiện (Unearned Revenues) có bản chất là gì?", options: ["A. Tài sản", "B. Nợ phải trả", "C. Vốn chủ sở hữu", "D. Doanh thu"], answer: 1, explain: "Doanh thu chưa thực hiện là số tiền khách hàng đã trả trước nhưng công ty chưa cung cấp dịch vụ/hàng hóa, do đó nó tạo ra nghĩa vụ phải thực hiện (Nợ phải trả)." },
            { q: "Bút toán điều chỉnh cho 'Doanh thu chưa thực hiện' khi dịch vụ đã được hoàn thành là:", options: ["A. Nợ Doanh thu / Có Doanh thu chưa thực hiện", "B. Nợ Tiền / Có Doanh thu", "C. Nợ Doanh thu chưa thực hiện / Có Doanh thu", "D. Nợ Doanh thu chưa thực hiện / Có Tiền"], answer: 2, explain: "Khi đã cung cấp xong dịch vụ, nghĩa vụ nợ giảm (Nợ Doanh thu chưa thực hiện) và doanh thu chính thức được ghi nhận (Có Doanh thu)." },
            { q: "Chi phí dồn tích (Accrued Expenses) là gì?", options: ["A. Chi phí đã trả tiền nhưng chưa phát sinh", "B. Chi phí đã phát sinh nhưng chưa được thanh toán hoặc chưa ghi sổ", "C. Chi phí ước tính trong tương lai", "D. Khoản phân bổ của tài sản cố định"], answer: 1, explain: "Chi phí dồn tích (ví dụ: lãi vay phải trả, lương phải trả) là các chi phí đã thực tế phát sinh trong kỳ nhưng công ty chưa trả tiền mặt." },
            { q: "Bút toán điều chỉnh cho 'Chi phí dồn tích' (như Lương chưa trả) sẽ là:", options: ["A. Nợ Chi phí Lương / Có Lương phải trả", "B. Nợ Lương phải trả / Có Tiền", "C. Nợ Chi phí Lương / Có Tiền", "D. Nợ Lương phải trả / Có Chi phí Lương"], answer: 0, explain: "Để ghi nhận chi phí phát sinh nhưng chưa trả tiền, ta ghi tăng Chi phí (Nợ) và tăng Nợ phải trả (Có)." },
            { q: "Doanh thu dồn tích (Accrued Revenues) là gì?", options: ["A. Doanh thu đã thu tiền nhưng chưa thực hiện", "B. Doanh thu đã thực hiện nhưng chưa thu tiền và chưa xuất hóa đơn", "C. Khoản tiền đặt cọc của khách hàng", "D. Khoản doanh thu từ việc thanh lý tài sản"], answer: 1, explain: "Doanh thu dồn tích là những dịch vụ đã làm xong, tiền chưa thu và kế toán cũng chưa ghi sổ cho đến khi làm bút toán điều chỉnh cuối kỳ." },
            { q: "Bút toán điều chỉnh cho 'Doanh thu dồn tích' sẽ là:", options: ["A. Nợ Tiền / Có Doanh thu", "B. Nợ Phải thu khách hàng / Có Doanh thu", "C. Nợ Doanh thu / Có Phải thu khách hàng", "D. Nợ Doanh thu chưa thực hiện / Có Doanh thu"], answer: 1, explain: "Dịch vụ đã hoàn thành nhưng chưa thu tiền nên phát sinh Khoản phải thu (Nợ Phải thu) và ghi nhận thu nhập (Có Doanh thu)." },
            { q: "Khấu hao (Depreciation) là quá trình gì?", options: ["A. Đánh giá lại tài sản theo giá trị thị trường", "B. Phân bổ chi phí của Tài sản cố định vào các kỳ kế toán trong suốt thời gian sử dụng hữu ích", "C. Tích lũy tiền mặt để mua tài sản mới", "D. Sửa chữa tài sản bị hư hỏng"], answer: 1, explain: "Khấu hao là quá trình phân bổ (không phải quá trình định giá) giá gốc của TSCĐ vào chi phí kinh doanh qua các kỳ mà tài sản đó mang lại lợi ích." },
            { q: "Tài khoản 'Khấu hao lũy kế' được trình bày ở đâu trên Báo cáo tài chính?", options: ["A. Nằm ở phần Nợ phải trả trên Bảng CĐKT", "B. Nằm ở Báo cáo kết quả hoạt động, trừ vào Doanh thu", "C. Nằm ở phần Tài sản trên Bảng CĐKT, làm khoản mục điều chỉnh giảm cho TSCĐ", "D. Nằm trong Vốn chủ sở hữu"], answer: 2, explain: "Khấu hao lũy kế là tài khoản Contra-asset (tài sản đối ứng), nó nằm bên dưới TSCĐ tương ứng trên Bảng cân đối kế toán để thể hiện sự giảm trừ nguyên giá." },
            { q: "Nếu công ty KHÔNG ghi bút toán điều chỉnh để trích Khấu hao thiết bị, hậu quả là gì?", options: ["A. Chi phí bị cao, Lợi nhuận bị thấp", "B. Chi phí bị thiếu (thấp), Tài sản bị cao, Lợi nhuận thuần bị cao", "C. Nợ phải trả bị cao, Lợi nhuận bị thấp", "D. Không ảnh hưởng đến báo cáo tài chính"], answer: 1, explain: "Bỏ quên bút toán Khấu hao (Nợ Chi phí / Có KH lũy kế) làm cho Chi phí bị thấp đi -> Lợi nhuận ảo (cao hơn thực tế), và Tài sản cũng không bị giảm trừ nên bị cao hơn thực tế." },
            { q: "Công ty mua vật tư $1,000. Cuối kỳ kiểm kê vật tư còn lại $300. Bút toán điều chỉnh sẽ ghi nhận Chi phí vật tư (Supplies Expense) là bao nhiêu?", options: ["A. $1,000", "B. $300", "C. $700", "D. $1,300"], answer: 2, explain: "Vật tư tiêu hao = Đầu kỳ + Mua thêm - Cuối kỳ = 0 + 1,000 - 300 = $700. Bút toán điều chỉnh sẽ ghi Nợ Chi phí vật tư $700 / Có Vật tư $700." },
            { q: "Bảng cân đối thử sau điều chỉnh (Adjusted Trial Balance) được lập khi nào?", options: ["A. Ngay sau khi chuyển sổ các giao dịch hàng ngày", "B. Sau khi các bút toán điều chỉnh đã được ghi nhật ký và chuyển vào sổ cái", "C. Sau khi lập Báo cáo tài chính", "D. Sau bút toán khóa sổ"], answer: 1, explain: "Bảng này được lập sau khi hoàn thành các bút toán điều chỉnh cuối kỳ để kiểm tra lại tính cân bằng Nợ/Có trước khi lập BCTC." },
            { q: "Báo cáo tài chính nào được lập đầu tiên từ Bảng cân đối thử sau điều chỉnh?", options: ["A. Báo cáo tình hình tài chính (Bảng CĐKT)", "B. Báo cáo lưu chuyển tiền tệ", "C. Báo cáo lợi nhuận giữ lại", "D. Báo cáo kết quả hoạt động (Income Statement)"], answer: 3, explain: "Báo cáo KQHĐ được lập đầu tiên để xác định Lợi nhuận thuần. Lợi nhuận này sau đó mới mang sang Báo cáo lợi nhuận giữ lại và cuối cùng lên Bảng CĐKT." },
            { q: "Bút toán khóa sổ (Closing Entries) KHÔNG áp dụng cho loại tài khoản nào?", options: ["A. Doanh thu", "B. Chi phí", "C. Cổ tức", "D. Lợi nhuận giữ lại (Retained Earnings)"], answer: 3, explain: "Bút toán khóa sổ chỉ thực hiện cho các 'Tài khoản tạm thời' (Doanh thu, Chi phí, Cổ tức) để kết chuyển số dư về 0. Lợi nhuận giữ lại là 'Tài khoản thường xuyên' (Real account) nên không bị khóa sổ." },
