            { q: "Nghiệp vụ 'Ghi nhận 1 tháng chi phí khấu hao thiết bị' vào cuối kỳ sẽ làm thay đổi Bảng cân đối kế toán như thế nào?", options: ["A. Làm giảm Tổng Tài sản và giảm Vốn chủ sở hữu", "B. Làm tăng Chi phí và giảm Nợ phải trả", "C. Làm tăng Tài sản và tăng Vốn chủ sở hữu", "D. Không làm thay đổi Bảng cân đối kế toán"], answer: 0, explain: "Khấu hao làm tăng Chi phí -> dẫn đến giảm Lợi nhuận và giảm Vốn CSH. Đồng thời, Khấu hao lũy kế tăng lên làm Giảm Giá trị thuần của Tài sản cố định." },
            { q: "Sổ Nhật ký chung (General Journal) đóng vai trò gì trong chu trình ghi chép kế toán?", options: ["A. Là nơi lưu trữ cuối cùng, tổng hợp số dư của các tài khoản", "B. Giúp ngăn ngừa hoàn toàn mọi gian lận tiền bạc", "C. Là quyển sổ ghi chép ban đầu mọi giao dịch phát sinh theo đúng trình tự thời gian", "D. Dùng để liệt kê số dư phục vụ lập Bảng cân đối kế toán"], answer: 2, explain: "Sổ nhật ký (Journal) là book of original entry. Các sự kiện kinh tế được định khoản Nợ/Có và ghi chép vào đây ngay khi chúng vừa xảy ra." },
            { q: "Một doanh nghiệp có Lợi nhuận gộp $50,000, Chi phí hoạt động kinh doanh $20,000, Chi phí lãi vay $5,000, Thuế TNDN $5,000. Lợi nhuận thuần (Net Income) là bao nhiêu?", options: ["A. $30,000", "B. $25,000", "C. $20,000", "D. $50,000"], answer: 2, explain: "Lợi nhuận thuần = Lợi nhuận gộp - CP Hoạt động - CP Lãi vay - Thuế TNDN = 50,000 - 20,000 - 5,000 - 5,000 = $20,000." },
            { q: "Điều nào sau đây mô tả đúng nhất về Tài khoản 'Chiết khấu mua hàng' (Purchase Discounts) trong hệ thống Kiểm kê định kỳ?", options: ["A. Nó trực tiếp làm tăng giá trị Hàng tồn kho", "B. Nó có số dư thông thường bên Nợ", "C. Nó là tài khoản điều chỉnh giảm (Contra) cho tài khoản Mua hàng (Purchases), có số dư bên Có", "D. Nó được ghi nhận như một khoản Doanh thu bán hàng"], answer: 2, explain: "Tài khoản Mua hàng (Purchases) mang tính chất chi phí nên có số dư bên Nợ. Chiết khấu mua hàng làm giảm chi phí mua hàng nên có số dư đối ứng bên Có." },
            { q: "Nếu vào cuối kỳ kế toán, số lượng Hàng tồn kho cuối kỳ bị nhân viên kiểm kê đếm SÓT (bị đếm thiếu), ảnh hưởng của sai sót này lên BCTC năm HIỆN TẠI là gì?", options: ["A. Giá vốn hàng bán bị tính thiếu, Lợi nhuận ảo cao hơn thực tế", "B. Giá vốn hàng bán bị tính thừa (cao hơn thực tế), Lợi nhuận bị thấp hơn thực tế", "C. Lợi nhuận thuần không bị ảnh hưởng gì", "D. Tổng tài sản bị báo cáo cao hơn thực tế"], answer: 1, explain: "Công thức: GVHB = Tồn Đầu + Mua trong kỳ - Tồn Cuối. Nếu Tồn cuối bị báo cáo THIẾU -> Giá vốn hàng bán sẽ bị tính CAO LÊN -> Lợi nhuận sẽ bị bóp nghẹt (THẤP HƠN thực tế)." },
            { q: "Sự khác biệt cốt lõi giữa Cổ phiếu Phổ thông (Common Stock) và Cổ phiếu Ưu đãi (Preferred Stock) là gì?", options: ["A. Cổ phiếu ưu đãi luôn có quyền biểu quyết cao hơn cổ phiếu phổ thông", "B. Cổ phiếu ưu đãi được ưu tiên chia cổ tức và ưu tiên nhận lại tài sản khi công ty phá sản", "C. Cổ phiếu ưu đãi thực chất là một khoản Nợ phải trả", "D. Cổ đông ưu đãi không bao giờ nhận được cổ tức"], answer: 1, explain: "Cổ phiếu ưu đãi mang lại quyền lợi 'ưu tiên' về mặt tài chính (cổ tức cố định, thanh lý tài sản), nhưng thường phải đánh đổi bằng việc không có quyền biểu quyết điều hành công ty." },
            { q: "Một công ty công bố chia cổ tức 10% bằng cổ phiếu (Stock Dividend) cho các cổ đông hiện hữu. Tổng Vốn chủ sở hữu của công ty sau khi chia sẽ thay đổi như thế nào?", options: ["A. Tăng thêm 10%", "B. Giảm đi 10%", "C. Không thay đổi", "D. Chuyển thành một khoản Nợ phải trả ngân hàng"], answer: 2, explain: "Chia cổ tức bằng cổ phiếu chỉ là nghiệp vụ cấu trúc lại Vốn CSH (Ghi giảm Lợi nhuận giữ lại và Ghi tăng Vốn cổ phần tương ứng). Không có dòng tiền chảy ra ngoài nên Tổng VCSH không đổi." },
            { q: "Một hóa đơn tiền điện $400 của tháng 12 chưa được thanh toán và kế toán cũng quên chưa ghi sổ vào cuối năm. Việc KHÔNG lập bút toán điều chỉnh dồn tích này sẽ dẫn đến hậu quả gì?", options: ["A. Vốn chủ sở hữu bị đánh giá cao hơn thực tế (Overstated)", "B. Nợ phải trả bị đánh giá cao hơn thực tế", "C. Chi phí hoạt động bị đánh giá cao hơn thực tế", "D. Tổng tài sản bị đánh giá thấp hơn thực tế"], answer: 0, explain: "Quên ghi nhận hóa đơn điện (Nợ CP / Có Nợ phải trả) -> Chi phí bị thiếu -> Lợi nhuận tính ra sẽ ảo (cao hơn thực tế) -> Hệ quả là Vốn CSH bị cao hơn thực tế." },
            { q: "Trên Báo cáo Lưu chuyển tiền tệ, khoản tiền lớn thu được từ việc phát hành Trái phiếu dài hạn được báo cáo ở mục nào?", options: ["A. Dòng tiền từ Hoạt động Kinh doanh", "B. Dòng tiền từ Hoạt động Đầu tư", "C. Dòng tiền từ Hoạt động Tài chính", "D. Các thay đổi vốn chủ sở hữu không bằng tiền"], answer: 2, explain: "Việc huy động vốn từ bên ngoài (như phát hành cổ phiếu, phát hành trái phiếu, vay nợ ngân hàng dài hạn) đều thuộc dòng tiền Hoạt động Tài chính (Financing)." },
            { q: "Khi lập Báo cáo LCTT theo phương pháp gián tiếp, sự GIẢM XUỐNG của Hàng tồn kho trong kỳ sẽ được điều chỉnh thế nào vào Dòng tiền HĐKD?", options: ["A. Trừ khỏi Lợi nhuận thuần", "B. Cộng vào Lợi nhuận thuần", "C. Chuyển sang Hoạt động Đầu tư", "D. Bỏ qua không tính"], answer: 1, explain: "Hàng tồn kho giảm nghĩa là công ty đã xuất kho bán bớt hàng (chi phí giá vốn đã trừ vào Lợi nhuận nhưng thực tế không tốn thêm tiền mua hàng trong kỳ). Do đó, lượng tiền giữ lại được nhiều hơn lợi nhuận ghi sổ -> Phải cộng vào Lợi nhuận thuần." },
            { q: "Theo chuẩn mực IFRS, 'Tổn thất tài sản' (Impairment) xảy ra và phải ghi nhận khi nào?", options: ["A. Khi Giá trị sổ sách của tài sản lớn hơn Giá trị có thể thu hồi (Recoverable amount) của nó", "B. Ngay khi công ty quyết định rao bán tài sản", "C. Khi tài sản đã được khấu hao hết 100%", "D. Khi công ty vừa mua một tài sản mới hiện đại hơn"], answer: 0, explain: "Khi một tài sản không còn khả năng tạo ra được lợi ích kinh tế (thu hồi) bằng với mức giá trị đang ghi trên sổ sách, kế toán bắt buộc phải ghi nhận một khoản suy giảm giá trị (Lỗ do tổn thất)." },
            { q: "Để xác định 'Giá trị có thể thu hồi' (Recoverable Amount) trong bài toán kiểm tra Tổn thất tài sản, kế toán phải chọn giá trị nào?", options: ["A. Lấy mức LỚN HƠN giữa: [Giá trị hợp lý trừ chi phí bán] và [Giá trị sử dụng (Value in use)]", "B. Lấy mức NHỎ HƠN giữa Giá gốc và Giá bán", "C. Lấy đúng bằng Giá gốc lịch sử", "D. Lấy bằng chi phí mua tài sản mới tương đương"], answer: 0, explain: "IFRS quy định Giá trị có thể thu hồi là mức tối đa công ty có thể vớt vát được từ tài sản đó: đem bán ngay lấy tiền (Fair value less cost to sell) hoặc tiếp tục sử dụng để sinh lời (Value in use)." },
            { q: "Nguyên tắc 'Thực thể kinh doanh' (Economic Entity Assumption) yêu cầu kế toán viên phải làm gì?", options: ["A. Ghi nhận mọi tài sản theo tỷ lệ lạm phát hàng năm", "B. Tách biệt hoàn toàn tài sản và các giao dịch của chủ doanh nghiệp với tài sản và giao dịch của chính doanh nghiệp", "C. Chỉ lập báo cáo bằng đồng nội tệ", "D. Chỉ ghi sổ các giao dịch có giá trị lớn hơn 100 triệu"], answer: 1, explain: "Công ty là một thực thể độc lập. Nếu giám đốc dùng tiền túi mua xe cho vợ đi chợ, giao dịch đó là việc cá nhân và tuyệt đối không được ghi vào sổ sách chi phí của công ty." },
            { q: "Năm tài chính (Fiscal year) của một công ty cổ phần được hiểu là gì?", options: ["A. Bắt buộc phải luôn trùng khớp với năm dương lịch (từ 1/1 đến 31/12)", "B. Bắt buộc phải bắt đầu vào ngày 1/4 hàng năm", "C. Là một chu kỳ kế toán kéo dài đúng 1 năm (12 tháng liên tục), có thể bắt đầu từ ngày đầu tiên của bất kỳ tháng nào", "D. Là khoảng thời gian do Cơ quan Thuế tự ấn định cho công ty"], answer: 2, explain: "Nhiều công ty đa quốc gia thiết lập năm tài chính bắt đầu từ 1/4, 1/7 hoặc 1/10 để phản ánh đúng chu kỳ hoạt động kinh doanh tự nhiên của họ (Ví dụ: trường học bắt đầu năm tài chính từ tháng 9)." },
            { q: "Bút toán đảo (Reversing Entries) thường được thực hiện vào thời điểm nào?", options: ["A. Bắt buộc phải làm vào cuối mỗi ngày", "B. Làm vào đầu kỳ kế toán mới, là một bước TỰ CHỌN để đơn giản hóa việc hạch toán các khoản thanh toán liên quan đến chi phí/doanh thu dồn tích của kỳ trước", "C. Làm vào giữa kỳ kế toán", "D. Chỉ làm khi phát hiện có gian lận sổ sách"], answer: 1, explain: "Bút toán đảo là bút toán ngược lại chính xác với bút toán điều chỉnh dồn tích của kỳ trước. Nó không bắt buộc, nhưng giúp kế toán viên ở kỳ sau đỡ phải tra cứu lại công nợ cũ khi thực chi tiền." },
            { q: "Tài khoản 'Thuế GTGT được khấu trừ' (VAT Input) phát sinh khi mua hàng hóa có tính chất gì?", options: ["A. Là một tài khoản Nợ phải trả", "B. Là một tài khoản Tài sản (Khoản phải thu từ Nhà nước)", "C. Là một khoản Chi phí hoạt động kinh doanh", "D. Là một khoản Doanh thu"], answer: 1, explain: "Thuế GTGT đầu vào khi mua hàng hóa thực chất là số tiền doanh nghiệp đã ứng trước nộp cho Nhà nước. Nếu đủ điều kiện, số tiền này sẽ được khấu trừ với thuế bán ra hoặc được hoàn lại, nên nó mang bản chất là Tài sản." },
            { q: "Đặc điểm cơ bản của mô hình Công ty hợp danh (Partnership) là gì?", options: ["A. Chịu thuế thu nhập doanh nghiệp ở mức rất cao so với các mô hình khác", "B. Do từ 2 người trở lên cùng làm chủ, các thành viên hợp danh thường chịu trách nhiệm VÔ HẠN bằng tài sản cá nhân và chia sẻ lợi nhuận theo thỏa thuận", "C. Được phép phát hành cổ phiếu tự do trên sàn chứng khoán", "D. Bắt buộc phải có Ban kiểm soát độc lập"], answer: 1, explain: "Công ty hợp danh là hình thức hợp tác kinh doanh của nhiều cá nhân. Nhược điểm lớn nhất là các thành viên hợp danh phải chịu rủi ro bằng toàn bộ tài sản cá nhân nếu công ty vỡ nợ." },
            { q: "Một công ty có Tỷ số Nợ trên Tổng tài sản (Debt to Assets Ratio) là 60%. Con số này nói lên điều gì?", options: ["A. 60% Vốn chủ sở hữu của công ty đang được dùng để mua sắm tài sản", "B. 60% Tổng tài sản của công ty được tài trợ (mua sắm) bằng nguồn vốn vay nợ", "C. Công ty đã mất khả năng thanh toán và đang phá sản", "D. Tỷ suất lợi nhuận ròng của công ty là 60%"], answer: 1, explain: "Tỷ số nợ = Tổng Nợ / Tổng Tài sản = 0.6. Tức là cứ 10 đồng tài sản công ty đang có thì 6 đồng là do đi vay mượn, 4 đồng còn lại mới là tiền thật của cổ đông." },
            { q: "Kỳ thu tiền bình quân = 365 / Vòng quay khoản phải thu. Nếu Vòng quay khoản phải thu của công ty X là 10 vòng/năm, công ty mất trung bình bao nhiêu ngày để đòi được tiền từ khách nợ?", options: ["A. 10 ngày", "B. 36.5 ngày", "C. 365 ngày", "D. Không thể tính được với dữ kiện này"], answer: 1, explain: "Áp dụng công thức: 365 / 10 = 36.5 ngày. Nghĩa là trung bình kể từ lúc xuất hóa đơn bán chịu cho đến lúc khách hàng trả tiền là khoảng 36.5 ngày." },
            { q: "Thuật ngữ 'Window Dressing' (Làm đẹp BCTC) trong tài chính thường chỉ hành động gì?", options: ["A. Thay đổi định dạng, thiết kế bìa Báo cáo tài chính cho đẹp mắt hơn", "B. Các thủ thuật hợp pháp hoặc ở ranh giới xám của ban quản lý nhằm làm cho các chỉ số tài chính (như tính thanh khoản) trông có vẻ tốt hơn thực tế vào thời điểm chốt sổ", "C. Hành vi gian lận trộm cắp tiền mặt trong két", "D. Nâng cấp hệ thống phần mềm kế toán"], answer: 1, explain: "Ví dụ kinh điển của Window Dressing là việc công ty trì hoãn trả tiền cho nhà cung cấp vào cuối tháng 12 để số dư Tiền mặt trên Bảng CĐKT trông nhiều hơn, giúp dễ vay vốn ngân hàng đầu năm sau." },
            { q: "Khi một công ty bán hàng thu tiền ngay qua Thẻ tín dụng (Credit Card) như Visa/Mastercard, khoản phí quẹt thẻ ngân hàng thu sẽ được kế toán xử lý thế nào?", options: ["A. Trừ trực tiếp vào Doanh thu bán hàng", "B. Ghi nhận là Chi phí hoạt động (Chi phí dịch vụ thẻ / Chi phí bán hàng)", "C. Phân bổ vào Giá vốn hàng bán", "D. Yêu cầu khách hàng trả thêm bằng tiền mặt"], answer: 1, explain: "Công ty bán hàng chấp nhận mất một khoản phí hoa hồng cho ngân hàng để đổi lấy dịch vụ thanh toán nhanh, tiện lợi. Khoản phí này được hạch toán là Chi phí hoạt động bán hàng." },
            { q: "Kỹ thuật phân tích BCTC bằng cách chọn một năm gốc làm 100% và tính toán các năm tiếp theo theo tỷ lệ % so với năm gốc được gọi là:", options: ["A. Phân tích dọc (Vertical Analysis)", "B. Phân tích chỉ số (Ratio analysis)", "C. Phân tích xu hướng (Trend Analysis / Phân tích ngang)", "D. Phân tích Dupont"], answer: 2, explain: "Trend analysis gán năm gốc (Base year) là 100%. Số liệu các năm sau = (Số tiền năm sau / Số tiền năm gốc) * 100% để vẽ biểu đồ xem mức độ tăng trưởng hay suy thoái." },
            { q: "Hệ số thanh toán lãi vay (Times Interest Earned) được tính bằng EBIT chia cho Chi phí lãi vay. Hệ số này CÀNG CAO thì có ý nghĩa gì?", options: ["A. Khả năng công ty vỡ nợ, không trả được lãi càng lớn", "B. Khả năng công ty trang trải chi phí lãi vay đúng hạn càng an toàn (Tốt cho chủ nợ)", "C. Công ty đang đóng thuế TNDN rất ít", "D. Công ty đang bị thua lỗ"], answer: 1, explain: "Hệ số này đo lường sức chịu đựng của doanh nghiệp: Lợi nhuận hoạt động làm ra gấp bao nhiêu lần số lãi vay phải trả. Tỷ số càng cao, công ty càng dễ dàng trả lãi, rủi ro vỡ nợ rất thấp." },
            { q: "Giao dịch HĐQT quyết định và thực chi trả cổ tức bằng tiền mặt cho cổ đông làm ảnh hưởng đến phương trình kế toán như thế nào?", options: ["A. Tiền mặt giảm, Nợ phải trả giảm", "B. Tiền mặt giảm, Vốn chủ sở hữu (Lợi nhuận giữ lại) giảm", "C. Lợi nhuận tăng, Tiền mặt tăng", "D. Không có ảnh hưởng nào"], answer: 1, explain: "Tiền thực sự chảy ra ngoài công ty để chia cho cổ đông -> Tài sản Tiền mặt giảm. Nguồn tiền để chia chác này được lấy từ phần Lợi nhuận tích lũy -> Vốn CSH giảm đi." },
            { q: "Nếu số dư tiền gửi ngân hàng theo SỔ SÁCH của công ty là $5,000; biết rằng có một tờ séc đang đi đường $500, và ngân hàng vừa báo Có (thu hộ) một tờ kỳ phiếu $1,000 cho công ty. Số dư tiền gửi SAU CHỈNH HỢP trên sổ sách công ty là bao nhiêu?", options: ["A. $5,500", "B. $4,500", "C. $6,000", "D. $5,000"], answer: 2, explain: "Séc đi đường là khoản tiền công ty đã trừ sổ rồi nhưng ngân hàng chưa trừ, nên nó chỉ cần trừ vào Sổ phụ ngân hàng. Khoản thu hộ $1,000 thì công ty chưa biết nên chưa cộng -> Phải cộng vào Sổ sách công ty: $5,000 + $1,000 = $6,000." },
            { q: "Sổ phụ ngân hàng (Bank Statement) gửi về công ty ghi 'Dư Có' (Credit balance) đối với tài khoản tiền gửi của công ty bạn. Thuật ngữ 'Dư Có' này có nghĩa là gì?", options: ["A. Công ty bạn đang nợ tiền ngân hàng", "B. Ngân hàng đang giữ tiền của công ty bạn (Ngân hàng đang nợ công ty)", "C. Tài khoản của công ty đã bị thấu chi (rút âm)", "D. Tài khoản của công ty đang bị phong tỏa"], answer: 1, explain: "Dưới góc độ kế toán của Ngân hàng, khoản tiền mà khách hàng gửi vào chính là một khoản Nợ phải trả của ngân hàng (luôn ghi tăng bên Có). Do đó 'Dư Có' tức là bạn đang có số dư dương trong tài khoản." },
            { q: "Tài khoản 'Chi phí nghiên cứu và phát triển' (R&D Expense) có bao giờ được vốn hóa thành Tài sản cố định vô hình theo chuẩn IFRS không?", options: ["A. Luôn luôn được vốn hóa", "B. Không bao giờ được vốn hóa dưới mọi hình thức", "C. Chỉ được vốn hóa chi phí giai đoạn 'Phát triển' khi nó thỏa mãn các điều kiện nghiêm ngặt về tính khả thi kỹ thuật và thương mại", "D. Chỉ được vốn hóa chi phí giai đoạn 'Nghiên cứu'"], answer: 2, explain: "Theo IFRS, mọi chi phí trong giai đoạn Nghiên cứu (chưa biết có thành công hay không) bắt buộc phải tính vào chi phí. Chỉ khi bước sang giai đoạn Phát triển (đã có nguyên mẫu chạy được, chắc chắn sinh lời) thì chi phí mới được vốn hóa thành Tài sản vô hình." },
            { q: "Một lô hàng đang trên tàu vận chuyển từ Mỹ về VN theo điều khoản FOB Destination. Vào ngày 31/12 chốt sổ, lô hàng này vẫn lênh đênh trên biển. Lô hàng này sẽ nằm trong Báo cáo tài chính của ai?", options: ["A. Công ty vận chuyển tàu biển", "B. Người bán (ở Mỹ)", "C. Người mua (ở VN)", "D. Không được ai ghi nhận cho đến khi cập cảng"], answer: 1, explain: "FOB Destination nghĩa là hàng chưa đến đích thì rủi ro và quyền sở hữu pháp lý vẫn nằm trong tay Người bán. Người bán phải cộng lô hàng đó vào Tồn kho cuối kỳ của mình." },
            { q: "Chỉ số 'Giá trị sổ sách của một cổ phiếu phổ thông' (Book Value per Share) phản ánh ý nghĩa gì?", options: ["A. Giá trị giao dịch hiện tại của cổ phiếu trên bảng điện chứng khoán", "B. Tổng Vốn chủ sở hữu của cổ đông phổ thông chia cho Số lượng cổ phiếu đang lưu hành", "C. Mệnh giá cố định in trên tờ giấy chứng nhận cổ phiếu", "D. Số tiền mặt cổ tức mà cổ đông chắc chắn sẽ được nhận năm nay"], answer: 1, explain: "Book Value per Share là giá trị tài sản ròng của công ty được phân bổ cho mỗi một cổ phần, nó hoàn toàn dựa trên sổ sách kế toán lịch sử chứ không phản ánh sự kỳ vọng của thị trường (giá cổ phiếu)." },
            { q: "Kế toán mua một bất động sản gộp với giá $100,000, được định giá 20% thuộc về Đất đai (Land) và 80% thuộc về Tòa nhà xưởng (Building). Công ty sẽ tiến hành trích khấu hao như thế nào?", options: ["A. Tính khấu hao cho toàn bộ giá trị $100,000", "B. Chỉ tính khấu hao trên phần giá trị Tòa nhà ($80,000), phần Đất ($20,000) không được tính khấu hao", "C. Khấu hao Đất, không khấu hao Tòa nhà", "D. Ghi nhận toàn bộ $100,000 vào chi phí hoạt động ngay trong kỳ"], answer: 1, explain: "Đất đai là loại tài sản cố định duy nhất có thời gian sử dụng vô hạn nên không bao giờ bị trích khấu hao. Khi mua gộp bất động sản, bắt buộc phải tách bạch giá trị Đất và Tòa nhà để chỉ khấu hao phần Tòa nhà." },
            { q: "Bước lập Bút toán khóa sổ (Closing Entries) vào cuối năm KHÔNG nhằm phục vụ mục đích gì?", options: ["A. Kết chuyển Lợi nhuận hoặc Lỗ thuần của năm vào tài khoản Lợi nhuận giữ lại", "B. Dọn dẹp, đưa số dư của các tài khoản Doanh thu, Chi phí về mức 0", "C. Để tìm ra các gian lận, sai sót trong khâu định khoản ở Sổ cái", "D. Chuẩn bị các tài khoản tạm thời ở trạng thái trống rỗng để sẵn sàng đón nhận số liệu cho kỳ kế toán năm mới"], answer: 2, explain: "Mục đích duy nhất của khóa sổ là kết chuyển số liệu tài khoản tạm thời sang tài khoản thường xuyên (Vốn CSH). Nó là một thao tác cơ học, hoàn toàn không có chức năng đối soát hay tìm lỗi sai kế toán." },
            { q: "Phương pháp Kê khai thường xuyên (Perpetual System) đòi hỏi kế toán phải lập mấy bút toán mỗi khi BÁN ra một lô hàng hóa?", options: ["A. 1 bút toán duy nhất (Ghi nhận Doanh thu bán hàng)", "B. 2 bút toán đồng thời (Một bút toán ghi nhận Doanh thu và Một bút toán ghi nhận Giá vốn hàng bán kèm giảm Hàng tồn kho)", "C. Không cần lập bút toán nào, đợi đến cuối tháng kiểm đếm kho rồi tính một thể", "D. Phải lập 3 bút toán"], answer: 1, explain: "Hệ thống thường xuyên yêu cầu theo dõi sự biến động của kho liên tục. Nên cứ có hàng xuất kho bán là phải có 1 cặp bút toán đi kèm: (1) Nợ Phải thu/Tiền - Có Doanh thu; (2) Nợ Giá vốn - Có Hàng tồn kho." },
            { q: "Khi một Tập đoàn lớn lập Báo cáo tài chính hợp nhất (Consolidated Financial Statements), nguyên tắc xử lý cơ bản nhất là gì?", options: ["A. Cứ lấy báo cáo của mẹ và con cộng ngang các con số lại với nhau là xong", "B. Công ty mẹ và các công ty con được gom lại trình bày như một thực thể kinh tế duy nhất, BẮT BUỘC phải loại trừ triệt để các giao dịch mua bán, vay mượn nội bộ", "C. Chỉ báo cáo tình hình của riêng Công ty mẹ", "D. Lập danh sách liệt kê các công ty con rồi đính kèm Bảng CĐKT"], answer: 1, explain: "BCTC hợp nhất thể hiện bức tranh tài chính toàn cục của cả tập đoàn nhìn từ bên ngoài. Các khoản vay mượn, mua bán hàng hóa giữa mẹ và con phải bị triệt tiêu (loại trừ) trên báo cáo để tránh thổi phồng doanh thu và tài sản ảo." },
            { q: "Loại tài sản 'Thực vật và Động vật sinh sản' (Biological Assets) như một đàn bò sữa hay cánh rừng trồng lấy gỗ, theo chuẩn IFRS được đo lường đánh giá bằng phương pháp nào?", options: ["A. Ghi nhận theo Giá gốc lịch sử và khấu hao đều đặn", "B. Đánh giá lại mỗi kỳ theo Giá trị hợp lý trừ đi chi phí bán ước tính (Fair Value less costs to sell)", "C. Áp dụng Khấu hao đường thẳng 10 năm", "D. Chỉ được ghi chép theo số lượng con/cây, không ghi giá trị tiền"], answer: 1, explain: "IFRS quy định Tài sản sinh học (nông nghiệp) phải được đánh giá dựa trên sự thay đổi giá trị hợp lý (tức là sự sinh trưởng, lớn lên, mập ra của con vật/cái cây) trong mỗi kỳ báo cáo, chứ không thể dùng giá gốc tĩnh như máy móc." },
            { q: "Khoản Vay dài hạn (Long-term Loan / Mortgage) thường mang đặc điểm gì nổi bật?", options: ["A. Thường phải trả hết toàn bộ gốc và lãi trong vòng 1 tháng", "B. Thường yêu cầu phải có tài sản thế chấp đảm bảo, và doanh nghiệp sẽ trả dần nợ gốc kèm lãi định kỳ qua nhiều năm", "C. Là khoản nợ không bao giờ phải trả", "D. Được ngân hàng ghi nhận là một khoản doanh thu"], answer: 1, explain: "Đây là công cụ tài trợ vốn dài hạn rất phổ biến của doanh nghiệp. Nó thường đi kèm khế ước thế chấp (nhà xưởng, máy móc) và trả góp gốc+lãi định kỳ để giảm bớt gánh nặng dòng tiền." },
            { q: "Cổ phiếu ưu đãi tích lũy (Cumulative Preferred Stock) mang lại quyền lợi đặc biệt gì cho nhà đầu tư?", options: ["A. Nếu công ty làm ăn thua lỗ không trả cổ tức năm nay, số tiền cổ tức bị thiếu đó sẽ được 'cộng dồn' và công ty bắt buộc phải trả bù vào các năm sau trước khi được phép chia tiền cho cổ đông phổ thông", "B. Được phép biểu quyết với trọng số 2 phiếu/cổ phần", "C. Cổ phiếu này sẽ tự động chuyển đổi thành Nợ vay ngân hàng nếu công ty phá sản", "D. Cổ đông được quyền nhận toàn bộ tài sản công ty khi thanh lý"], answer: 0, explain: "Tính 'tích lũy' (Cumulative) bảo vệ nhà đầu tư khỏi rủi ro mất cổ tức. Cổ tức chưa trả không bị mất đi mà treo lại thành một khoản 'Cổ tức khất nợ' (Dividends in arrears)." },
            { q: "Chỉ tiêu 'Lợi nhuận gộp' (Gross Profit) phản ánh hiệu quả của mảng nào trong doanh nghiệp?", options: ["A. Phản ánh trực tiếp hiệu quả của chính sách định giá bán và năng lực kiểm soát chi phí nhập/sản xuất hàng hóa", "B. Phản ánh hiệu quả của bộ phận quản trị nhân sự văn phòng", "C. Thể hiện số tiền còn dư lại trong két sắt", "D. Đánh giá khả năng tối ưu hóa tiền thuế của công ty"], answer: 0, explain: "Lợi nhuận gộp (Doanh thu thuần - Giá vốn hàng bán) là lớp lợi nhuận đầu tiên và cốt lõi nhất. Nó trả lời câu hỏi: Công ty mua sỉ bán lẻ mặt hàng này liệu có sinh lời đủ dày để đắp cho các chi phí vận hành khác hay không?" },
            { q: "Trong kế toán Mỹ (US GAAP), phương pháp xuất kho LIFO (Nhập sau, Xuất trước) thường được các công ty ưu chuộng sử dụng trong thời kỳ lạm phát giá cả nhằm mục đích gì?", options: ["A. Đẩy lợi nhuận lên thật cao để làm hài lòng các cổ đông", "B. Đẩy Giá vốn hàng bán lên mức cao nhất có thể, qua đó tối thiểu hóa Lợi nhuận trên giấy để giảm thiểu số tiền Thuế TNDN phải nộp", "C. Làm tăng giá trị Hàng tồn kho cuối kỳ trên Bảng CĐKT", "D. Xóa bỏ các khoản nợ vay dài hạn"], answer: 1, explain: "Mặc dù chuẩn IFRS cấm tiệt, nhưng US GAAP vẫn cho phép LIFO. Trong thời kỳ lạm phát, LIFO lấy hàng đắt tiền mua sau cùng đưa vào Giá vốn, làm lợi nhuận giảm xuống. Lợi nhuận giảm đồng nghĩa với việc đóng thuế ít đi, tiết kiệm được dòng tiền thực tế." },
            { q: "Trái phiếu có thể chuyển đổi (Convertible Bonds) là một công cụ tài chính cung cấp cho nhà đầu tư quyền lợi gì?", options: ["A. Quyền đòi lại tiền mặt gấp đôi nếu công ty trễ hạn trả lãi", "B. Quyền tùy chọn được chuyển đổi số trái phiếu đang nắm giữ thành một số lượng cố định cổ phiếu phổ thông của công ty phát hành", "C. Quyền đương nhiên trở thành Thành viên Hội đồng Quản trị", "D. Quyền bán lại trái phiếu cho một ngân hàng trung ương"], answer: 1, explain: "Đây là loại chứng khoán lai (hybrid). Nó hấp dẫn nhà đầu tư vì ban đầu nó an toàn như một khoản nợ (hưởng lãi cố định), nhưng nếu công ty phát triển rực rỡ, giá cổ phiếu tăng vọt, nhà đầu tư có thể đổi trái phiếu lấy cổ phiếu để hưởng lợi lớn." },
            { q: "Câu nói kinh điển 'Kế toán là ngôn ngữ của kinh doanh' (Accounting is the language of business) nhằm ám chỉ điều gì?", options: ["A. Muốn làm kế toán thì bắt buộc phải giỏi ngoại ngữ", "B. Kế toán cung cấp một hệ thống thuật ngữ và báo cáo chuẩn hóa để giao tiếp, truyền tải 'tình trạng sức khỏe tài chính' của doanh nghiệp cho các bên liên quan ra quyết định", "C. Các quy tắc kế toán phức tạp và khó hiểu như một ngôn ngữ lập trình mã hóa", "D. Mọi cuộc đàm phán kinh doanh đều chỉ xoay quanh tiền bạc"], answer: 1, explain: "Ngôn ngữ dùng để giao tiếp. Báo cáo tài chính chính là cách mà doanh nghiệp 'trò chuyện' với ngân hàng, nhà đầu tư, hay cơ quan thuế về việc họ kiếm tiền và tiêu tiền giỏi đến mức nào." }
        ];
        // ================= LOGIC XỬ LÝ HỆ THỐNG =================
        let currentQuestions = [];
        let userAnswers = [];
        let currentTestNum = 1;

        // Biến cho đồng hồ đếm ngược
        let timerInterval = null;
        let timeRemaining = 3600; // 60 phút = 3600 giây

        // Khởi tạo Quiz khi mở web
        function initApp() {
            document.body.setAttribute('data-theme', 'light');
            changeTest();
        }

        // Logic Đồng hồ
        function startTimer() {
            clearInterval(timerInterval);
            timeRemaining = 3600;
            updateTimerUI();

            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerUI();

                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    alert("⏰ Đã hết 60 phút làm bài! Hệ thống sẽ tự động nộp bài của cậu nhé.");
                    submitQuiz(); // Auto submit
                }
            }, 1000);
        }

        function updateTimerUI() {
            let m = Math.floor(timeRemaining / 60);
            let s = timeRemaining % 60;
            let mStr = m.toString().padStart(2, '0');
            let sStr = s.toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `⏳ ${mStr}:${sStr}`;

            // Đổi màu cảnh báo khi còn dưới 5 phút
            if (timeRemaining <= 300) {
                document.getElementById('timer-display').style.background = "#fadbd8";
                document.getElementById('timer-display').style.animation = "blink 1s infinite";
            } else {
                document.getElementById('timer-display').style.background = "var(--option-bg)";
                document.getElementById('timer-display').style.animation = "none";
            }
        }

        // Xử lý đổi đề
        function changeTest() {
            const selector = document.getElementById('test-selector');
            currentTestNum = parseInt(selector.value);

            document.getElementById('quiz-title').innerText = `Đề Luyện Tập Số ${currentTestNum}`;

            let sourceData;
            if (currentTestNum === 1) sourceData = de1_questions;
            else if (currentTestNum === 2) sourceData = de2_questions;
            else if (currentTestNum === 3) sourceData = de3_questions;
            else if (currentTestNum === 4) sourceData = de4_questions;
            else if (currentTestNum === 5) sourceData = de5_questions;
            else if (currentTestNum === 6) sourceData = de6_questions;
            else if (currentTestNum === 7) sourceData = de7_questions;
            else if (currentTestNum === 8) sourceData = de8_questions;
            else if (currentTestNum === 9) sourceData = de9_questions;
            else if (currentTestNum === 10) sourceData = de10_questions;

            currentQuestions = JSON.parse(JSON.stringify(sourceData));
            resetQuizState();
        }

        function resetQuizState() {
            userAnswers = new Array(currentQuestions.length).fill(null);
            renderQuiz();
            document.getElementById('result-board').style.display = "none";
            document.getElementById('btn-submit').style.display = "block";
            document.getElementById('btn-retry').style.display = "none";
            startTimer(); // Bắt đầu đếm ngược lại từ đầu
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetCurrentTest() {
            userAnswers = new Array(currentQuestions.length).fill(null);
            renderQuiz();
            document.getElementById('result-board').style.display = "none";
            document.getElementById('btn-submit').style.display = "block";
            document.getElementById('btn-retry').style.display = "none";
            startTimer();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function forceShuffle() {
            for (let i = currentQuestions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
            }
            resetQuizState();
            alert("Đã xáo trộn thứ tự các câu hỏi! Bắt đầu tính giờ lại nhé.");
        }

        function renderQuiz() {
            const quizBody = document.getElementById('quiz-body');
            quizBody.innerHTML = '';

            currentQuestions.forEach((question, qIndex) => {
                let optionsHtml = '';
                question.options.forEach((option, oIndex) => {
                    optionsHtml += `<div class="option" id="opt-${qIndex}-${oIndex}" onclick="selectOption(${qIndex}, ${oIndex})">${option}</div>`;
                });
                quizBody.innerHTML += `
                <div class="question-block" id="question-${qIndex}">
                    <div class="question">Câu ${qIndex + 1}: ${question.q}</div>
                    <div class="options">${optionsHtml}</div>
                    <div class="explanation" id="explain-${qIndex}" style="display:none;">
                        <b>Giải thích:</b> ${question.explain}
                    </div>
                </div>
            `;
            });
        }

        function selectOption(qIndex, oIndex) {
            if (timeRemaining <= 0) return; // Hết giờ không cho click nữa

            for (let i = 0; i < currentQuestions[qIndex].options.length; i++) {
                let el = document.getElementById(`opt-${qIndex}-${i}`);
                if (el) el.classList.remove('selected');
            }
            document.getElementById(`opt-${qIndex}-${oIndex}`).classList.add('selected');
            userAnswers[qIndex] = oIndex;
        }

        function submitQuiz() {
            // Dừng đồng hồ
            clearInterval(timerInterval);

            // Kiểm tra nếu chưa chọn hết và chưa hết giờ thì cảnh báo
            if (timeRemaining > 0 && userAnswers.includes(null)) {
                let confirmSubmit = confirm("Cậu vẫn chưa làm hết bài. Có chắc chắn muốn nộp bài luôn không?");
                if (!confirmSubmit) {
                    // Tiếp tục chạy đồng hồ
                    timerInterval = setInterval(() => {
                        timeRemaining--;
                        updateTimerUI();
                        if (timeRemaining <= 0) {
                            clearInterval(timerInterval);
                            alert("⏰ Đã hết 60 phút làm bài! Hệ thống sẽ tự động nộp bài.");
                            submitQuiz();
                        }
                    }, 1000);
                    return;
                }
            }

            let score = 0;
            currentQuestions.forEach((question, qIndex) => {
                let uAns = userAnswers[qIndex];
                let cAns = question.answer;

                for (let i = 0; i < question.options.length; i++) {
                    let optEl = document.getElementById(`opt-${qIndex}-${i}`);
                    if (optEl) {
                        optEl.onclick = null;
                        optEl.style.cursor = "default";
                    }
                }

                document.getElementById(`explain-${qIndex}`).style.display = "block";

                if (uAns === cAns) {
                    score++;
                    document.getElementById(`opt-${qIndex}-${cAns}`).classList.add("correct-ans");
                } else {
                    if (uAns !== null) {
                        document.getElementById(`opt-${qIndex}-${uAns}`).classList.add("wrong-ans");
                    }
                    document.getElementById(`opt-${qIndex}-${cAns}`).classList.add("correct-ans");
                }
            });

            const resultBoard = document.getElementById('result-board');
            resultBoard.style.display = "block";
            resultBoard.innerHTML = `
            Kết quả của cậu:
            <div class="score-text">${score} / ${currentQuestions.length}</div>
            Thời gian còn lại: ${Math.floor(timeRemaining / 60)} phút ${timeRemaining % 60} giây.<br>
            Kéo lên trên để xem giải thích chi tiết những câu sai nhé!
        `;

            document.getElementById('btn-submit').style.display = "none";
            document.getElementById('btn-retry').style.display = "block";
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-toggle');

            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                btn.innerHTML = '☀️ Chế độ Sáng';
            } else {
                body.setAttribute('data-theme', 'light');
                btn.innerHTML = '🌙 Chế độ Tối';
            }
        }

        // Khởi chạy ứng dụng
        initApp();
    </script>
    <style>
        @keyframes blink {
            50% {
                opacity: 0.5;
            }
        }
    </style>
</body>

</html>
